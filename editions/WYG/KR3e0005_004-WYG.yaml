body:
  text: 鍼灸甲乙經卷四晉皇甫謐撰經脈第一上雷公問曰外揣言渾束為一未知其所謂敢問約之奈何黄帝答曰寸口主内人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人人迎大一倍於寸口病在少陽再倍病在太陽三倍病在陽明盛則為熱虚則為寒𦂳則為痛痺代則乍甚乍間盛則瀉之虚則補之𦂳則取之分肉代則取之血絡且飲以藥陷下者則從而灸之不盛不虚者以經取之名曰經刺人迎四倍名曰外格外格者且大且數則死不治必審按其本末察其寒熱以騐其藏府之病寸口大一倍於人迎病在厥隂再倍病在少隂盛則脹滿寒則食不消化虚則熱中出麋少氣溺色變𦂳則為痛痺代則乍寒乍熱下熱上寒太素作代則乍痛乍止盛則瀉之虚則補之𦂳則先刺之而後灸之代則取血絡而後調太素作泄字之陷下者則從灸之陷下者其脈血結于中中有著血血寒則故宜灸不盛不虚以經取之寸口四倍者名曰内闗内闗者且大且數則死不治必審按其本末察其寒熱以騐其藏府之病通其滎俞乃可傳於大數大曰盛則從瀉小曰虚則從補𦂳則從灸刺之且飲藥陷下則從灸之不盛不虚以經取之所謂經治者飲藥亦用灸刺脈急則引脈代一本作脈大以弱則欲安静無勞用力黄帝問曰病之益甚與其方衰何如岐伯對曰外内皆在焉切其脈口滑小𦂳以沉者病益甚在中人迎氣大𦂳以浮者病益甚在外其脈口浮而滑者病日進人迎沉而滑者病日損其脈口滑而沉者病日進在内其人迎脈滑盛以浮者病日進在外脈之浮沉及人迎與氣口氣大小齊等者其病難已病在藏沉而大者其病易已以小為逆病在腑浮而大者其病易已人迎甚𦂳者傷於寒脈口盛𦂳者傷於食其脈滑大以代而長者病從外來目有所見志有所存此陽之并也可變而已曰平人何如曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏疑誤以太息名曰平人平人者不病也常以不病之人以調病人醫不病故為病人平息以調之人一呼脈一動一吸脈一動者曰少氣人一呼脈三動而躁尺熱曰病温尺不熱脈滑曰病風素作脈濇為痺人一呼脈四動以上曰死脈絶不至曰死乍踈乍數曰死人常禀氣於胃脈以胃氣為本無胃氣曰逆逆曰死持其脈口數其至也五十動而不一代者五臟皆受氣矣四十動而一代者一藏無氣三十動而一代者二藏無氣二十動而一代者三藏無氣十動而一代者四藏無氣不滿十動而一代者五藏無氣與之短期要在終始所謂五十動而一代者以為常也以知五藏之期也與之短期者乍數乍疎也肝脈弦心脈鈎脾脈代肺脈毛腎脈石心脈來累累然如連珠如循琅玕曰平累累素作喘喘連屬其中微曲曰病前鈎後居如操帶鈎曰死肺脈來厭厭聶聶如循素問作落榆葉曰平不上不下如循雞羽曰病如物之浮如風吹毛曰死肝脈來耎弱招招如揭長竿末稍曰平盈實而滑如循長竿曰病急而益勁如新張弓弦曰死脾脈來和柔相離如雞足踐地曰平實而盈數如雞舉足曰病堅兊如烏之啄如鳥之距如屋之漏如水之流曰死腎脈來喘喘累累如鈎按之堅曰平來如引葛按之益堅曰病發如奪索辟辟如彈石曰死脾脈虚浮似肺腎脈小浮似脾肝脈急沉散似腎曰見真藏曰死何也曰五藏者皆禀氣於胃胃者五藏之本藏氣者皆不能自致於手太隂必因於胃氣乃能至於手太隂故五藏各以其時自為而至於手太隂故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太隂故真藏之氣獨見獨見者病勝藏也故曰死春脈肝也東方木也萬物之所始生也故其氣耎弱輕虚而滑端直以長故曰弦反此者病其氣來實而强此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善忘忽忽眩冒而癲疾不及則令人胸滿一作痛引背下則兩脇胠滿夏脈心也南方火也萬物之所盛長也故其氣來盛去衰故曰鈎反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在内太過則令人身熱而骨痛一作膚痛為浸淫不及則令人煩心上見咳唾下為氣泄秋脈肺也西方金也萬物之所收成也故其氣來輕虚以浮來急去散故曰浮反此者病其來毛而中央堅兩傍虚此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛愠愠然不及則令人喘呼少氣而欬上氣見血下聞病音冬脈腎也北方水也萬物之所合藏也故其氣來沉以濡素問作摶故曰營反此者病其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病饑素問下有䏚中清脊中痛小腹滿小便變赤黄四句脾脈土也孤藏以灌四傍者也其善者不可見惡者可見其來如水之流者此謂太過病在外如烏之喙者此謂不及病在中太過則令人四肢不舉不及則令人九竅不通名曰重强經脈第一中春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰隂出之陽病善怒不治是謂五邪皆同死不治春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病藏真散於肝肝藏筋膜之氣也夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死胃而有石曰冬病石甚曰今病藏真通於心心藏血脈之氣也長夏胃微耎弱曰平胃少耎弱多曰脾病但代無胃曰死耎弱有石曰冬病耎素作弱甚曰今病藏真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病藏真髙於肺肺行營衛隂陽也冬胃微石曰平胃少石多曰腎病但石無胃曰死石而有鈎曰夏病鈎甚曰今病藏真下於腎腎藏骨髓之氣也胃之大絡名曰虚里貫膈絡肺出於左乳下其動應手脈之宗氣也盛喘數絶者則病在中結而横有積矣絶不至曰死診得胃脈則能食虚則泄也心脈揣素問作摶堅而長病舌卷不能言其耎而散者病消渴素作煩自已肺脈揣素作摶下同堅而長病唾血其耎而散者病灌汗至令不復散發肝脈揣堅而長色不青病墜若摶因血在脇下令人喘逆其耎而散色澤者病溢飲溢飲者渴渴多飲而易一本作溢入肌皮腸胃之外也胃脈揣堅而長其色赤病折髀其耎而散者病食痺痛髀脾脈揣堅而長其色黄病少氣其耎而散色不澤者病足胻腫若水狀腎脈揣堅而長其色黄而赤者病折腰其耎而散者病少血至令不復夫脈者血氣之府也長則氣和短則病數則煩心大則病進上盛則氣髙下盛則氣脹代則氣衰細則氣少濇則心痛渾渾革革至如涌泉病進而色弊之綽綽一本作綿綿其去如弦絶者死寸口脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈沉而堅者病在中寸口脈浮而盛者病在外寸口脈中手促上數素問作擊者曰肩背痛寸口脈𦂳而横堅素問作沉而横者曰脇下腹中有横積痛寸口脈浮而喘素問作沉而弱者曰寒熱寸口脈盛滑堅者曰病在外寸口脈小實而堅者曰病在内脈小弱以濇者謂之乆病脈浮滑而實大素問作浮而疾者謂之新病病其有胃氣而和者曰病無他脈急者曰疝㿗少腹痛脈滑曰風脈濇曰痺盛而𦂳曰脹緩而滑曰熱中按寸口得四時之順曰病無他反四時及不間藏曰死太陽脈至洪大以長少陽脈至乍數乍踈乍短乍長陽明脈至浮大而短厥隂有餘病隂痺不足病生熱痺滑則病狐疝風濇則病少腹積氣一本作積厥少隂有餘病皮痺瘾疹不足病肺痺滑則病肺風疝濇則病積溲血太隂有餘病肉痺寒中不足病脾痺滑則病脾風疝濇則病積心腹時滿陽明有餘病脈痺身時熱不足病心痺滑則病心風疝濇則病積時善驚太陽有餘病骨痺身重不足病腎痺滑則病腎風疝濇則病積時善癲疾少陽有餘病筋痺脇滿不足病肝痺滑則病肝風疝濇則病積時筋急目痛太隂厥逆胻急攣心痛引腹治主病者少隂厥逆虚滿嘔變下泄清治主病者厥隂厥逆攣腰痛虚滿前閉讝語治主病者三隂俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善䘐治主病者少陽厥逆機闗不利機闗不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘欬身熱善驚衂血嘔血不可治驚者死手太隂厥逆虚滿而欬善嘔吐沫治主病者手心主少隂厥逆心痛引喉身熱者死不熱者可治手太陽厥逆耳聾泣出項不可以顧腰不可以俛仰治主病者手陽明少陽厥逆發喉痺嗌腫痛治主病者來疾去徐上實下虚為厥癲疾來徐去疾上虚下實為惡風也故中惡風者陽氣受也有脈俱沉細數者少隂厥也沉細數散者寒熱也浮而散者為眴音順仆諸浮而不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在隂則為骨痛其有静者在足數動一代者病在陽之脈也其濇者陽氣有餘也滑者隂氣有餘也陽氣有餘則為身熱無汗隂氣有餘則為多汗身寒隂陽有餘則為無汗而寒推而外之内而不外者有心腹積也推而内之外而不内者中有熱也推而上之下而不上者腰足清也推而下之上而不下者頭項痛也按之至骨脈氣少者腰脊痛而身有痺也脈經第一下三陽為經二陽為維一陽為遊部三陽者太陽也至手太隂而弦浮而不沉決以度察以心合之隂陽之論二陽者陽明也至手太隂弦而沉急不鼔炅至以病皆死一陽者少陽也至手太隂上連人迎弦急懸不絶此少陽之病也搏隂則死三隂者六經之所主也交於太隂伏鼔不浮上空至心二隂至肺其氣歸於膀胱外連脾胃一隂獨至經絶氣浮不鼔鈎而滑此六脈者乍隂乍陽交屬相并繆通五藏合於隂陽先至為主後至為客三陽為父二陽為衛一陽為紀三隂為母二隂為雌一隂為獨使二陽一隂陽明主脾一本無脾字病不勝一隂脈耎而動九竅皆沉三陽一隂太陽脈勝一隂不能止内亂五藏外為驚駭二隂二陽病在肺少陽一作隂脈沉勝肺傷脾故外傷四肢二隂二陽皆交至病在腎罵詈妄行癲疾為狂二隂一陽病出於腎隂氣客遊於心脘下空竅隄閉塞不通四肢别離一隂一陽代絶此隂氣至心上下無常出入不知喉嗌乾燥病在土脾二陽三隂至隂皆在隂不過陽陽氣不能止隂隂陽並絶浮為血瘕沉為膿胕也三陽獨至者是三陽并至并至如風雨上為癲疾下為漏血病三陽者至陽也積并則為驚病起如風礔礰九竅皆塞陽氣滂溢嗌乾喉塞并於隂則上下無常薄為腸澼此謂三陽直心坐不得起卧者身重三陽之病也黄帝問曰脈有四時動奈何岐伯對曰六合之内天地之變隂陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下以春應中規夏應中矩秋應中衡冬應中權是故冬至四十五日陽氣微上隂氣微下夏至四十五日隂氣微上陽氣微下隂陽有時與脈為期期而相失如脈所分分之有期故知死時微妙在脈不可不察察之有紀從隂陽始是故聲合五音色合五行脈合隂陽持脈有道虚静為寳春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知内者按而紀之知外者終而始之此六者持脈之大法也赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痺得之外疾思而心虚故邪從白脈之至也喘而浮上虚下實驚為積氣在胸中喘而虚名曰肺痺寒熱得之醉而使内也黄脈之至也大而虚有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風青脈之至也長而弦左右彈有積氣在心下攴胠名曰肝痺得之寒濕與疝同法腰痛足清頭痛一本云頭脈𦂳黒脈之至也上堅而大有積氣在少腹與隂名曰腎痺得之沐浴清水而卧形氣有餘脈氣不足死脈氣有餘形氣不足生形氣相得謂之可治脈弱以滑是有胃氣命曰易治治之趨之無後其時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時謂之不治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉濇者名曰逆四時未有藏形於春夏而脈沉濇秋冬而脈浮大病熱脈静泄而脈大脱血而脈實病在中而脈實堅病在外而脈不實堅者皆為難治名曰逆四時也曰願聞虚實之要曰氣實形實氣虚形虚此其常也反此者病榖盛氣盛榖虚氣虚此其常也反此者病脈實血實脈虚血虚此其常也反此者病氣盛身寒氣虚身熱曰反糓入多而氣少曰反糓不入而氣多曰反脈盛血少曰反脈少血多曰反氣盛身寒得之傷寒氣虚身熱得之傷暑糓入多而氣少者得之有所脱血濕居其下也糓入少而氣多者邪在胃及與肺也脈少血多者飲中熱也脈大血少者脈有風氣水漿不入此謂反也夫實者氣入也虚者氣出也氣實者熱也氣虚者寒也入實者左手開鍼孔也入虚者左手閉鍼孔也脈小色不奪者新病也脈不奪色奪者乆病也脈與五色俱奪者乆病也脈與五色俱不奪者新病也肝與腎脈並至其色蒼赤當病毁傷不見血已見血濕若中水也尺内兩傍則季脇也尺外以候腎尺裏以候腹中附上左外以候肝内以候鬲右外以候胃内以候脾上附上右外以候肺内以候胷中右外以候心内以候膻中前以候前後以候後上竟上者胷喉中事也下竟下者少腹腰股膝脛中事也粗大者隂不足陽有餘為熱中也腹脹身熱脈大一作小是一逆也腹鳴而滿四肢清泄脈大者是二逆也血衂不止脈大者是三逆也欬且溲血脱形脈小而勁者是四逆也欬脱形身熱脈小而疾者是五逆也如是者不過十五日死矣腹大脹四末清脱形泄甚是一逆也腹脹便一作後血其脈大時絶是二逆也欬溲血形肉脱喘是三逆也嘔血胷滿引背脈小而疾是四逆也欬嘔腹脹且飱泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治治熱病脈静汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痺不移膕肉破身熱脈偏絶是三逆也淫而奪形身熱色天然白及後下血衃篤重是四逆也寒熱奪形脈堅搏是五逆也五實死五虚死脈盛皮熱腹脹前後不通悶瞀是謂五實脈細皮寒氣少泄利前後飲食不入是謂五虚漿粥入胃泄注止則虚者活身汗得後利則實者活此其候也心脈滿大癎痓筋攣肝脈小急癎痓筋攣肝脈瞀㬥有所驚駭脈不至若瘖不治自已腎脈小急肝脈小急心脈小急不鼔皆為瘕腎脈大急沉肝脈大急沉皆為疝肝腎脈并沉為石水并浮為風水并虚為死并小弦欲為驚心脈揣滑急為心疝素問揣作搏下同肺脈沉揣為肺疝三陽急為瘕二隂急為癎厥一本作二隂急為疝二陽急為驚脾脈外鼓沉為腸澼乆自已肝脈小緩為腸澼易治腎脈小揣沉為腸澼下血血濕素問作温身熱者死心肝澼亦下血二藏同病者可治其脈小沉濇為腸澼其身熱者死熱甚七日死素作熱見胃脈沉鼔濇胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不瘖舌轉者可治三十日起其從者瘖三嵗起年不滿二十者三嵗死脈至而揣衂血身有熱者死脈來懸鈎浮者為熱素作常脈脈至而揣名曰㬥厥㬥厥者不知與人言脈至而數使人㬥驚三四日自已脈至浮合浮合如數一息十至已上是經氣予不足也微見九十日死脈至如火薪然是心精予奪也草乾而死脈至如叢棘素作如散葉是肝氣予虚也木葉落而死脈至如省客省客者脈寒一本作塞如故也是腎氣予不足也懸去棗華而死脈至如丸泥是胃精予不足也榆莢落而死脈至如横格是膽氣予不足也禾熟而死脈至如弦縷是胞精予不足也病善言下霜而死不言可治脈至如交棘素作交漆交棘者左右傍至也㣲見三十日而死脈至如湧泉浮鼓肌中是太陽氣予不足也少氣味韮花生而死脈至如頽土之狀按之不足是肌氣予不足也五色見黒白累發而死脈至如懸癰懸癰者浮揣切之益大是十二俞之氣予不足也水凍而死脈至如偃刀偃刀者浮之小急按之堅大五藏寒熱素作菀熟寒熱獨并於腎如此其人不得坐立春而死脈至如丸滑不著素作手不直手丸滑不著者按之不可得也是大腸氣予不足也棗葉生而死脈至如舂者令人善恐不欲坐卧行立常聴是小腸氣予不足也季秋而死病形脈胗第二上黄帝問曰邪氣之中人奈何髙下有度乎岐伯對曰身半已上者邪中之身半已下者濕中之中於隂則留腑中於陽則留藏曰隂之與陽異名同類上下相㑹經絡之相貫也如環之無端夫邪之中人也或中於隂或中於陽上下左右無有恒常曰諸陽之㑹皆在於面人之方乗虚時及新用力若熱飲食汗出腠理開而中於邪中於面則下陽明中於面則下太陽中於頰則下少陽中於膺背兩脇亦中其經中於隂者常從臂胻始夫臂與胻其隂皮薄其肉淖澤故俱受於風獨傷於其隂也曰此故傷其藏乎曰身之中於風也不必動藏故邪入於隂經其藏氣實邪氣入而不能容故還之於腑是故陽中則留於經隂中則留於腑曰邪之中藏者奈何曰恐懼憂愁則傷心形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留内有所大怒氣上而不能下積于脇下則傷肝有所擊仆若醉以入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎曰五藏之中風奈何曰隂陽俱相感邪乃得往十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽之氣上走於目而為睛其别氣走於耳而為聴其宗氣上出於鼻而為臭其濁氣下出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故大熱甚寒不能勝之也虚邪之中身也洒浙動其形正邪之中人也微先見於色不知於身若存若亡有形無形莫知其情夫色脈與尺之皮膚相應如桴鼔影嚮之相應不得相失此亦本末根葉之出候也根死則葉枯矣故色青者其脈弦色赤者其脈鈎色黄者其脈代色白者其脈毛色黒者其脈石見其色而不得其脈反得相勝之脈則死矣得其相勝之脈則病已矣曰五藏之所生變化之病形何如曰先定其五色五脈之應其病乃可别也曰色脈已定别之奈何曰調其脈之緩急大小滑濇而病形定矣曰調之何如曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦大脈沉者尺之皮膚亦沉脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工十全其九行二者為中工十全其七行一者為下工十全其六尺膚温一作滑以淖澤者風也尺肉弱者解㑊也安卧脱肉者寒熱也一本下作不治尺膚濇者風痺也尺膚粗如枯魚鱗者水泆飲也尺膚寒甚脈急一作小者泄少氣也尺膚熱甚脈盛躁者病温也其脈盛而滑者汗且出也一作病且出尺膚燒灸人手一作炬然先熱後寒者寒熱也尺膚先寒乆持之而熱者亦寒熱也尺膚炬然熱人迎大者當奪血也尺堅大脈小甚則少氣悗有加者立死脈經云尺𦂳於人迎者少氣肘所獨熱者腰已上熱肘後獨熱者肩背熱肘前獨熱者膺前熱肘後亷已下三四寸熱者腸中有蟲手所獨熱者腰已上一作下熱臂中獨熱者腰腹熱掌中熱者腹中熱也掌中寒者腹中寒也魚際白肉有青血脈者胃中有寒也曰人有尺膚緩甚一云又存瘦甚筋急而見此為何病曰此所謂狐筋狐筋者是人腹必急白色黒色見此病甚狐素問作疹病形脈診第二下黄帝問曰脈之緩急小大滑濇之病形何如岐伯對曰心脈急甚為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行有時唾血大甚為喉吤吤微大為心痺引背善涙小甚為善噦微小為消癉滑甚為善渴微滑為心疝引臍少腹鳴濇甚為瘖微濇為血溢維經絡有陽維隂維厥耳鳴癲疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胷若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭已下汗出不止大甚為脛腫微大為肺痺引胷背起惡日光小甚為泄微小為消癉滑甚為息賁上氣微滑為上下出血濇甚為嘔血微濇為鼠瘻一作漏在頸支腋之間下不勝其上甚能善酸肝脈急甚為惡言一作忘言微急為肥氣在脇下若覆杯緩甚為善嘔微緩為水瘕痺大甚為内癰善嘔衂微大為肝痺隂縮欬引少腹小甚為多飲微小為消癉滑甚為㿗疝微滑為遺溺濇甚為溢飲微濇為瘈瘲攣筋脾脈急甚為瘈瘲微急為鬲中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿗一作潰微濇為内潰多下膿血腎脈急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞泄洞泄者食不化下嗌還出大甚為隂痿微大為石水起臍下至小腹垂垂然上至胃脘死不治小甚為洞泄微小為消癉滑甚為癰㿗一作癃㿉微滑為骨痿坐不能起起則目無所見視黒丸濇甚為大癰微濇為不月沉痔曰病亦有甚變一作病之六變者刺之奈何曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛而微有熱濇者多血少氣而微有寒是故刺急者深内而乆留之刺緩者淺内而疾發鍼以去其熱刺大者微瀉其氣無出其血刺滑者疾發鍼而淺内之以瀉其陽氣去其熱刺濇者必中其脈隨其逆順而乆留之必先按而循之已發鍼疾按其痏無令出血以和其諸脈小者隂陽形氣俱不足勿取以鍼而調之以甘藥曰五藏六府之氣滎俞所入為合令何道從入入安從道曰此陽明之别入於内屬於府者也曰滎俞與合各有名乎曰滎俞治外藏經合治内府曰治内府奈何曰取之於合曰合各有名乎曰胃合入於三里大腸合入於巨虚上亷小腸合入於巨虚下亷三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉按大腸合於曲池小腸合於小海三焦合於天井今此不同者古之别法也又詳巨虚上亷乃足陽明與小腸相合之穴也與胃三里膀胱合委中膽合陽陵泉以脈之所入為合不同三焦合委陽委陽者乃三焦下輔腧也亦未見有為合之説曰取之奈何曰取之三里者低跗取之巨虚者舉足取之委陽者屈伸而取之委中者屈膝而取之陽陵泉者正立竪膝予之齊下至委陽之陽取之諸外經者揄伸而取之曰願聞六府之病曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈堅若陷者足陽明病此胃脈也三部九候第三黄帝問曰何謂三部岐伯對曰上部中部下部其部各有三候三候者有天有地有人上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太隂中部地手陽明中部人手少隂下部天足厥隂下部地足少隂下部人足太隂下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胷中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣此三部者三而成天三而成地三而成人三而三之合為九九分為九野九野為九藏故神藏五形藏四合為九藏五藏已敗其色必夭夭必死矣曰以候奈何曰必先度其形之肥瘦以調其氣之虚實實則寫之虚則補之必先去其血脈而後調之無問其病以平為期曰決死生奈何曰形盛脈細少氣不足以息者危形瘦脈大胷中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆藏相失者死中部之候相減者死目内陷者死曰何以知病之所在曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病以左手於左足上去踝五寸而按之以右手當踝而彈之其應過五寸已上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死脱肉身不去者死中部乍疎乍數者死代脈而鈎者病在絡脈九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也察其府藏以知死生之期必先知經脈而後知病脈真藏脈見者邪勝死也素問無死字足太陽之氣絶者其足不可以屈伸死必戴眼曰冬隂夏陽奈何曰九候之脈皆沉細懸絶者為隂主冬故以夜半死盛躁喘數者為陽主夏故以日中死寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍數乍疎乍遲乍疾者以日乗四季死形肉已脱九候雖調者猶死七診雖見九候皆順者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫必審問其所始病與今之所方病而後素問下有各字切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病不往不來者死素問作不往來者皮膚著者死曰其可治者奈何曰經病者治其經絡病者治其絡素問二絡上有孫字身有痛者治其經絡其病者在奇邪奇邪之脈則繆刺之留瘦不移節而刺之上實下虚切而順之索其結絡脈刺出其血以通其氣瞳子髙者太陽不足戴眼者太陽已絶此決死生之要不可不察也鍼灸甲乙經卷四
