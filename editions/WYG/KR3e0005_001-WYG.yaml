body:
  text: 鍼灸甲乙經卷一晉皇甫謐撰精神五藏論第一黄帝問曰凡刺之法必先本於神血脈營氣精神此五藏之所藏也何謂德氣生精神魂魄心意志思智慮請問其故岐伯對曰天之在我者德也地之在我者氣也德流氣薄而生也故生之来謂之精兩精相搏謂之神隨神往来謂之魂並精出入謂之魄可以任物謂之心心有所憶謂之意意有所存謂之志因志存變謂之思因思逺慕謂之慮因慮處物謂之智故智以養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則邪僻不生長生久視是故􅇶惕思慮者則神傷神傷則恐懼流淫而不正因悲哀動中者則竭絶而失生喜樂者神嘽散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者蕩憚而不収太素不收作失守素問曰怒則氣逆甚則嘔血及食而氣逆故氣上喜則氣和志達營衛通利故氣緩悲則心系急肺布葉舉兩焦不通營衛不散熱氣在中故氣消恐則神却却則上焦閉閉則氣還還則下焦脹故氣不行熱則腠理開營衛通汗大泄驚則心無所倚神無所歸慮無所定故氣亂勞則喘且汗出内外皆越故氣耗思則心有所傷神有所止氣流而不行故氣結已上言九氣其義小異大同肝藏血血舍魂在氣為語在液為淚肝氣虚則恐實則怒素問曰人卧血歸於肝目受血而能視足受血而能步掌受血而能握指受血而能攝心藏脈脈舍神在氣為吞在液為汗心氣虚則悲憂實則笑不休脾藏營營舍意在氣為噫在液為涎脾氣虚則四肢不用五藏不安實則腹脹涇溲不利噫音作噯肺藏氣氣舍魄在氣為欬在液為涕肺氣虚則鼻息不利少氣實則喘喝胷慿九墟作盈仰息腎藏精精舍氣在氣為欠在液為唾腎氣虚則厥實則脹五藏不安必審察五藏之病形以知其氣之虚實而謹調之肝氣悲哀動中則傷魂魂傷則狂妄其精不守一本作不精不精則不正當令人隂縮而筋攣兩脇肋骨不舉毛悴色夭死于秋素問曰肝在聲為呼在變動為握在志為怒怒傷肝九卷及素問又曰精氣并于肝則憂解曰肝虚則恐實則怒怒而不已亦生憂矣肝之與腎脾之與肺互相成也脾者土也四藏皆受成焉故恐發於肝而成於腎愛發於脾而成於肝肝合膽膽者中精之府也腎藏精故恐同其怒怒同其恐一過其節則二藏俱傷經言若錯其歸一也心􅇶􅅥思慮則傷神神傷則恐懼自失破㬷音窘脱肉毛悴色夭死于冬素問曰心在聲為笑在變動為憂在志為喜喜傷心九卷及素問又曰精氣并于心則喜或言心與肺脾二經有錯何謂也解曰心虛則悲悲則憂心實則笑笑則喜心之與肺脾之與心亦互相成也故喜變於心而成於肺思發於脾而成於心一過其節則二藏俱傷此經互言其義耳非有錯也又楊上善云心之憂在心變動肺之憂在肺之志是則肺主於秋憂為正也心主於憂變而生憂也脾愁憂不解則傷意意傷則悶亂四肢不舉毛悴色夭死于春素問曰脾在聲為歌在變動為噦在志為思思傷脾九卷及素問又曰精氣并於脾則饑一作畏肺喜樂樂極則傷魄魄傷則狂狂者意不存其人皮革焦毛悴色夭死于夏素問曰肺在聲為哭在變動為欬在志為憂憂傷肺九卷及素問又曰精氣并于肺則悲腎盛怒未止則傷志志傷則喜忘其前言腰脊不可俯仰毛悴色夭死于季夏素問曰腎在聲為呻在變動為慄在志為怒怒傷腎九卷及素問又曰精氣并於腎則恐故恐懼而不改一作解則傷精精傷則骨痠痿厥精時自下是故五藏主藏精者也不可傷傷則失守隂虚隂虚則無氣無氣則死矣是故用鍼者觀察病人之態以知精神魂魄之存亾得失之意五者已傷鍼不可以治也五藏變腧第二黄帝問曰五藏五腧願聞其數岐伯對曰人有五藏藏有五變變有五腧故五五二十五腧以應五時肝為牡藏其色青其時春其日甲乙其音角其味酸素問曰肝在味為辛於經義為未通心為牡藏其色赤其時夏其日丙丁其音徵其味苦素問曰心在味為鹹於經義為未通脾為牡藏其色黄其時長夏其日戊巳其音宫其味甘肺為牝藏其色白其時秋其日庚辛其音商其味辛素問曰肺在味為苦於經義為未通腎為牝藏其色黑其時冬其日壬癸其音羽其味鹹是謂五變藏主冬冬刺井色主春春刺榮時主夏夏刺腧音主長夏長夏刺經味主秋秋刺合是謂五變以主五腧曰諸原安合以致五腧曰原獨不應五時以經合之以應其數故六六三十六腧曰何謂藏主冬時主夏音主長夏味主秋色主春曰病在藏者取之井病變於色者取之營病時間時甚者取之腧病變於音者取之經經一作絡滿而血者病在胃一作胷及以飲食不節得病者取之合故命曰味主合是謂五變也人逆春氣則少陽不生肝氣内變逆夏氣則太陽不長心氣内洞逆秋氣則太隂不收肺氣焦滿逆冬氣則少隂不藏腎氣濁沈夫四時隂陽者萬物之根本也所以聖人春夏養陽秋冬養隂以從其根逆其根則伐其本矣故隂陽者萬物之終始也順之則生逆之則死反順為逆是謂内格是故聖人不治已病治未病論五藏相傳所勝也假使心病傳肺肺未病逆治之耳五藏六府隂陽表裏第三肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者清浄之府脾合胃胃者五榖之府腎合膀胱膀胱者津液之府少隂屬腎上連肺故將兩藏三焦者中瀆之府氷道出焉屬膀胱是孤之府此六府之所合者也素問曰夫腦髄骨脈膽女子胞此六者地氣之所生也皆藏於隂象於地故藏而不瀉名曰竒恒之府胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五藏濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五藏使水榖不得久藏五藏者藏精氣而不瀉故滿而不能實六府者傳化物而不藏故實而不能滿水榖入口則胃實而腸虛食下則腸實而胃虚故實而不滿滿而不實也氣口何以獨為五藏主胃者水榖之海六府之大源也稱六府雖少錯于理相發為佳肝膽為合故足厥隂與少陽為表裏脾胃為合故足太隂與陽明為表裏腎與膀胱為合故足少隂與太陽為表裏心與小腸為合故手少隂與太陽為表裏肺大腸為合故手太隂與陽明為表裏五藏者肺為之葢巨肩陷咽喉見于外心為之主缺盆為之道䯏音滑骨有餘以候内􅐳骬音曷于肝為之主將使之候外欲知堅固視目大小脾主為胃九虚太素作衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之逺聽視耳好惡以知其性六府者胃為之海廣骸太素作䏖大頸張胸五榖乃容鼻隧以長以候大腸唇厚人中長以候小腸目下裹大其膽乃横鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六府也上下三等藏安且良矣五藏五官第四鼻者肺之官目者肝之官口唇者脾之官舌者心之官耳者腎之官凡五官者以候五藏肺病者喘息鼻張肝病者目眥青脾病者唇黄心病者舌捲顴赤腎病者顴與顔黑故肺氣通於鼻鼻和則能知香臭矣心氣通於舌舌和則能知五味矣素問曰心在竅為耳一云舌夫心者火也腎者水也水火既濟心氣通於舌舌非竅也其通於竅者寄在於耳王砅云手少隂之絡會于耳中故肝氣通於目目和則能視五色矣素問曰諸脉者皆屬於目又九卷曰心藏肺肺舍神神明通體故云屬目脾氣通於口口和則能别五榖味矣腎氣通於耳耳和則能聞五音矣素問曰腎在竅為耳然則腎氣上通於耳下通於隂也五藏不和則九竅不通六府不和則留結為癰故邪在府則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣邪在藏則隂脈不和隂脈不和則血留之血留之則隂氣盛矣隂氣太盛則陽氣不得相營也故曰格隂陽俱盛不得自相營也故曰闗格闗格者不得盡一作盡期而死矣五藏大小六府應候第五黄帝問曰人俱受氣於天其有獨盡夭夀者不免於病者何也岐伯對曰五藏者固有大小髙下堅脆端正偏傾者六府亦有大小長短厚薄結直緩急者凡此二十五變者各各不同或善或惡或吉或凶也心小則安邪弗能傷太素云外邪不能傷易傷於憂心大則憂弗能傷易傷於邪太素亦作外邪心髙則滿於肺中悶而善忘難開以言心下則藏外易傷於寒易恐以言心堅則藏安守固心脆則善病消癉熱中心端正則和利難傷心偏傾則操持不一無守司也楊上善云心藏言神有八變後四藏但言藏變不言神變者以神為魂魄意之主言其神變則四藏可知故畧而不言也肺小則少飲不病喘一作喘喝肺大則多飲善病胸痺逆氣肺髙則上氣喘息欬逆肺下則逼賁廹肺善脇下痛肺堅則不病欬逆上氣肺脆則善病消癉易傷也一云易傷於熱喘息鼻衂肺端正則和利難傷肺偏傾則病胸脇偏痛肝小則安無脇下之病肝大則逼胃迫咽迫咽則善一作苦膈中且脇下痛肝髙則上支賁加脇下急為息賁肝下則逼胃脇下空空則易受邪肝堅則藏安難傷肝脆則善病消癉易傷肝端正則和利難傷肝偏傾則脇下偏痛脾小則安難傷於邪脾大則善腠䏚音停而痛不能疾行脾髙則䏚引季脇而痛脾下則下加於大腸下加於大腸則藏外易受邪脾堅則藏安難傷脾脆則善病消癉易傷脾端正則和利難傷脾偏傾則瘈瘲善脹腎小則安難傷腎大則一本云耳聾或鳴汁出善病腰痛不可以俯仰易傷於邪腎髙則善病背膂痛不可以俯仰一云背急綴耳膿血出或生肉塞腎下則腰尻痛不可俯仰為狐疝腎堅則不病腰痛腎脆則善病消癉易傷腎端正則和利難傷腎偏傾則善病凥痛凡此二十五變者人之所以善常病也曰何以知其然曰赤色小理者心小粗理者心大無􅐳骭者心髙􅐳骬小短舉者心下􅐳骬長者心堅􅐳骬弱小以薄者心脆􅐳骬直下不舉者心端正􅐳骬一作面一方者心偏傾白色小理者肺小粗理者肺大巨肩反一作大膺陷喉者肺髙合腋張脇者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正膺偏竦一作欹者肺偏傾青色小理者肝小粗理者肝大廣胸反骹者肝髙合脇脆骹者肝下胷脇好者肝堅脇骨弱者肝脆膺脇腹好相得者肝端正脇骨偏舉者肝偏傾黄色小理者脾小粗理者脾大掲唇者脾髙唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾黑色小理者腎小粗理者腎大耳髙者腎髙耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏髙者腎偏傾凡此諸變者持則安減則病也曰願聞人之有不可病者至盡夭夀雖有深憂大恐怵􅅥之志猶弗能感也大寒甚熱弗能傷也其有不離屏蔽室内乂無怵􅅥之恐然不免於病者何也曰五藏六府邪之舍也五藏皆小者少病善焦心人愁憂五藏皆大者緩於事難使以憂五藏皆髙者好髙舉措五藏皆下者好出人下五藏皆堅者無病五藏皆脆者不離於病五藏皆端正者和利得人心五藏皆偏傾者邪心善盜不可為人卒反復言語也曰願聞六府之應曰肺合大腸大腸者皮其應也素問曰肺之合皮也其榮毛也其主心也下章言腎之應毫毛於義為錯心合小腸小腸者脈其應也素問曰心之合肺也其榮色也其主腎也其義相順肝合膽膽者筋其應也素問曰肝之合筋也其榮爪也其主肺也其義相順脾合胃胃者肉其應也素問曰脾之合肉也其榮唇也其主肝也其義相順腎合三焦膀胱三焦膀胱者腠理毫毛其應也九卷又曰腎合骨素問曰腎之合骨也其榮髪也其主脾也其義相同曰應之奈何曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裏大者大腸緩而長皮急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈冲小者小腸小而短諸陽經脈皆多紆屈者小腸結脾應肉肉㬷堅大者胃厚肉㬷麽者胃薄肉㬷小而麽者胃不堅肉㬷不稱其身者胃下胃下者小脘約不利太素作下脘未約肉㬷不堅者胃緩肉㬷無小裹絫標𦂳一本作無小裹累者胃急肉㬷多小裹絫一本亦作累宇者胃結胃結者上脘約不利肝應筋爪厚色黄者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多文者膽結腎應骨宻理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疎者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結曰薄厚美惡皆有其形願聞其所病曰各視其外應以知其内藏則知所病矣十二原第六五藏有六府六府有十二原十二原者出於四闗四闗主治五藏五藏有疾當取之十二原十二原者五藏之所以禀三百六十五骨之氣味者也五藏有疾出于十二原而原各有所出明知其原覩其應知五藏之害矣陽中之少隂肺也其原出於大淵二陽中之太陽心也其原出於太陵二隂中之少陽肝也其原出於太衝二隂中之太隂腎也其原出於太谿二隂中之至隂脾也其原出於太白二膏之原出於鳩尾一肓之原出於脖滿没切胦烏朗切一凡十二原主治五藏六府之有病者也脹取三陽飱泄取三隂一云滯取三隂今夫五藏之有病譬猶刺也猶汚也猶結也猶閉也刺雖久猶可拔也汚雖久猶可雪也結雖久猶可解也閉雖久猶可决也或言久疾之不可取者非其説也夫善用鍼者取其疾也猶拔剌也猶雪汚也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也十二經水第七黄帝問曰經脉十二者外合于十二經水而内屬于五藏六府夫十二經水者受水而行之五藏者合神氣魂魄而藏之六府者受榖而行之受氣而揚之經脉者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎岐伯對曰藏之堅脆府之大小榖之多少脉之長短血之清濁氣之多少十二經中多血少氣與其少血多氣與其皆多氣血與其皆少血氣皆有定數其治以鍼灸各調其經氣固其常有合也此人之參天地而應隂陽不可不審察之也足陽明外合於海内屬於腎足太陽外合於清水内屬於膀胱而通水道焉足少陽外合於渭水内屬於膽足太隂外合於湖水内屬於脾足厥隂外合於澠水内屬於肝足少隂外合於汝水内屬於腎手陽明外合於江水内屬於大腸手太陽外合於淮水内屬於小腸而水道出焉手少陽外合於漯水内屬於三焦手太隂外合於河水内屬於肺手心主外合於漳水内屬於心包手少隂外合於濟水内屬於心凡此五藏六府十二經水者皆外有源泉而内有所禀此皆内外相貫如環無端人經亦然故天為陽地為隂腰以上為天下為地故海以北者為隂湖以北者為隂中之隂漳以南者為陽河以北至漳者為陽中之隂漯以南至江者為陽中之陽此一州之隂陽也此人所以與天地相參也曰夫經水之應經脉也其逺近之淺深水血之多少各不同合而刺之奈何曰足陽明五藏六府之海也其脉大而血多氣盛熱壯刺此者不深弗敢不留不寫足陽明多血氣刺深六分留十呼足少陽少血氣刺深四分留五呼足太陽多血氣刺深五分留七呼足太隂多血少氣刺深三分留四呼足少隂少血多氣刺深二分留三呼足厥隂多血少氣刺深一分留一呼手之隂陽其受氣之道近其氣之来也疾其刺深皆無過二分留皆無過一呼其少長小大肥瘦以心料之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脉濇刺而過此者則脱氣曰夫經脉之大小血之多少膚之厚薄肉之堅脆及㬷之大小可以為度量乎曰其可為量者取其中度者也不甚脱肉而血氣不衰者也若失度人之痟音消渇病瘦而形肉脱者惡可以度量刺乎審切循捫按視其寒温盛衰而調之是謂因適而為之真也四海第八人有四海十二經水者皆注于海有髓海有血海有氣海有水榖之海胃者為水榖之海其腧上在氣街下至三里衝脉者為十二經之海其腧上在大杼下出巨虚上下亷膻中者為氣之海其腧上在柱骨之上下前在人迎腦者為髄之海其腧上在其葢下在風府凡此四海者得順者生得逆者敗知調者利不知調者害曰四海之逆順奈何曰氣海有餘則氣滿胷中悗急息面赤不足則氣少不足以言血海有餘則常想其身大怫鬱也然不知其所病不足則常想其身小狭然不知其所病水榖之海有餘則腹脹滿不足則饑不受榖食髄海有餘則輕勁多力自過其度不足則腦轉耳鳴脛胻痠眩冒目無所見懈怠安卧曰調之奈何曰審守其腧而調其虚實無犯其害順者得復逆者必敗氣息週身五十營四時日分漏刻第九黄帝問曰五十營奈何岐伯對曰週天二十八宿宿三十六分人氣行一週千八分人經絡上下左右前後二十八脉週身十六大二尺以應二十八宿漏水下百刻以分晝夜故人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸十息脉行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十分有竒五百四十息氣行再周於身下水四刻日行四十分有竒二千七百息氣行十周於身下水二十刻日行五宿二百十分有竒一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脉已終矣王砅曰此畧而言之也細言之則常以一千周加一分又十分分之六乃竒分盡也所謂交通者并行一數也故五十營備得盡天地之夀矣氣凡行八百一十丈也一日一夜五十營以營五藏之精不應數者謂之狂生所謂五十營者五藏皆受氣也此段舊在經脉根結之末今移在此曰衛氣之行出入之㑹何如曰嵗有十二月日有十二辰子午為經夘酉為緯天一面七宿周天四七二十八宿房昴為緯張虚為經是故房至畢為陽昴至心為隂陽主晝隂主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於隂亦二十五周周於五藏一本作嵗是故平旦隂氣盡陽氣出於目目張則氣行於頭循於項下足太陽循背下至小指端其散者分於目别一云别於日鋭眥下手太陽下至手小指外側其散者别於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間别者以上至耳前合於頷脉注足陽明下行至跗上入足五指之間其散者從耳下手陽明入大指之間入掌中直至於足入足心出内踝下行隂分復合於目故為一周是故日行一舍人氣行於身一周與十分身之八日行二舍人氣行於身三周與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有竒分與十分身之四陽盡於隂隂受氣矣其始入於隂常從足少隂注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周是故夜行一舍人氣行於身一云隂藏一周與十分藏之八亦如陽之行二十五周而復會於目隂陽一日一夜舍於竒分十分身之四與十分藏之四一作二上文十分藏之八此言十分藏之四疑有悞是故人之所以卧起之時有早宴者以竒分不盡故也曰衛氣之在身也上下往来無已其候氣而刺之奈何曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀夜盡為始是故一日一夜漏水百刻二十五刻者半日之度也常如是無巳日入而止隨日之長短各以為紀謹候氣之所在而刺之是謂逢時病在於陽分必先候其氣之加在於陽分而刺之病在於隂分必先候其氣之加在於隂分而刺之謹候其時病可與期失時反候百病不除水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在隂分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在隂分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在隂分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在隂分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在隂分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在隂分水下二十五刻人氣在太陽此少半日之度也從房至畢一十四度水下五十刻半日之度也從昴至心亦十四度水下五十刻終日之度也日行一舍者水下三刻與十分素問作七刻之四大要常以日加之於宿上也則知人氣在太陽是故日行一宿人氣在三陽與隂分常如是無已與天地同紀紛紛􅀈􅀈普巴切終而復始一日一夜水行百刻而盡矣故曰刺實者刺其来刺虚者刺其去此言氣之存亡之時以候虛實而刺之也營氣第十營氣之道内榖為寳榖入於胃氣𫝊之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太隂出循臂内上亷注手陽明上行至面注足陽明下行至跗上注大指間與太隂合上行抵脾從脾注心中循手少隂出腋下臂注小指之端合手太陽上行乗腋出䪼一作項内注目内眥上巔下項合足太陽循脊下凥下行注小指之端循足心注足少隂上行注腎從腎注心外散於胸中循心注脉出腋下臂入一作出兩筋之間入掌中出手中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脇注足少陽下行至跗上復從跗注大指間合足厥隂上行至肝從肝上注鬲上循喉嚨入頏顙之竅究于畜門一作闗其支别者上額循巔下項中循脊入骶音氐是督脉也絡隂器上過毛中入臍中上循腹裏入缺盆下注肺中復出太隂此營氣之行逆順之常也營衛三焦第十一黄帝問曰人焉受氣隂陽焉會何氣為營何氣為衛營安從生衛安從會老壯不同氣隂陽異位願聞其會岐伯對曰人受氣於榖榖入於胃氣傳於肺五藏六府皆以受氣其清者為營濁者為衛營行脉中衛行脉外營周不休五十而復大㑹隂陽相貫如環無端衛氣行於隂二十五度行於陽亦二十五度分為晝夜故至陽而起至隂而止故日中而陽隴一作襲下同為重陽夜半而隂隴為重隂故太隂主内太陽主外各行二十五度分為晝夜夜半為隂隴夜半後而隂衰平旦隂盡而陽受氣日中為陽隴日西而陽衰日入陽盡而隂受氣夜半而大㑹萬民皆卧名曰合隂平旦隂盡而陽受氣如是無已與天地同紀曰老人不夜瞑少壯不夜寤者何氣使然曰壯者之氣血盛其肌肉滑氣道利營衛之行不失其常故晝精而夜瞑老者之氣血減其肌肉枯氣道濇五藏之氣相薄營氣衰少而衛氣内伐故晝不精而夜不得瞑曰願聞營衛之所行何道從始曰營出於中焦衛出於上焦上焦出於胃口並咽以上貫膈而布胷中走腋循足太隂之分而行還注手陽明上至舌下注足陽明常與營俱行於隂陽各二十五度為一周故日夜五十周而復始大會於手太隂曰人有熱飲食下胃其氣未定則汗出於面或出於背或出於身半其不循衛氣之道而出何也曰此外傷於風内開腠理毛蒸理泄衛氣走乏固不得循其道此氣悍慓滑疾見開而出故不得從其道名曰漏泄中焦亦並於胃口出上焦之後此所以受氣泌糟粕蒸津液化其精微上注於肺乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣曰血之與氣異名同類何也曰營衛者精氣也血者神氣也故血之與氣異名同類也故奪血者無汗奪汗者無血故人有兩死而無兩生也下焦者别於廻腸注於膀胱而滲入焉故水榖者常并居於胃中成糟粕而俱下於大腸而為下焦滲而俱下滲泄别汁循下焦而滲入膀胱也曰人飲酒酒亦入胃米未熟而小便獨先下者何也曰酒者熟榖之液也其氣悍以滑一作清故後榖而入先榖而液出也故曰上焦如霧中焦如漚下焦如瀆此之謂也隂陽清濁精氣津液血脉第十二黄帝問曰願聞人氣之清濁者何也岐伯對曰受榖者濁受氣者清清者注隂濁者注陽濁而清者上出於咽清而濁者下行於胃清者上行濁者下行清濁相干名曰亂氣曰夫隂清而陽濁濁中有清清中有濁别之奈何曰氣之大别清者上注於肺濁者下流於胃胃之清氣上出於口肺之濁氣下注于經内積于海曰諸陽皆濁何陽獨甚曰手太陽獨受陽之濁手太隂獨受隂之清其清者上走孔竅其濁者下行諸經故諸隂皆清足太隂獨受其濁曰治之奈何曰清者其氣滑濁者其氣濇此氣之常也故刺隂者深而留之刺陽者淺而疾取之清濁相干者以數調之也曰人有精氣津液血脉何謂也曰兩神相摶合而成形常先身生是謂精上焦開發宣五榖味熏膚充身澤毛若霧露之溉是謂氣腠理發泄汗出腠理一作溱溱是謂津榖入氣滿淖澤注於骨骨屬屈伸出洩補益腦髄皮膚潤澤是謂液中焦受汁變化而赤是謂血擁遏營氣令無所避是謂脉也曰六氣者有餘不足氣之多少腦髄之虚實血脉之清濁何以知之曰精脱者耳聾氣脱者目不明津脱者腠理開汗大泄液脱者骨痺屈伸不利色夭腦髄消胻痠耳數鳴血脱者色白夭然不澤脉脱者其脉空虚此其候也曰六氣貴賤何如曰六氣者各有部主也其貴賤善惡可為常主然五榖與胃為大海也津液五别第十二黄帝問曰水榖入于口輸于腸胃其液别為五天寒衣薄則為溺與氣天暑衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣内熱則氣為之閉塞而不行不行則為水脹不知其何由生岐伯對曰水榖皆入於口其味有五分注其海津液各走其道故上焦一作三焦出氣以温肌肉充皮膚者為津其留而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濇不行水下留於膀胱則為溺與氣五藏六府心為之主耳為之聴目為之視肺為之相肝為之將脾為之衛腎為之主外故五藏六府之津液盡上滲於目心悲氣并則心系急急則肺葉舉舉則液上溢夫心系急肺不能常舉乍上乍下故欬而涎出矣中熱則胃中消榖消榖則蟲上下作矣腸胃克郭故胃緩緩則氣逆故唾出矣五榖之津液和合而為膏者内滲入於骨空補益腦髄而下流於隂股隂陽不和則使液溢而下流於隂髄液皆減而下下過度則虛虚則腰脊痛而胻痠隂陽氣道不通四海閉塞三焦不瀉津液不化水榖并於腸胃之中别於廻腸留於下焦不得滲於膀胱則下焦脹水溢則為水脹此津液五别之順逆也竒邪血絡第十四黄帝問曰願聞其竒邪而不在經者何也岐伯對曰血絡是也曰刺血絡而仆者何也血出而射者何也血出黒而濁者血出清而半為汁者何也發鍼而腫者何也血出若多若少而面色蒼蒼然者何也發鍼而面色不變而煩悶者何也血出多而不動摇者何也願聞其故曰脉氣甚而血虚者刺之則脱氣脱氣則仆血氣俱盛而隂氣多者其血滑刺之則射陽氣積蓄久留不瀉者其血黑以濁故不能射新飲而液滲於絡而未和合於血故血出而汁别焉其不新飲者身中有水久則為腫隂氣積於陽其氣因於絡故刺之血未出而氣先行故腫隂陽之氣其新相得而未和合因而瀉之則隂陽俱脱表裏相離故脱色而蒼蒼然也刺之不變而煩悶者刺絡而虚經虚經之屬於隂者隂氣脱故煩悶隂陽相得而合為痺者此為内溢於經而外注於絡如是隂陽皆有餘雖多出血弗能虚也曰相之奈何曰血脉盛堅横以赤上下無常處小者如鍼大者如筯刺而瀉之萬全故無失數失數而返各如其度曰鍼入肉著何也曰熱氣因於鍼則熱熱則肉著於鍼故堅焉五色第十五雷公問曰聞風者百病之始也厥逆寒濕之所起也别之奈何黄帝荅曰當候眉間太素作闗中薄澤為風冲濁為痺在地為厥此其常也各以其色言其病也曰人有不病卒死何以知之曰大氣入於藏府者不病而卒死矣曰凡病少愈而卒死者何以知之曰赤色出於兩顴大如拇指者病雖少愈必卒死黑色出於顔太素作庭大如拇指不病亦必卒死矣曰其死有期乎曰察其色以言其時顔者首面也眉間以上者咽喉也太素眉間以上作闗上眉間以中太素亦作闗中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也俠傍者腎也常腎者臍也面王古本作壬字以上者小腸也面王以下者膀胱字子處也顴者肩也後顴者臂也臂以下者手也目内眥上者膺乳也俠繩而上者背也循牙車以上者股也中央者膝也膝以下者胻也當胻以下者足也巨分者股裏也巨屈者膝臏也此五藏六府支局一作節之部也五藏五色之見者皆出其部也其部骨陷者必不免於病也其部色乗襲者雖病甚不死也曰五官具五色何也曰青黑為痛黄赤為熱白為寒是謂五官曰以色言病之間甚奈何曰其色麄以明者為間沈堊一作天下同者為甚其色上行者病亦甚其色下行如雲徹散者病方已五色各有藏部有外部有内部其色從外部走内部者其病從外走内其色從内部走外部者其病從内走外病生於内者先治其隂後治其陽反者益甚病生於外者先治其陽後治其隂太素云病生於陽者先治其外後冶其内與此文異義同反者益甚用陽和隂用隂和陽審明部分萬舉萬當能别左右是謂大通男女異位故曰隂陽審察澤堊謂之良工沉濁為内浮清為外黄赤為風青黑為痛白為寒黄而膏澤者為膿赤甚者為血痛甚者為攣寒甚者為皮不仁各見其部察其浮沉以知淺深審其澤堊以觀成敗察其散浮以知近逺視色上下以知病處積神於心以知往今故相氣不㣲不知是非屬意勿去乃知新故色明不粗沉堊為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乗心心先病腎為應色其一作皆如是男子色在面王為少腹痛下為卵痛其圜直為莖痛髙為本下為首狐疝㿗隂病之屬也女子色在面王為膀胱字子處病散為痛薄為聚方圓左右各如其色形其随而下至骶為淫有潤如膏狀為暴食不潔左為右一作左右為左一作右其色有邪聚空滿而不端面色所指者也色者青黒赤白黄皆端滿有别鄉别鄉赤者其色亦赤大如榆筴在面王為不月其色上鋭首空上向下鋭下向在左右如法以五色命藏青為肝赤為心白為肺黄為脾黑為腎肝合筋青當筋心合脉赤當脉脾合肉黄當肉肺合皮白當皮腎合骨黒當骨夫精明五色者氣之華也赤欲如白裹朱不欲如赭色也白欲如白璧之澤一云鵞羽不欲如堊一云鹽也青欲如蒼璧之澤不欲如藍也黄欲如羅裹雄黄不欲如黄土也黑欲如重漆色不欲如炭素問作地蒼也五色精微象見其夀不乆也青如草滋黑如炲煤黄如枳實赤如衃音披血白如枯骨此五色見而死也青如翠羽黒如烏羽赤如雞冠黄如蟹腹白如豕膏此五色見而生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹括蔞實生於腎如以縞裹紫此五藏所生之外營也凡相五色面黄目青面黄目赤面黄目白面黄目黑者皆不死也面青目赤一作青面赤目白面青目黒面黒目白面赤目青者皆死也隂陽二十五人形性血氣不同第十六黄帝問曰人有隂陽何謂隂人何謂陽人少師對曰天地之間不離於五人亦應之非徒一隂一陽而已葢有太隂之人少隂之人太陽之人少陽之人隂陽和平之人凡此五人者其態不同其筋骨血氣亦不同也太隂之人貪而不仁下齊湛湛好内而惡出心抑而不發不務於時動而後人此太隂之人也少隂之人少貪而賊心見人有亡常若有得好傷好害見人有榮乃反愠怒心嫉而無恩此少隂之人也太陽之人居處于于好言大事無能而虚説志發於四野舉措不顧是非為事如常自用事雖敗而無改一作悔此太陽之人也少陽之人諟諦好自貴有小小官則髙自宣好為外交而不内附此少陽之人也隂陽和平之人居處安静無為懼懼無為欣欣婉然從物或與不争與時變化尊而謙讓卑而不諂是謂至治古之善用鍼灸者視人五態乃治之盛者瀉之虚者補之太隂之人多隂而無陽其隂血濁其衛氣濇隂陽不和緩筋而厚皮不之疾瀉不能移之少隂之人多隂而少陽小胃而大腸六府不調其陽明脉小而太陽脉大必審而調之其血易脱其氣易敗太陽之人多陽而無隂必謹調之無脱其隂而寫其陽陽重脱者易狂隂陽皆脱者暴死不知人少陽之人多陽而少隂經小而絡大血在中而氣在外實隂而虚陽獨寫其絡脉則强氣脱而疾中氣重不足病不起矣隂陽和平之人其隂陽之氣和血脉調宜謹審其隂陽視其邪正安其容儀審其有餘察其不足盛者寫之虚者補之不盛不虚以經取之此所以調隂陽别五態之人也太隂之人其状黮黮音朕然黑色念然下意臨臨然長大㬷音窘然未僂少隂之人其狀清然竊然固以隂賊立而躁險行而似伏太陽之人其狀軒軒儲儲反身折膕少陽之人其狀立則好仰行則好摇其兩臂兩臂肘皆出於背隂陽和平之人其狀逶逶然随随然顒顒然衮衮然豆豆然衆人皆曰君子一本多愉愉然䁢䁢然黄帝問曰余聞隂陽之人於少師少師曰天地之間不離於五故五五二十五人之形血氣之所生别而以候從外知内何如岐伯對曰先立五形金木水火土别其五色異其五聲而二十五人具也木形之人比於上角蒼色小頭長面大肩平背直身小手足好有材好勞心少力多憂勞於事耐春夏不耐秋冬感而成病主足厥隂佗佗然太角一曰左角之人比於左足少陽少陽之上遺遺然右角一曰少角之人比於右足少陽少陽之下随随然鈦角音太一曰右角之人比於右足少陽少陽之下鳩鳩然一曰推推然判角之人比於左足少陽少陽之下括括然火形之人比於上徵赤色廣䏖兑面小頭好肩背髀腹小手足行安地疾心行摇肩背肉滿有氣輕財必信多慮見事明了好顔急心不夀暴死耐春夏不耐秋冬感而生病主手少隂竅竅然一曰核核然太徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆然慆音剔又音倘右徴之人比於右手太陽太陽之上鮫鮫然一曰熊熊然判徵之人比於左手太陽太陽之下支支然熙熙然土形之人比於上宫黄色大頭圓面美肩背大腹好股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人耐秋冬不耐春夏春夏感而生病主足太隂敦敦然太宫之人比於左足陽明陽明之上婉婉然加宫之人比於左足陽明陽明之下烗烗音欬然一曰坎坎然少宫之人比於右足陽明陽明之上樞樞然左宫之人比於右足陽明陽明之下兀兀然一曰衆之人一曰陽明之上金形之人比於上商白色小頭方面小肩背小腹小手足如骨發踵外骨輕身一曰發動輕身清亷急心静悍善為吏耐秋冬不耐春夏春夏感而生病主手太隂敦敦然太商之人比於左手陽明陽明之上亷亷然右商之人比於左手陽明陽明之下脱脱然左商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽黑色大頭面不平一云曲面廣頤小肩大腹小手足小作大發行摇身下凥長背延延然不敬畏善欺紿人殆戮死耐秋冬不耐春夏春夏感而生病主足少隂汚汚然太羽之人比於右足太陽太陽之上頰頰然少羽之人比於左足太陽太陽之下紆紆然衆之為人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然曰得其形不得其色何如曰形勝色色勝形者至其勝時年加害則病行失則憂矣形色相得富貴大樂曰其形色相勝之時年加可知乎曰凡人之大忌常加七嵗九嵗十六嵗二十五嵗三十四嵗四十三嵗五十二嵗六十一嵗皆人之忌不可不自安也感則病失則憂矣曰脉之上下血氣之候以知形氣奈何曰足陽明之上血氣盛則鬚美長血多氣少則鬚短氣多血少則鬚少血氣俱少則無鬚兩吻多畫鬚字一本俱作髯字吻音穏足陽明之下血氣盛則下毛美長至胷血多氣少則下毛美短至臍行則善髙舉足足大指少肉足善寒血少氣多則肉善瘃瘃音斸血氣皆少則無毛有則稀而枯瘁善痿厥足痺足少陽之上血氣盛則通鬚美長血多氣少則通鬚美短血少氣多則少鬚血氣皆少則無鬚感於寒濕則善痺骨痛爪枯足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦而無肉足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多小理血少氣盛則面多肉血氣和則美色足太隂之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛手陽明之上氣血盛則上髭美血少氣多則髭惡血氣皆少則善轉筋無髭手陽明之下血氣盛則腋下毛美手魚肉以温氣血皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手拳多肉以温血氣皆少則瘦以寒氣少血多則瘦以多脉手太陽之上血氣盛則多髯面多肉以平血氣皆少則面瘦黒色手太陽之下血氣盛則掌肉克滿血氣皆少則掌瘦以寒黄赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥隂常多氣少血少隂常多血少氣太隂常多血少氣此天之常數也曰二十五人者刺之有約乎曰美眉者足太陽之脉血氣多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知順逆矣曰刺其隂陽奈何曰按其寸口人迎以調隂陽切循其經絡之凝泣結而不通者此於身背為痛痺甚則不行故凝泣凝泣者致氣以温之血和乃止其結絡者脉結血不行決之乃行故曰氣有餘於上者導而下之氣不足於上者推而往之其稽留不至者因而迎之必明於經隧乃能持之寒與熱争者導而行之其宛陳血不結者即而取之必先明知二十五人别血氣之所在左右上下則刺約畢矣曰或神動而氣先鍼行或氣與鍼相逢或鍼已出氣獨行或數刺之乃知或發鍼而氣逆或數刺病益甚凡此六者各不同形願聞其方曰重陽之盛人其神易動其氣易往也矯矯蒿蒿一本作熇熇髙髙言語善疾舉足喜髙心肺之藏氣有餘陽氣滑盛而揚故神動而氣先行此人頗有隂者也多陽者多喜多隂者多怒數怒者易解故曰頗有隂其隂陽之離合難故其神不能先行隂陽和調者血氣淖澤滑利故鍼入而氣出疾而相逢也其隂多而陽少隂氣沉而陽氣浮者内藏故鍼已出氣乃随其後故獨行也其多隂而少陽者其氣沉而氣往難故數刺之乃知其氣逆與其數刺病益甚者非隂陽之氣也沉浮之勢也此皆粗之所敗工之所失其形氣無過也鍼灸甲乙經卷一
