body:
  text: 鍼灸甲乙經卷五晉皇甫謐撰鍼灸禁忌第一上黄帝問曰四時之氣各不同形百病之起皆有所生灸刺之道何者為寳岐伯對曰四時之氣各有所生灸刺之道氣穴為寳故春刺絡脈諸滎大經分肉之間甚者深取之間者淺取之素問曰春刺散俞及與分理血出而止又曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉之間九卷云春刺滎者正同於義為是又曰春取絡脈治皮膚又曰春取經與脈分肉之間二者義亦畧同又曰春氣在經脈夏取諸俞孫絡肌肉皮膚之上又曰春刺俞二者正同於義為是長夏刺經又曰取盛經絡取分間絶皮膚又曰夏取分腠治肌肉義亦畧同素問曰夏刺絡俞見血而止又曰夏者火始治心氣始長脈瘦氣弱陽氣流一作留溢血温於腠内至於經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脈也義亦畧同又曰夏氣在孫絡長夏氣在肌肉秋刺諸合餘如春法秋取經俞邪氣在府取之於合素問曰秋刺皮膚循理上下同法又曰秋者金始治肺將收殺金將勝火陽氣在合隂初勝濕氣反體隂氣未盛未能深入故取俞以瀉隂邪取合以虚陽邪陽氣始衰故取於合是謂始秋之治變也又曰秋氣在膚閉腠者是也九卷又曰秋取氣口治筋脈於義不同冬取井諸俞之分欲深而留之又曰冬取井滎素問曰冬取俞竅及於分理甚者直下間者散下俞竅與諸俞之分義亦畧同又曰冬者水始治腎方閉陽氣衰少隂氣堅盛巨陽伏沉陽脈乃去取井以下隂逆取滎以通氣一云以實陽氣又曰冬取井滎春不􅍠衂是謂末冬之治變也又曰冬氣在骨髓又曰冬刺井病在藏取之井二者正同於義為是又曰冬取經俞治骨髓五藏五藏則同經俞有疑春刺夏分脈亂氣微入淫骨髓病不得愈令人不嗜食又且少氣春刺秋分筋攣逆氣環為欬嗽病不愈令人時驚又且笑一作哭春刺冬分邪氣著藏令人腹脹病不愈又且欲言語夏刺春分病不愈令人解墮夏刺秋分病不愈令人心中悶無言惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒秋刺春分病不愈令人惕然欲有所為起而忘之秋刺夏分病不愈令人益嗜卧又且善夢謂立秋之後秋刺冬分病不愈令人悽悽時寒冬刺春分病不愈令人欲卧不能眠眠而有見謂十二月中旬以前冬刺夏分病不愈令人氣上發為諸痺冬刺秋分病不愈令人善渴足之陽者隂中之少陽也足之隂者隂中之太隂也手之陽者陽中之太陽也手之隂者陽中之少隂也正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陽十月十一月十二月人氣在左無刺左足之陽刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾音魂之脈無刺病與脈相逆者上工刺其未生者也其次刺其未成者也其次刺其已衰者也下工刺其方襲者與其形之盛者與其病之與脈相逆者也故曰方其盛也勿敢毁傷刺其已衰事必大昌故曰上工治未病不治已病大寒無刺大温無凝月生無寫月滿無補月郭空無治新内無刺已刺勿内大怒無刺已刺勿怒大勞無刺已刺勿勞大醉無刺已刺勿醉大飽無刺已刺勿飽大饑無刺已刺勿饑已渴無刺已刺勿渴乘車來者卧而休之如食頃乃刺之步行來者坐而休之如行十里頃乃刺之大驚大怒必定其氣乃刺之凡禁者脈亂氣散逆其榮衛經氣不次因而刺之則陽病入於隂隂病出於陽則邪復生粗工不察是謂伐形身體淫濼反消骨髓津液不化脱其五味是謂失氣也曰願聞刺淺深之分曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨曰余不知所謂願聞其詳曰刺骨無傷筋者鍼至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也刺皮無傷肉者病在皮中鍼入皮無中肉也刺肉無傷筋者過肉中筋刺筋無傷骨者過筋中骨此之謂反也刺中心一日死其動為噫刺中肺三日死其動為欬刺中肝五日死其動為穴素問作語刺中脾十五日死其動為吞素問作十日一作五日刺中腎三日死其動為􅅉素問作六日一作七日刺中膽一日半死其動為嘔刺中膈為傷中其病雖愈不過一嵗必死刺跗上中大脈血出不止死刺隂股中大脈血出不止死刺面中流脈不幸為盲刺客主人内陷中脈為漏為聾刺頭中腦户入腦立死刺膝臏出液為跛刺舌下中脈太過出血不止為瘖刺臂中太隂脈出血多立死刺足下布絡中脈血不出為腫刺足少隂脈重虚出血為舌難以言刺郄中大脈令人仆脱色刺膺中陷脈素問作刺膺中䧟中肺為喘逆仰息刺氣衝中脈血不出為腫鼠􅀈音卜刺肘中内陷氣歸之為不屈伸刺脊間中髓為傴刺隂股中隂三寸内陷令人遺溺刺乳上中乳房為腫根蝕刺腋下脇間内陷令人欬刺缺盆中内陷氣泄令人喘欬逆刺少腹中膀胱溺出令人少腹滿刺手魚腹内陷為腫刺腨腸内陷為腫刺上陷骨中脈為漏為盲刺闗節中液出不得屈伸鍼灸禁忌第一下黄帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道過之則内傷不及則生外壅壅則邪從之淺深不及及為大賊内傷五藏後生大病故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛腠理無傷皮皮傷則内動肺肺動則秋病温瘧熱厥浙然寒慄刺皮無傷肉肉傷則内動脾脾動則七十二日四季之月病腹脹煩滿不嗜食刺肉無傷脈脈傷則内動心心動則夏病心痛刺脈無傷筋筋傷則内動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則内動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則消濼胻痠體解㑊然不去矣神庭禁不可刺上闗禁不可刺深深則令人耳無所聞顱息刺不可多出血左角刺不可乆留人迎刺過深殺人雲門刺不可深深則使人逆息不能食臍中禁不可刺伏莵禁不可刺本穴云刺入五分三陽絡禁不可刺復溜刺無多見血承筋禁不可刺然谷刺無多見血乳中禁不可刺鳩尾禁不可刺右刺禁頭維禁不可灸承光禁不可灸腦户禁不可灸風府禁不可灸瘖門禁不可灸灸之令人瘖下闗耳中有乾􅀈禁不可灸一作擿耳門耳中有膿禁不可灸人迎禁不可灸絲竹空禁不可灸灸之不幸令人目小或昏承泣禁不可灸脊中禁不可灸灸之使人僂白環俞禁不可灸乳中禁不可灸石門女子禁不可灸氣衝禁不可灸灸之不幸不得息淵腋禁不可灸灸之不幸生腫蝕經渠禁不可灸傷人神鳩尾禁不可灸隂市禁不可灸陽闗禁不可灸天府禁不可灸使人逆息伏莬禁不可灸地五㑹禁不可灸使人瘦瘈脈禁不可灸右禁灸凡刺之道必中氣穴無中肉節中氣穴則鍼游于巷中肉節則皮膚痛補冩反則病益篤中筋則筋緩邪氣不出與直相薄亂而不去反還内著用鍼不審以順為逆也凡刺之理補寫無過其度病與脈逆者無刺形肉已奪是一奪也大奪血之後是二奪也大奪汗之後是三奪也大泄之後是四奪也新産及大下血是五奪也此皆不可瀉也曰鍼能殺生人不能起死人乎曰能殺生人不起死生者是人之所受氣糓糓之所注者胃也胃者水糓氣血之海也海之所行雲雨者天下也胃之所出氣血者經隧也經隧者五藏六府之大絡也逆而奪之而已矣迎之五里中道而止五里而已五往一作注而藏之氣盡矣故五五二十五而竭其俞矣此所謂奪其天氣故曰闚門而刺之者死於家入門而刺之者死於堂帝曰請傳之後世以為刺禁九鍼九變十二節五刺五邪第二黄帝問曰九鍼安生岐伯對曰九鍼者天地之數也天地之數始於一終於九故一以法天二以法地三以法人四以法四時五以法五音六以法六律七以法七星八以法八風九以法九野曰以鍼應九之數奈何曰一者天天者陽也五藏之應天者肺也肺者五藏六府之葢也皮者肺之合也人之陽也故為之治鑱鍼鑱鍼者取法於布一作中鍼去末半寸卒兑之長一寸六分大其頭而兑其末令無得深入而陽氣出主熱在頭身故曰病在皮膚無常處者取之鑱鍼于病所膚白勿取二者地地者土也人之所以應土者肉也故為之治員鍼員鍼者取法於絮鍼筩其身而員其末其鋒如卵長一寸六分以寫肉分之氣令不傷肌肉則邪氣得竭故曰病在分肉間取以員鍼三者人也人之所以成生者血脈也故為之治鍉音兑鍼鍉鍼者取法於黍粟大其身而員其末如黍粟之兑長三寸五分令可以按脈勿陷以致其氣使邪獨出故曰病在脈少氣當補之以鍉鍼鍼於井營分俞四者時也時者人於四時八正之風客於經絡之中為痼病者也故為之治鋒鍼鋒鍼者取法於絮鍼筩其身而鋒其末其刃三隅長一寸六分令可以寫熱出血發泄痼病故曰病在五藏固居者取以鋒鍼寫于井滎分俞取以四時也五者音也音者冬夏之分分于子午隂與陽别寒與熱争兩氣相薄合為癰腫者故為之治鈹鍼鈹鍼者取法於劒令末如劒鋒廣二分半長四寸可以取大膿出血故曰病為大膿血取以鈹鍼六者律也律者調隂陽四時合十二經脈虚邪客於經絡而為㬥痺者也故為之治員利鍼員利鍼者取法於􅈊鍼且員且兑身中微大長一寸六分以取癰腫㬥痺一曰尖如􅈊微大其末反小其身令可深内也故曰痺氣㬥發者取以員利鍼七者星也星者人之七竅邪之所客於經舍於絡而為痛痺者也故為之治毫鍼毫鍼者取法於毫毛長一寸六分令尖如蚊䖟喙静以徐往微以乆留正氣因之真邪俱往出鍼而養主以治痛痺在絡也故曰病痺氣補而去之者取之毫鍼八者風也風者人之股肱八節也八正之虚風傷人内舍於骨解腰脊節腠之間為深痺者也故為之治長鍼長鍼者取法於綦鍼長七寸其身薄而鋒其末令可以取深邪逺痺故曰病在中者取以長鍼九者野也野者人之骨解虚風傷人内舍於骨解皮膚之間也淫邪流溢於身如風水之狀不能過於機闗大節者也故為之治大鍼大鍼者取法於鋒鍼一作鍉針其鋒微員長四寸以寫機闗内外大氣之不能過闗節者也故曰病水腫不能過闗節者取以大鍼凡刺之要官鍼最妙九鍼之宜各有所為長短大小各有所施不得其用病不能移疾淺鍼深内傷良肉皮膚為癰疾深鍼淺病氣不寫反為大膿病小鍼大氣寫大甚病後必為害病大鍼小大氣不寫泄亦為後敗夫鍼之宜大者大寫小者不移以言其過請言其所施凡刺有九以應九變一曰腧刺腧刺者刺諸經榮俞藏俞也二曰道刺道刺者病在上取之下刺府俞也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大瀉刺一作太刺大瀉刺者刺大膿以鈹鍼也七曰毛刺毛刺者刺浮痺於皮膚也八曰巨刺巨刺者左取右右取左也九曰焠刺焠刺者燔鍼取痺氣也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以刺心痺刺此者傍鍼之也二曰報刺報刺者刺痛無常處上下行者直内拔鍼以左手隨病所按之乃出鍼復刺之也三曰恢刺恢刺者直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒熱氣小深者或曰參刺參刺者治痺氣小深者也五曰揚刺揚刺者正内一傍内四而浮之以治寒熱之博大者也六曰直鍼刺直鍼刺者引皮乃刺之以治寒氣之淺者也七曰腧刺腧刺者直入直出稀發鍼而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍搖而深之致鍼骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之此治肌急而寒者也十曰隂刺隂刺者左右率刺之此治寒厥中寒者取踝後少隂也十一曰傍刺傍刺者直刺傍刺各一此治留痺乆居者也十二曰賛刺賛刺者直入直出數發鍼而淺之出血此治癰腫者也脈之所居深不見者刺之微内鍼而乆留之致其脈空脈氣之淺者勿刺按絶其脈刺之無令精出獨出其邪氣耳所謂三刺之則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉之間後刺深之已入分肉之間則榖氣出矣故刺法曰始刺淺之以逐陽邪之氣後刺深之以致隂邪之氣最後刺極深之以下榖氣此之謂也此文解乃後鍼道終始篇三刺及至榖邪之文也故用鍼者不知年之所加氣之盛衰虚實之所起不可以為工矣凡刺有五以應五藏一曰半刺半刺者淺内而疾發鍼無鍼傷肉如拔髮一作毛狀以取皮氣此肺之應也三曰豹文刺豹文刺者左右前後鍼之中脈為故以取經絡之血者此心之應也三曰闗刺闗刺者直刺左右盡筋上以取筋痺慎無出血此肝之應也四曰合谷刺或曰淵刺又曰豈刺合谷刺者左右雞足鍼于分肉之間以取肌痺此脾之應也五曰腧刺腧刺者直入直出深内之至骨以取骨痺此腎之應也曰刺有五邪何謂五邪曰病有持癰者有大者有小者有熱者有寒者是謂五邪凡刺癰邪用鈹鍼無迎隴易俗移性不得膿越道更行去其鄉不安處所乃散亡諸隂陽遇癰所者取之其俞寫也凡刺大邪用鋒鍼曰以少泄奪其有餘乃益虚摽其道鍼其邪于肌内視之無有乃自直道刺諸陽分肉之間凡刺小邪用員鍼曰以大補益其不足乃無害視其所在迎之界逺近盡至不得外侵而行之乃自貴一作費刺分肉之間凡刺熱邪用鑱鍼越而滄出游不歸乃無病為開道乎闢門户使邪得出病乃已凡刺寒邪用毫鍼曰以温徐往疾去致其神門户已閉氣不分虚實得調真氣存繆刺第三黄帝問曰何謂繆刺岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於絡脈留而不去入舍於經脈内連五藏散於腸胃隂陽俱感五藏乃傷此乃邪之從皮毛而入極於五藏之次也如此則治其經焉今邪客於皮毛入舍於孫脈留而不去閉塞不通不得入經溢於大絡而生奇病焉夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不及於經俞名曰繆刺曰以左取右以右取左其與巨刺何以别之曰邪客於經也左盛則右病右盛則左病亦有易且移者左痛未巳而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故曰繆刺巨刺者刺其經繆刺者刺其絡曰繆刺取之何如曰邪客於足少隂之絡令人卒心痛暴脹胷脇反滿無積者刺然谷之前出血如食頃而已左取右右取左病新發者五日巳邪客於手少隂一作陽之絡令人喉痺舌卷口乾心煩臂外亷痛手不及頭刺手中指當作小指次指爪甲上去端如韮葉各一痏音悔壯者立已老者有頃已左取右右取左此新病數日巳邪客於足厥隂之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項痛肩痛刺足小指爪甲上與肉交者各一痏立已不已刺外踝上三痏左取右右取左如食頃已邪客於手陽明之絡令人氣滿胸中喘急而支胠胷中熱刺手大指次指爪甲上去端如韮葉各一痏左取右右取左如食頃已邪客於臂掌之間不得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏邪客於足陽蹻之脈令人目痛從内眥始刺外踝之下半寸所各二痏左取右右取左如行十里頃而已人有所墯墜惡血留於内腹中脹滿不得前後先飲利藥此上傷厥隂之脈下傷少隂之絡刺足内踝之下然骨之前血脈出血刺跗上動脈不已刺三毛上各一痏見血立已左取右右取左善驚善悲不樂刺如右方邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上端如韮葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數右取左左取右凡痺行往來無常處者在分肉間痛而刺之以月生死為數用鍼者隨氣盛衰以為痏數鍼過其日數則脱氣不及其日數則氣不寫左刺右右刺左病如故復刺之如法以月死生為數月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之邪客於足陽明之絡素問作經王冰云以其脈左右交於面部故舉經脈之病以明繆刺之類令人􅍠衂上齒寒刺足中指素問註云刺大指次指爪甲上與肉交者各一痏左取右右取左邪客於足少陽之絡令人脇痛不得息欬而汗出刺足小指素有次指二字爪甲上與肉交者各一痏不得息立已汗出立止欬者温衣飲食一日巳左刺右右刺左病立已不已復刺如法邪客於足少隂之絡令人咽痛不可内食無故善怒氣上走賁上刺足中央之絡各三痏凡六刺立已左刺右右刺左邪客於足太隂之絡令人腰痛引少腹控䏚不可以仰息刺其腰尻之解兩胂之上是腰俞以月死生為痏數發鍼立已左刺右右刺左邪客於足太陽之絡令人拘攣背急引脇而痛内引心而痛刺之從項始數脊椎俠脊疾按之應手而痛刺入傍三痏立已邪客於足少陽之絡令人留於樞中痛髀不得氣一作髀不可舉刺樞中以毫鍼寒則留鍼以月生死為痏數立已諸經刺之所過者不病則繆刺之耳聾刺手陽明不已刺其過脈出耳前者齒齲刺手陽明立已不已刺其脈入齒中者立已邪客於五藏之間其病也脈引而痛時來時止視其病脈繆刺之於手足爪甲上視其脈出其血間者一刺一刺不已五刺已繆傳引上齒齒唇寒素多一痛字視其手背脈血者去之刺足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左嗌中腫不能内唾不能出唾者繆刺然骨之前出血立已左取右右取左自嗌腫至此二十九字素問王冰註原在邪客足少隂絡之下今移在此邪客於手足少隂太隂一作陽足陽明之絡此五絡者皆㑹於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥刺足大指内側爪甲上去端如韮葉後刺足心後刺足中指爪甲上各一痏後刺手大指内側爪甲上端如韮葉後刺手少隂兑骨之端各一痏立已素問又云後刺手心主者非也不已以竹筒吹其兩耳中剔其左角之髮方寸燔治飲以美酒一杯不能飲者灌之立已凡刺之數先視其經脈切而循之審其虚實而調之不調者經刺之有痛而經不病者繆刺之目視其皮部有血絡者盡取之此繆刺之數也鍼道第四夫鍼之要易陳而難入粗守形上守神神乎神客在門未覩其病惡知其原刺之微在速遲粗守闗上守機機之不動不離其空空中之機清浄以微其來不可逢其往不可追知機道者不可掛以髮不知機者叩之不發知其往來要與之期粗之闇乎妙哉上獨有之也往者為逆來者為順明知逆順正行無問迎而奪之惡得無虚追而濟之惡得無實迎而隨之以意和之鍼道畢矣凡用鍼者虚則實之滿則泄之菀陳則除之邪勝則虚之太要曰徐而疾則實疾而徐則虚言其實與虚若有若無察後與先若存若亡為虚為實若得若失虚實之妙九鍼最妙補寫之時以鍼為之寫曰迎之迎之意必持而内之放而出之排揚出鍼疾氣得泄按而引鍼是謂内温血不得散氣不得出補曰隨之隨之意若忘之若行若按如蚊蝱止如留如環去如絶絃令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持鍼之道堅者為實素問作寳正指直刺無鍼左右神在秋毫屬意病者審視血脈刺之無殆方刺之時心在懸陽及與兩衡一作衝神屬勿去如病存亡取血脈者在俞横居視之獨滿切之獨堅夫氣之在脈也邪氣在上濁氣在中清氣在下故鍼陷脈則邪氣出鍼中脈則濁氣出鍼太深則邪反沉病益甚故曰皮肉筋脈各有所處病各有所舍鍼各有所宜各不同形各以任其所宜無實實虚虚損不足益有餘是為重病病益甚取五脈者死取三脈者恇奪隂者厥奪陽者狂鍼害畢矣知其所苦鬲有上下知其氣之所先得其道布而涿之太素作希而疎之稍深而留之故能徐入之大熱在上者推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合寫之鍼所不為灸之所宜上氣不足推而揚之下氣不足積而從之隂陽皆虚火自當之厥而寒甚骨亷陷下寒過於膝下陵三里隂絡所過得之留止寒入於中推而行之經陷下者即火當之結絡堅𦂳火之所治不知其苦兩蹻之下男陽女隂良工所禁鍼論畢矣凡刺虚者實之滿者泄之此皆衆工之所共知也若夫法天則地隨應而動和之若響隨之若影道無鬼神獨來獨往凡刺之真必先治神五藏已定九候已明後乃存鍼衆脈所素作不見衆凶所素作弗聞外内相得無以形先可玩往來乃施於人虚實之要五虚勿近五實勿逺至其當發間不容瞚手動若務鍼耀而匀静意視義觀適之變是謂𡨕𡨕莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如横努起若發機刺虚者須其實刺實者須其虚經氣已至慎守勿失深淺在志逺近若一如臨深淵手如握虎神無營於衆物黄帝問曰願聞禁數岐伯對曰藏有要害不可不察肝生於左肺藏於右心部於表腎治於裏脾為之使胃為之市膈盲之上中有父母七節之傍中有志心素作小心順之有福逆之有咎寫必用方太素作員切而轉之其氣乃行疾入徐出邪氣乃出伸而迎之搖大其穴氣出乃疾補必用員太素作方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以静堅心無解欲微以留氣下而徐出之推其皮葢其外門真氣乃存用鍼之要無忘養神寫者以氣方盛以月方滿以日方温以身方定以息方吸而内鍼乃復候其方吸而轉鍼乃復候其方呼而徐引鍼補者行也行者移也刺必中其榮復以吸排鍼也必知形之肥瘦榮衛血氣之衰盛血氣者人之神不可不謹養形乎形目瞑瞑捫其所痛素作問其所痛索之於經慧然在前按之弗得不知其情故曰形乎神神耳不聞目明心開而志光慧然獨覺口弗能言俱視獨見象若昏昭然獨明若風吹雲故曰神三部九候為之原九鍼之論不必存凡刺之而氣不至無問其數刺之而氣至乃去之勿復鍼鍼各有所宜各不同形各任其所為刺之要氣至而效效之信若風吹雲昭然于天凡刺之道畢矣節之交凡三百六十五㑹知其要者一言而終不知其要者流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也覩其色察其目知其散復一其形聴其動静知其邪正右主推之左持而禦之氣至而去之凡將用鍼必先視脈氣之劇易乃可以治病五藏之氣已絶于内而用鍼者反實其外是謂重竭重竭必死其死也静治之者輒反其氣取腋與膺五藏之氣已絶于外而用鍼者反實其内是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病甚而恇致氣則生為癰􅅑刺鍼必肅刺腫搖鍼經刺勿搖此刺之道也刺諸熱者如手探湯刺寒清者如人不欲行刺虚者刺其去刺實者刺其來刺上闗者㰦不能欠刺下闗者欠不能㰦刺犢鼻者屈不能伸刺内闗者伸不能屈病髙而内者取之隂陵泉病髙而外者取之陽陵泉隂有陽疾者取之下陵三里正往無殆下氣乃止不下復始矣鍼道終始第五凡刺之道畢於終始明知終始五藏為紀隂陽定矣隂者主藏陽者主府陽受氣於四肢隂受氣於五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通隂陽五藏為隂六府為陽謹奉天道請言終始終始者經脈為紀持其脈口人迎以知隂陽有餘不足平與不平天道畢矣所謂平人者不病也不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末相遇寒温相守司形肉血氣必相稱也是謂平人若少氣者脈口人迎俱少而不稱尺寸如是者則隂陽俱不足補陽則隂竭寫隂則陽脱如是者可將以甘藥不可飲以至劑如此者弗灸不已者因而寫之則五藏氣壞矣人迎一盛病在足少陽一盛而躁在手少陽人迎二盛病在足太陽二盛而躁在手太陽人迎三盛病在足陽明三盛而躁在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥隂一盛而躁在手心主脈口二盛病在足少隂二盛而躁在手少隂脈口三盛在足太隂三盛而躁在手太隂脈口四盛俱大且數名曰溢隂溢隂為内闗不通者死不治人迎與太隂脈口俱盛四倍已上名曰闗格闗格者與之短期人迎一盛寫足少陽而補足厥隂二寫一補日一取之必切而騐之疎取之上氣和乃止人迎二盛寫足太陽而補足少隂二寫一補二日一取之必切而騐之疎取之上氣和乃止人迎三盛寫足陽明而補足太隂二寫一補日一取之必切而騐之疎取之上氣和乃止脈口一盛寫足厥隂而補足少陽二補一寫日一取之必切而騐之氣和乃止疎取之脈口二盛寫足少隂而補足太陽二寫一補二日一取之必切而騐之氣和乃止疎取之脈口三盛寫足太隂而補足陽明二補一寫日二取之必切而騐之氣和乃止疎取之所以日二取之者太隂主胃大富於榖故可日二取之也人迎脈口俱盛四倍已上靈樞作三倍名曰隂陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五藏内傷如此者因而灸之則變易為他病矣凡刺之道氣和乃止補隂寫陽音聲益彰耳目聰明反此者血氣不行所謂氣至而有效者寫則脈虚虚者脈大如其故而不堅也大如故而益堅者適雖言快病未去也補則益實實者脈大如其故而益堅也大如故而不堅者適雖言快病未去也故補則實寫則虚病雖不隨鍼減病必衰去矣必先通十二經之所生病而後可傳於終始故隂陽不相移虚實不相傾取之其經凡刺之屬三刺至榖氣邪澼妄合隂陽移居逆順相反浮沉異處四時不相得稽留淫泆須鍼而去故一刺陽邪出再刺隂邪出三刺則榖氣至而止所謂榖氣至者已補而實已寫而虚故知榖氣至也邪氣獨去者隂與陽未能調而病知愈也故曰補則實寫則虚病雖不隨鍼減病必衰去矣此文似解前第三篇中陽盛而隂虚先補其隂後寫其陽而和之隂盛而陽虚先補其陽後寫其隂而和之三脈動於足大指之間必審其虚實虚而寫之是謂重虚重虚病益甚凡刺此者以指按之脈動而實且疾者則寫之虚而徐者則補之反此者病益甚三脈動一作重於大指者謂陽明在上厥隂在中少隂在下膺腧中膺背腧中背肩髀虚者取之上重舌刺舌柱以鈹鍼也手屈而不伸者其病在筋伸而不可屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虚淺刺之以養其脈疾按其痏無使邪氣得入邪氣之來也𦂳而疾榖氣之來也徐而和脈實者深刺之以泄其氣脈虚者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者深刺之諸痛者其脈皆實從腰以上者手太隂陽明主之從腰以下者足太隂陽明主之病在下者髙取之病在上者下取之病在頭者取之足病在腰者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毫毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊刺肥人者以秋冬為之齊刺瘦人者以春夏為之齊刺之痛者隂也痛而以手按之不得者亦隂也深刺之癢者陽也淺刺之病在上者陽也在下者隂也病先起於隂者先治其隂而後治其陽病先起於陽者先治其陽而後治其隂乆病者邪氣入深刺此病者深内而乆留之間日復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形氣未脱少氣而脈又躁躁厥者一作疾字必為繆刺之散氣可收聚氣可布深居静處占神往來閉户塞牗魂魄不散専意一神精氣之分無聞人聲以收其精必一其神令志在鍼淺而留之微而浮之以移其神氣至乃休男女内外堅拒勿出謹守勿内是謂得氣鍼道自然逆順第六前係逆順肥瘦文後係根結文黄帝問曰願聞鍼道自然岐伯對曰用自然者臨深決水不用功力而水可竭也循掘決衝不顧堅密而經可通也此言氣之滑濇血之清濁行之逆順也曰人之黒白肥瘦少長各有數乎曰年質壯大血氣充盛皮膚堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黒色唇臨臨然者其血黒以濁其氣濇以遲其貪於取予刺此者深而留之多益其數曰刺瘦人奈何曰瘦人者皮薄色少肉亷亷然薄唇輕言其血清其氣滑易脱於氣易損於血刺此者淺而疾之曰刺常人奈何曰視其黒白各為調之端正純厚者其血氣和調刺此者無失其常數曰刺壯士真骨者奈何曰刺壯士真骨堅肉緩節騐騐一作監監然此人重則氣濇血濁刺此者深而留之多益其數勁則氣滑血清刺此者淺而疾之也曰刺嬰兒奈何曰嬰兒者其肉脆血少氣弱刺此者以毫鍼淺刺而疾發鍼日再可也曰臨深決水奈何曰血清氣濁疾寫之則氣竭矣曰循掘決衝奈何曰血濁氣濇疾而寫之則氣可通也曰逆順五體經絡之數此皆布衣匹夫之士也食血者九墟作血食之君身體柔脆膚肉耎弱血氣慓悍滑利刺之豈可同乎曰夫膏梁菽藿之味何可同也氣滑則出疾氣濇則出遲氣悍則鍼小而入淺氣濇則鍼大而入深深則欲留淺則欲疾故刺布衣者深以留刺王公大人者微以徐此皆因其氣之慓悍滑利者也曰形氣之逆順奈何曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽俱不足不可復刺之刺之則重不足重不足則隂陽俱竭血氣皆盡五藏空虚筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘者此謂隂陽俱有餘也急寫其虚調其虚實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順真邪相薄實而補之則隂陽血氣皆溢腸胃充郭肺肝内脹隂陽相錯虚而寫之則經脈空虚血氣枯竭腸胃懾辟皮膚薄著毛腠天焦予之死期故曰用鍼之要在于知調調隂與陽精氣乃充合形與氣使神内藏故曰上工平氣中工亂經下工絶氣危生不可不慎也必察其五藏之變化五脈之相應經脈之虚實皮膚之柔麄而後取之也鍼道外揣縱合第七黄帝問曰夫九鍼少則無内大則無外恍惚無窮流溢無極余知其合於天道人事四時之變也余願渾求為一可乎岐伯對曰夫唯道焉非道何可大小淺深離合為一乎哉故逺者司外揣内近者司内揣外是謂隂陽之極天地之葢曰持鍼縱舍奈何曰必先明知十二經之本末皮膚之寒熱脈之盛衰滑濇其脈滑而盛者病日進虚而細者乆以持大以濇者為痛痺隂陽如一者病難治察其本末上下有熱者病常在其熱已衰者其病亦去矣因持其尺察其肉之堅脆大小滑濇寒熱燥濕因視目之五色以知五藏而決死生視其血脈察其五色以知寒熱痺痛曰持鍼縱舍余未得其意也曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手循之無與肉裹寫欲端正補必閉膚轉鍼導氣邪氣不得淫泆真氣以居曰扞皮開腠理奈何曰因其分肉左别其膚微内而徐端之適神不散邪氣得去也鍼灸甲乙經卷五
