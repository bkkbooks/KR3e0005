body:
  text: 鍼灸甲乙經卷十二晉皇甫謐撰欠噦唏振寒噫􅅉軃泣出太息㵪下耳鳴囓舌善忘善饑第一黄帝問曰人之欠者何氣使然岐伯對曰衞氣晝行於陽夜行於隂隂主夜夜主卧陽主上隂主下故隂氣積於下陽氣未盡陽引而上隂引而下隂陽相引故數欠陽氣盡隂氣盛則目瞑隂氣盡陽氣盛則寤腎主吹故寫足少隂補足太陽曰人之噦者何曰糓入胃胃氣上注於肺今有故寒氣與新糓氣俱還入于胃新故相亂真邪相攻相逆復出於胃故為噦肺主噦故補手太隂寫足太隂亦可以草刺其鼻嚏而已無息而疾引之立已大驚之亦可已曰人之唏者何曰此隂氣盛而陽氣虚隂氣疾而陽氣徐隂氣盛而陽氣絶故為唏者隂盛陽絶故補足太陽寫足少隂曰人之振寒者何曰寒氣客於皮膚隂氣盛陽氣虚故為振寒寒慓補諸陽曰人之噫者何曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太隂陽明一云補睂本曰人之􅅉者何曰陽氣和利滿於心出於鼻故為􅅉補足太陽榮睂本一云睂上曰人之軃者何曰胃不實則諸脈虚諸脈虚則筋脈懈惰筋脈懈惰則行隂用力氣不能復故為軃因其所在補分肉間曰人之哀而泣涕者何曰心者五蔵六府之主也目者宗脈之所聚也上液之道也口鼻者氣之門戸也故悲哀愁憂則心動心動則五蔵六府皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經俠頸俠頸者頭中分也曰有哭泣而淚不出者若出而少涕不知水所從生涕所從出也曰夫心者五蔵之専精也目者其竅華色其榮是以人有徳則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生也衆精者積水也素問作水宗積水者至隂也至隂者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫氣之傳也水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲又名曰志悲志與心精共凑於目也是以俱悲則神氣傳於心精上下傳於志而志獨悲故泣出也泣涕者腦也腦者陽也素問作隂髓者骨之充也故腦滲為涕志者骨之主也是以水流涕從之者其類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生太素作出則俱亡其志以早悲是以涕泣俱出而相從者所屬之類也曰人哭泣而泣不出者若出而少涕不從之何也曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲隂陽相持泣安能獨來夫志悲者惋惋則冲隂冲隂則志去目志去則神不守精精神去目涕泣出也夫經言乎厥則目光無所見自涕之與泣者已下至目光無所見原本漏今以素問靈樞補之夫人厥則陽氣并於上隂氣并於下陽并於上則火獨光也隂并於下則足寒足寒則脹夫一水不能勝五火故目盲是以氣衝風泣下而不止夫風之中目也陽氣内守於精是火氣燔目故見風則泣下也有以比之夫素問下有火字疾風生乃能雨此之類也九卷言其形素問言其精亦互相發明也曰人之太息者何曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少隂心主足少陽留之曰人之㵪下者何曰飲食皆入於胃胃中有熱熱則蟲動蟲動則胃緩胃緩則廉泉開故㵪下補足少隂曰人之耳中鳴者何曰耳者宗脈之所聚也故胃中空空則宗脈虚虚則下溜脈有所竭者故耳鳴補客主人手大指甲上與肉交者曰人之自囓舌者何曰此厥逆走上脈氣皆至也少隂氣至則自囓舌少陽氣至則囓頰陽明氣至則囓唇矣視主病者補之曰人之善忘者何曰上氣不足下氣有餘膓胃實而心肺虚虚則榮衞留於下久不以時上故善忘也曰人之善饑不嗜食者何也曰精氣并於脾則熱留於胃胃熱則消糓消糓故善饑胃氣逆上故胃脘塞胃脘塞故不嗜食善忘及善饑先視其府蔵誅其小過後調其氣盛則寫之虚則補之凡此十四邪者皆竒邪走空竅者也邪之所在皆為不足故上氣不足腦為之不滿耳為之善鳴頭為之傾目為之瞑中氣不足溲便為之變膓為之善鳴補之足外踝下留之下氣不足則乃為痿厥心悶急刺足大指上二寸留之一曰補足外踝下留之客氣客於厭發瘖不能言第二黄帝問曰人之卒然憂恚而言無音者何氣不行少師對曰咽喉者水糓之道也也喉嚨者氣之所以上下者也會厭者音聲之戸也唇口者音聲之扇也舌者音聲之機也懸癰垂者音聲之闗也頏顙者分氣之所泄也横骨者神氣之所使主發舌者也故人之鼻洞洟出不收者頏顙不閉分氣失也其厭小而薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其出氣遲故重言也所謂吃者其言逆故重之卒然無音者寒氣客於厭則厭不能發發不能下至其機扇機扇開闔不利故無音足少隂之脈上繫於舌本絡於横骨終於會厭兩寫血脈濁氣乃辟會厭之脈上絡任脈復取之天突其厭乃發也暴瘖氣硬刺扶突與舌本出血瘖不能言刺腦戸暴瘖不能言喉嗌痛刺風府舌緩瘖不能言刺瘖門喉痛瘖不能言天突主之暴瘖氣硬喉痺咽痛不得息食飲不下天鼎主之食飲善嘔不能言通谷主之瘖不能言期門主之暴瘖不能言支溝主之瘖不能言合谷及湧泉陽交主之目不得眠不得視及多卧卧不安不得偃卧肉苛諸息有音及喘第三黄帝問曰夫邪氣之客於人也或令人目不得眠者何也伯髙對曰五糓入於胃也其糟粕津液宗氣分為三隧故宗氣積於胷中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化而為血以營四末内注五蔵六府以應刻數焉衞氣者出其悍氣之慓疾而先行於四未分肉皮膚之間而不休息也晝行於陽夜行於隂其入於隂也常從足少隂之分間行於五蔵六府今邪氣客於五蔵則衞氣獨行其外行於陽不得入於隂行於陽則陽氣盛陽氣盛則陽蹻滿不得入於隂隂氣虚故目不得眠治之補其不足寫其有餘調其虚實以通其道而去其邪飲以半夏湯一劑隂陽已通其卧立至此所以決瀆壅塞經絡大通隂陽得和者也其湯方以流水千里以外者八升揚之萬遍取其清五升煑之炊以葦薪火沸煑秫米一升治半夏五合徐炊令竭為一升半去其柦飲汁一小盃日三稍益以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已曰目閉不得視者何也曰衞氣行於隂不得入於陽行於隂則隂氣盛隂氣盛則隂蹻滿不得入於陽則陽氣虚故目閉焉九卷行作留入作行曰人之多卧者何也曰此人膓胃大而皮膚澀九卷作濕下同澀則分肉不解焉膓胃大則胃氣行留久則皮膚澀分肉不解則行遲夫衞氣者晝常行於陽夜常行於隂故陽氣盡則卧隂氣盡則寤故膓胃大胃氣行留久皮膚澀分肉不解則行遲留於隂也久其氣不精一作清則欲瞑故多卧矣其膓胃小皮膚滑以緩分肉解利衞氣之留於陽也久故少卧焉曰其非常經也卒然多卧者何也曰邪氣留於上焦上焦閉而不通已食若飲湯衞氣久留於隂而不行故卒然多卧曰治此諸邪奈何曰先視其府蔵誅其小過後調其氣盛者寫之虚者補之必先明知其形氣之苦樂定乃取之曰人有卧而有所不安者何也曰蔵有所傷及情有所倚則臥不安素問作精有所寄則安太素作精有所倚則不安故人不能懸其病也曰人之不得偃臥者何也曰肺者蔵之葢也肺氣盛則脉大脉大則不得偃臥曰人之有肉苛者何也是為何病曰營氣虚衞氣實也營氣虚則不仁衞氣虚則不用營衞俱虚則不仁且不用肉加苛也人身與志不相有也三十日死曰人有逆氣不得卧而有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者此何蔵使然曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脉也胃者六府之海也其氣亦下行陽明逆不得從其道故不得臥下經曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脉逆不得隨經上行下故留經而不行脉絡之病人也微故起居如故而息有音也夫不得臥臥則喘者水氣客也夫水氣循津液而留素問作流者也腎者水蔵主津液主臥與喘也驚不得眠善齗水氣上下五蔵逰氣也三隂交主之不得臥浮郄主之身腫皮膚不可近衣淫濼苛獲久則不仁屏翳主之足太陽陽明手少陽脉動發目病第四黄帝問曰余嘗上青霄之臺中陛而惑獨㝠視之安心定氣久而不解被髮長跪俛而復視之久不已卒然自止何氣使然岐伯對曰五蔵六府之精氣上注於目而為之精精之裹靈樞作窠下同者為眼骨之精者為曈子筋之精為黒晴靈樞作黒眼血之精為其絡氣之精為白睛靈樞亦作白眼肌肉之精為約束裹契一作擷筋骨血氣之精而與脉並靈樞作并為系上屬於腦後出於項中故邪中於頭目逢身之虚其入深則隨眼系以入於腦入則腦轉腦轉則引目系急目系急則目眩以轉矣邪中之精則其精所中者不相比不相比則精散精散則視岐故見兩物也目者五蔵六府之精也營衞魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黒眼法於陰白晴赤脉法於陽故陰陽合揣靈樞作傳而精明也目者心之使也心者神之所舍也故神分精亂而不揣一作轉卒然見非常之處精氣魂魄散不相得故曰惑曰余疑何其然也余每之東苑未嘗不惑去之則復余惟獨為東苑勞神乎何其異也曰不然夫心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑目眥外决一作次於面者為兑眥在内近鼻者上為外眥下為内眥目色赤者病在心白色者病在肺青色者病在肝黄色者病在脾黒色者病在腎黄色不可名者病在胸中診目痛赤脉從上下者太陽病從下上者陽明病從外走内者少陽病夫膽移熱於胸則辛頞鼻淵一作洞鼻淵者濁涕下不止傳為􅍠瞢素問作衂衊瞑目故得之氣厥足陽明有俠鼻入於面者名曰懸顱屬口對入系目本頭痛引頷取之視有過者取之損有餘補不足反者益甚足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃别隂蹻陽蹻陰陽相交陽入隂出陰陽交於兑眥陽氣絶則瞑目隂氣絶則眠目中赤痛從内眥始取之隂蹻目中痛不能視上星主之先取譩譆後取天牖風池青盲逺視不明承光主之目瞑還視􅉩􅉩目光主之目􅉩􅉩赤痛天柱主之目眩無所見偏頭痛引外眥而急頷厭主之目不明惡風日淚出憎寒目痛目眩内眥赤痛目􅉩􅉩無所見眥癢痛淫膚白翳睛明主之青盲無所見逺視􅉩􅉩目中淫膚白瞙覆瞳子目窗主之目不明淚出目眩瞀瞳子癢逺視􅉩􅉩昏夜無見目瞤動與項口參相引喎僻口不能言刺承泣目痛口僻戾一作淚出目不明四白主之目赤黄顴窌主之睊目水溝主之目痛不明齗交主之目瞑身汗出承漿主之青盲􅀈目惡風寒上闗主之青盲商陽主之􅀈目目􅉩􅉩偏歴主之眼痛下亷主之􅀈目目􅉩􅉩少氣灸手五里左取右右取左目中白翳目痛泣出甚者如脱前谷主之白瞙覆珠瞳子無所見解谿主之手太陽少陽脉動發耳病第五暴厥而聾耳偏塞閉不通内氣暴薄也不從内外中風之病故留瘦著也頭痛耳鳴九竅不利腸胃之所生也黄帝問曰刺節言發蒙者刺府俞以去府病何俞使然岐伯對曰刺此者必於白日中刺其耳聴一作聴宫中其眸子聲聞于外此其俞也曰何謂聲聞于外曰已刺以手堅按其兩鼻竅令疾偃其聲必應其中耳鳴取耳前動脉耳痛不可刺者耳中有膿若有乾擿抵一本作盯矃耳無聞也耳聾取手少指太素云少指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足聾而不痛取足少陽聾而痛取手陽明耳鳴百會及頷厭顱息天窗大陵偏歴前谷後谿皆主之耳痛聾鳴上闗主之刺不可深耳聾鳴下闗及陽谿闗衝掖門陽谷主之耳聾鳴頭頷痛耳門主之頭重頷痛引耳中憹憹嘈嘈和窌主之聾耳中癲溲癲溲者若風聴㑹主之耳聾填填如無聞憹憹嘈嘈若蟬鳴頞頰鳴聴宫主之下頰取之譬如破聲刺此即九卷所謂發蒙者也聾翳風及會宗下谷主之耳聾無聞天空主之耳聾嘈嘈無所聞天容主之耳鳴無聞肩真及完骨主之耳中生風耳鳴耳聾時不聞商陽主之聾耳中不通合谷主之耳聾兩顳顬痛中渚主之耳焞焞渾渾無所聞外関主之卒氣聾四瀆主之手足陽明脉動發口齒病第六診齲痛按其陽明之來有過者獨熱在左者左熱在右右熱在上上熱在下下熱臂之陽明有入鼽齒者名曰太迎下齒齲取之臂惡寒補之一作取之不惡寫之靈樞名曰禾窌或曰大迎詳大迎乃是陽明脉所發則當云禾窌是也然而下齒齲又當取足陽明禾窌大迎當試可知耳手太陽有八頄偏齒者名曰角孫上齲齒取之在鼻與􅍠一作頄前方病之時其脉盛脉盛則寫之虚則補之一曰取之出睂外方病之時盛寫虚補齒動痛不惡清飲取足陽明惡清飲取手陽明舌緩㵪下煩悶取足少陰重舌刺石柱以排鍼上齒齲腫目窗主之上齒齲痛惡風寒正營主之齒牙齲痛浮白及完骨主之齒痛顴窌及二間主之上齒齲兑端及耳門主之齒間出血者有傷酸齒牀落痛口不可開引鼻中齗交主之頰腫口急頰車痛不可以嚼頰車主之上齒齲痛惡寒者上闗主之厥口僻失欠下牙痛頰腫惡寒口不收舌不能言不得嚼大迎主之失欠下齒齲下牙痛頓腫下闗主之齒牙不可嚼齗腫角孫主之口僻不正失欠口不開翳風主之舌下腫難言舌縱喎戾不端通谷主之舌下腫難以言舌縱涎出亷泉主之口僻刺太淵引而下之口中腫臭勞宫主之口中下齒痛惡寒䪼腫商陽主之齒齲痛惡清三間主之口僻偏歴主之口齒痛温溜主之下齒齲則上齒痛掖門主之齒痛四瀆主之上牙齲痛陽谷主之一作陽谿齒齲痛合谷主之又云少海主之舌縱㵪下煩悶隂交主之血溢發衂第七鼻􅍠息肉著附暴痺内逆肝肺相薄血溢鼻口取天府此為胃之大腧五部也五部按靈樞云陽逆頭痛胷滿不得息取人迎暴瘖氣鞭刺扶突與舌本出血暴聾氣蒙耳目不用取天牖暴拘攣癎痓足不任身者取天柱暴痺内逆肝肺相薄血溢鼻口取天府此為胃之五大俞五部也今士安散作五穴於篇中此特五部之一耳衂而不止衃血流取足太陽大衂衃血取手太陽不已刺完骨下不已刺膕中出血鼻􅍠衂上星主之先取譩譆後取天牖風池鼻管疽發為厲腦空主之鼻􅍠不利窒洞氣塞喎僻多洟􅍠衂有癰迎香主之鼻衂洟出中有懸癰宿肉窒洞不通不知香臭素窌主之鼻窒口僻清洟出不可止􅍠衂有癰禾窌主之鼻中息肉不利鼻頭額頞中痛鼻中有蝕瘡齗交主之鼻􅍠不得息不收洟不知香臭及衂不止水溝止之衂血不止承漿及委中主之鼻不利前谷主之衂腕骨主之手足陽明少陽脉動發喉痺咽痛第八喉痺不能言取足陽明能言取手陽明喉痺完骨及天容氣舍天鼎尺澤合谷商陽陽谿中渚前谷商丘然谷陽交悉主之喉痺咽腫水漿不下璇璣主之喉痺食不下鳩尾主之喉痺咽如梗三間主之喉痺不能言温溜及曲池主之喉痺氣逆口喎喉咽如枙狀行間主之千金作間使咽中痛不可内食湧泉主之氣有所結發瘤癭第九癭天窗一本作天容千金作天府及臑會主之瘤癭氣舍主之婦人雜病第十黄帝問曰人有重身九月而瘖此為何病岐伯對曰胞之絡脈絶也胞絡者繫於腎少隂之脈貫腎繫舌本故不能言無治也當十月復治法曰無損不足益有餘以成其辜素問作疹所謂不足者身羸瘦無用鑱石也無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰成辜曰何以知懐子且生也曰身有病而無邪脈也診女子手少隂脈動甚者姙子也乳子而病熱脈懸小手足温則生寒則死乳子中風病熱喘渇素問作鳴肩息脈急大緩則生急則死乳子下赤白腰俞主之女子絶子隂挺出不禁白瀝上窌主之女子赤白瀝心下積脹次窌主之腰痛不可俛仰先取缺盆後取尾骶女子赤淫時白氣癃月事少中窌主之女子下蒼汁不禁赤瀝隂中癢痛少腹控䏚不可俛仰下窌主之刺腰尻交者兩胂上以月死生為痏數發鍼立已膓鳴泄注下窌主之婦人乳餘疾盲門主之乳癰寒熱短氣卧不安膺窗主之乳癰凄索寒熱痛不可安乳根主之絶子灸臍中令有子女子手脚拘攣腹滿疝月水不通乳餘疾絶子隂癢隂交主之腹滿疝積乳餘疾絶子隂癢刺石門千金云奔肫上腹堅痛下引隂中不得小便刺隂交入八分女子絶子衃血在内不下闗元主之千金云胞轉不得尿少腹滿石水痛刺闗元亦宜矣女子禁中癢腹熱痛乳餘疾絶不足子門不端少腹苦寒隂癢及痛經閉不通中極主之婦人下赤白沃後隂中乾痛惡合隂陽少腹䐜堅小便閉曲骨主之千金作屈骨女子血不通㑹隂主之婦人子蔵中有惡血逆滿痛石闗主之月水不通奔肫泄氣上下引腰脊痛氣穴主之女子赤淫大赫主之女子胞中痛月水不以時休止天樞主之千金云腹脹腸鳴氣上衝胷刺天樞小腹脹滿痛引隂中月水至則腰脊痛胞中瘕子門有寒引髕髀水道主之千金云大小便不通刺水道女子隂中寒歸來主之女子月水不利或暴閉塞腹脹滿癃淫濼身熱腹中絞痛㿗疝隂腫及乳難子搶心若胞衣不出衆氣盡亂腹滿不得反復正偃卧屈一膝伸一膝並氣衝鍼上入三寸氣至寫之婦人無子及少腹痛刺氣衝主之婦人産餘疾食飲不下胸脇榰滿眩目足寒心切痛善噫聞酸臭脹痺腹滿少腹尤大期門主之婦人少腹堅痛月水不通帶脉主之婦人下赤白裏急瘈瘲五樞主之妬乳大淵主之千金云膺胷痛絶子商丘主之穴在内踝前宛宛中女子疝瘕按之如以湯沃其股内至膝飱泄灸刺曲泉婦人隂中痛少腹堅急痛隂陵泉主之婦人漏下若血閉不通逆氣脹血海主之月事不利見血而有身反敗隂寒行間主之乳癰太衝及復溜主之女子疝及少腹腫溏泄癃遺溺隂痛面塵黑目下眥痛太衝主之女子少腹大乳難嗌乾嗜飲中封主之女子漏血太衝主之女子俠臍疝中封主之大疝絶子築賓主之女子疝小腹腫赤白淫時多時少蠡溝主之女子疝瘕按之如以湯沃兩股中少腹腫隂挺出痛經水來下隂中腫或癢漉青汁若葵羮血閉無子不嗜食曲泉主之婦人絶産若未曽生産隂廉主之刺入八分羊矢下一寸是也婦人無子湧泉主之女子不字隂暴出經水漏然谷主之女子不下月水照海主之千金云痺驚善悲不樂如墜墮汗不出刺照海婦人隂挺出四肢淫濼身悶照海主之月水不來而多閉心下痛目􅉩􅉩不可逺視水泉主之婦人漏血腹脹滿不得息小便黄陰谷主之千金云漏血小腹脹滿如阻體寒熱腹偏腫刺隂谷乳癰有熱三里主之乳癰驚痺脛重足跗不收跟痛巨虚下亷主之月水不利見血而有身則敗及乳腫臨泣主之女子字難若胞不出崑崙主之小兒雜病第十一嬰兒病其頭毛皆逆上者死嬰兒耳間青脉起者瘈腹痛大便青辦飱泄脉大手足寒難已飱泄脉小手足温者易已驚癎脉五鍼手足太隂各五刺經太陽者五刺手足少隂經絡傍者一足陽明一上踝五寸刺三鍼小兒驚癎本神及前頂􅇟會天柱主之如反視臨泣主之小兒驚癎加瘈瘲脊急强目轉上插縮筋主之小兒驚癎瘈瘲脊强互相引長强主之小兒食晦頭痛譩譆主之小兒癎發目上插攅竹主之小兒臍風目上插刺絲竹空主之小兒癎痓嘔吐瀉注驚恐失精瞻視不明眵䁾瘈脉及長强主之小兒驚癎不得息顱􅇟主之小兒驚癎如有見者列缺主之并取陽明絡小兒口中腥臭胷脇榰滿勞宫主之小兒欬而泄不欲食者商丘主之小兒癎瘈手足擾目昬口噤溺黄商丘主之小兒癎瘈遺精溺虚則病諸癎癲實則閉癃小腹中熱善寐大敦主之小兒臍風口不開善驚然谷主之小兒腹滿不能食飲懸鍾主之小兒馬癎僕參及金門主之風從頭至足癎瘈口閉不能開每大便腹暴滿按之不下􅅉悲喘崑崙主之鍼灸甲乙經卷十二
