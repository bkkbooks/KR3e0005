body:
  text: 鍼灸甲乙經卷二晉皇甫謐撰十二經脉絡脉支别第一上雷公問曰禁脉之言凡刺之理經脉為始願聞其道黄帝荅曰經脉者所以決死生處百病調虚實不可不通也肺手太隂之脉起於中焦下絡大腸還循胃口上鬲屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下亷入寸口上魚循魚際出大指之端其支者從腕後直出次指内亷出其端是動則病肺脹滿膨膨然而喘欬缺盆中痛甚則交兩手而瞀音務又音茂是謂臂厥是主肺所生病者咳上氣喘喝煩心胷滿臑音如臂内前亷痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虚則肩背痛寒少氣不足以息溺色變一云卒遺矢無度為此諸病凡十二經之病盛則寫之虚則補之熱則疾之寒則留之陷下則灸之不盛不虚以經取之盛者則寸口大三陪於人迎虚者則寸口反小於人迎也大腸手陽明之脉起於大指次指之端外側循指上亷出合骨兩骨之間上入兩筋之中循臂上亷入肘外亷上循臑外亷上肩出髃音隅骨之前亷上出柱骨之㑹上下入缺盆絡肺下鬲屬大腸其支者從缺盆直上至頸貫頬下入齒中還出俠口交人中左之右右之左上俠鼻孔是動則病齒痛頬腫是主津液所生病者目黄口乾鼽音求䘐喉痺肩前臑痛者大指次指痛不用氣盛有餘則當脉所過者熱腫虚則寒慄不復為此諸病盛者則人迎大三倍於寸口虚者則人迎反小於寸口也胃足陽明之脉起於鼻交頞中傍約大腸之脉下循鼻外上入齒中還出俠口環唇下交承漿却循頥後下亷出大迎循頬車上耳前過客主人循髪際至額顱其支者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其直者從缺盆下乳内亷下侠臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀闗抵伏兎下入膝臏中下循胻外亷下足跗入中指内間其支者下膝三寸而别以下入中指外間其支者别跗上人大指間出其端是動則病凄凄然振寒善伸數欠顔黒病至則惡人與火聞木音則惕然驚心欲動獨閉户塞牖而處甚則欲上髙而歌棄衣而走賁響腹脹是為臂一作骭厥是主血所生病者狂瘈一作瘧温淫汗出鼽䘐口喎唇𦂳頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兎胻外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛者人迎大三倍于寸口虚者人迎反小于寸口也脾足太隂之脉起於大指之端循指内側白肉際過核骨後上内踝前亷上腨内循胻骨後交出厥隂之前上循膝股内前亷入腹屬脾絡胃上鬲侠咽連舌本散舌下其支者復從胃别上鬲注心中是動則病舌本强食則嘔胃脘痛腹脹善噫得後與氣則快然而衰身體皆重是主脾所病者舌本痛體不能動摇食不下煩心心下急寒瘧溏瘕音加泄水閉黄疸不能食唇青强立股膝内腫痛厥足大指不用為此諸病盛者則寸口大三倍於人迎虚者則寸口反小於人迎也心少隂之脉起于心中出屬心系下鬲絡小腸其支者從心系上侠咽繫目系一本作循胷出腸其直者復從心系却上肺上出液下下循臑内後亷循太隂心主之後下肘中内亷循臂内後亷抵掌後兑骨之端入掌内後亷循小指内出其端是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇滿痛臑臂内後亷痛厥掌中熱痛為此諸病盛者則寸口大再倍于人迎虛者則寸口反小於人迎也小腸手太陽之脉起於小指之端循手外側上腕出踝中直上循臂骨下亷出肘内側兩骨之間上循臑外後亷出肩解繞肩胛交肩上入缺盆向腋下絡心循咽下鬲抵胃屬小腸其支者從缺盆循頸上頬至目鋭眥却入耳中其支者别頬上䪼音拙抵鼻至目内眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似抜臑似折是主液所生病者耳聾目黄頬腫頸頷肩臑肘臂外後亷痛為此諸病盛者則人迎大再倍於寸口虚者則人迎反小於寸口也膀胱足太陽之脉起于目内眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩摶内挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後隂貫臀入膕中其支者從摶内左右别下貫胛一作髖挟脊内過髀樞循髀外後亷下合膕中以下貫踹足跟也内出外踝之後循京骨至小指外側是動則病腫頭痛目似脱項似抜脊腰似折不可以曲膕如結踹如裂是謂踝厥是主筋所生病者痔瘧狂顛疾頭𩕄音信項頸間痛目黄淚出鼽䘐項背腰凥膕踹脚皆痛小指不用為此諸病盛者則人迎大再倍于寸口虚者則人迎反小於寸口也腎足少隂之脉起於小指之下斜趣足心出然谷之下循内踝之後别人跟中以上踹内出膕中内亷上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨侠舌本一本云從横骨中挟臍循腹裏上行而入肺其支者從肺出絡心注胸中是動則病饑不欲食面黑如炭色咳唾則有血喝喝而喘一作喉鳴坐而欲起目􅉩􅉩無所見心如懸若饑状是為骨厥是主腎所病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疽腸澼脊股内後亷痛痿厥嗜卧足下熱而痛灸則强食生肉緩帯被髪大杖重履而步為此諸病盛者則寸口大再倍於人迎虚者則寸口反小於人迎也心主手厥隂之脉起于胸中出屬心包絡下鬲歴絡三焦其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下循臂行兩筋之間循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胷脇支滿心中憺憺大動面赤目黄喜笑不休是主脉一作心包絡所生病者煩心心痛掌中熱為此諸病盛者則寸口大一倍於人迎虚者則人迎反大寸口反小於人迎也三焦手少陽之脉起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下鬲偏屬三焦其支者從膻中上出缺盆上項侠耳後直上出耳上角以屈下額一作頰至䪼其支者從耳後入耳中出走耳前過客主人前交頬至目兑眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目兑眥痛頬耳後肩臑肘臂外皆痛小指次指不為用為此諸病盛者則人迎大一倍於寸口虚者則人迎反小於寸口也膽足少陽之脉起于目兑眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目兑眥後其支者别兑眥下大迎合手少陽抵於䪼下一本云别兑眥上迎手少陽於頞加頬車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸中過季脇下合髀厭中以下循髀陽出膝外亷下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之端其支者别跗上入大指之間循大指岐骨内出其端還貫入𤓰甲出三毛是動則病口苦善太息心脇痛不能反側是則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭面頷痛目兑眥痛缺盆中腫痛腋下腫痛馬刀挾癭汗出振寒瘧胸中脇肋髀膝外至胻絶骨外踝前及諸節皆痛小指次指不用為此諸病盛者則人迎大倍於寸口虚者人迎反小於人口也肝足厥隂之脉起於大指叢毛之際上循足跗上亷去内踝一寸外踝八寸交出太隂之後上膕内亷循股隂入毛中環隂器抵少腹侠胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹於巓一云其攴者從小腹與太隂少陽結於腰髁央脊下第三第四骨孔中其支者從目系下頬裏環唇内其支者復從肝别貫膈上注肺中是動則病腰痛不可以俛仰丈夫㿗疝婦人少腹痛甚則嗌乾面塵脱色是主肝所生病者胸滿嘔逆洞泄狐疝遺精癃閉為此諸病盛者則寸口大一倍於人迎虚者則寸口反小於人迎也足少隂氣絶則骨枮少隂者冬脉也伏行而濡骨髄者也故骨不濡一作軟則肉不能著骨也骨肉不相親則肉濡而却肉濡而却故齒長而垢髪無潤澤無潤澤者骨先死戊篤已死土勝水也手少隂氣絶則脉不通脉不通則血不流血不流則髪色不澤故面色如黧一作漆柴者血先死壬篤癸死水勝火也靈樞云少隂終者面黑齒長而垢腹脹閉上下不通而終矣足太隂氣絶則脉不營其口唇口唇者肌肉之本也脉弗營則肌肉濡肌肉濡則人中滿一作舌痿人中滿則唇反唇反者肉先死甲篤乙死木勝土也手太隂氣絶則皮毛焦太隂者行氣温於皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節著皮節著則爪枯毛折毛折者毛先死丙篤丁死火勝金也九卷云腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆上下不通上下不通則面黑皮毛焦而終矣足厥隂氣絶則筋弛厥隂者肝脉也肝者筋之合也筋者聚於隂器而脉絡於舌本故脉弗營則筋縮急筋縮急則引卵與舌故唇青舌捲卵縮則筋先死庚篤辛死金勝木也九卷云中熱嗌乾喜溺煩心甚則舌卷卵上縮而終矣五隂俱絶則目系轉轉則目運運為志先死故志先死則逺一日半而死矣太陽脉絶其終也戴眼及折瘈瘲其色白絶汗乃出則終矣少陽脉絶其終也耳聾百節盡縱目槖一作睘一本無此字系絶系絶一半日死其死也目白乃死一作色青白陽明脉絶其絶也口目動作善驚妄言色黄其上下經盛而不行一作不仁則終矣六陽俱絶則隂陽相離隂陽相離則腠理發泄絶汗乃出大如貫珠轉出不流則氣先死矣故旦占夕死夕占旦死此十二經之敗也十二經脉絡脉支别第一下黄帝問曰經脉十二而手太隂之脉獨動不休何也岐伯對曰足陽明胃脉也胃者五藏六府之海其清氣上注於肺肺氣從太隂而行之其行也以息往来故人脉一呼再動一吸脉亦再動呼吸不已故動而不止曰氣口何以獨為五藏主曰胃者水榖之海六府之大源也五味入於口藏於胃以養五藏氣氣口亦太隂也是以五藏六府之氣味皆出於胃變見於氣口故五氣入於鼻藏於心肺肺有病而鼻為之不利也九卷言其動素問論其氣此言其為五藏之所主相發明也曰氣之過於寸口也上出焉息下入焉伏何道從還不知其極也曰氣之離於藏也卒然如弓弩之發如水岸之下上於魚以反衰其餘氣衰散以逆上故其行微也曰足陽明因何而動曰胃氣上注於肺其悍氣上衝頭者循喉上走空竅循眼系入絡腦出頷下客主人循牙車合陽明并下人迎此胃氣走於陽明者也故隂陽上下其動也若一故陽病而陽脉小者為逆隂病而隂脉大者為逆隂陽俱盛與其俱動若引繩相傾者病曰足少隂因何而動曰衝脉者十二經脉之海也與少隂之絡起於腎下出于氣街循隂股内亷斜入膕中循胻骨内亷並少隂之經下入内踝之後足下其别者斜入踝内出屬跗上入大指之間以注諸絡以温足跗此脉之常動者也曰衛氣之行也上下相貫如環無端今有卒遇邪氣及逢大寒手足不随其脉隂陽之道相腧之㑹行相失也氣何由還曰夫四末隂陽之會此氣之大絡也四衝者氣之經也經一作徑故絡絶則經通四末解則氣從合相輸如環黄帝曰善此所謂如環無端莫知其紀終而復始此之謂也十二經脉伏行於分肉之間深而不見其常見者足太隂脉過於外踝之上無所隠故諸脉之浮而常見者皆絡脉也六經絡手陽明少隂之大絡起五指間上合肘中飲酒者衛氣先行皮膚先充絡脉絡脉先盛則衛氣以平營氣乃滿而經脉大盛也脉之卒然動者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同是以知其何脉之動也雷公問曰何以知經脉之與絡脉異也黄帝荅曰經脉者常不可見也其虚實也以氣口知之脉之見者皆絡脉也諸絡脉皆不能經大節之間必行絶道而出入復合於皮中其㑹皆見於外故諸刺絡脉者必刺其結上甚血者雖無血結急取之以寫其邪而出其血留之發為痺也凡診絡脉脉色青則寒且痛赤則有熱胃中有寒則手魚際之絡多青胃中有熱則魚際之絡赤其暴黑者久留痺也其有赤有青有黑者寒熱也其青而小短者少氣也凡刺寒熱者皆多血絡必間日而取之血盡乃止調其虚實其小而短者少氣甚者寫之則悶悶甚則仆不能言悶則急坐之也手太隂之别名曰列缺起於腕上分間並太隂之經直入掌中散入於魚際其病實則手兑骨掌熱虚則欠㰦音掐開口也小便遺數取之去腕一寸别走陽明手少隂之别名曰通里在腕一寸半别而上行循經入於心中繫舌本屬目系實則支膈虚則不能言取之腕後一寸别走太陽手心主之别名曰内闗去腕二寸出於兩筋之間循經以上系於心包絡心系實則心痛虚則為煩心取之兩筋間手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃實則筋弛肘廢虚則生肬小者如指痂疥取之所别手陽明之别名曰偏歴去腕三寸别走太隂其别者上循臂乗肩􅀈上曲頬偏齒其别者入耳㑹於宗脉實則􅀈音禹齒耳聾虚則齒寒痺鬲取之所别手少陽之别名曰外闗去腕二寸外繞臂注胷中合心主實則肘攣虚則不収取之所别足太陽之别名曰飛揚去踝七寸别走小隂實則窒鼻一云鼽窒頭背痛虚則鼽䘐取之所别足少陽之别名曰光明去踝上五寸别走厥隂並經下絡足跗實則厥虚則痿躄坐不能起取之所别足陽明之别名曰豐隆去踝八寸别走太隂其别者循脛骨外亷上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則顛狂虚則足不収脛枯取之所别足太隂之别名曰公孫去本節後一寸别走陽明其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虚則鼓脹取之所别足少隂之别名曰大鍾當踝後繞跟别走太陽其别者並經上走於心包下外貫腰脊其病氣逆則煩悶實則癃閉虚則腰痛取之所别足厥隂之别名曰蠡溝去内踝上五寸别走少陽其别者循經上睾結於莖其病氣逆則睪腫卒疝實則挺長熱虚則暴癢取之所别任脉之别名曰尾翳下鳩尾散於腹實則腹皮痛虚則搔癢取之所别督脉之别名曰長强侠脊上項散頭上下當肩胛左右别走太陽入貫膂實則脊强虚則頭重髙摇之挟脊之有過者九墟無此九字取之所别脾之大絡名曰大包出淵腋下三寸布胸脇實則一身盡痛虚則百脉皆縱此脉若羅絡之血者皆取之凡此十五絡者實則必見虚則必下視之不見求之上下人經不同絡脉異所别也黄帝問曰皮有分部脉有經紀願聞其道岐伯對曰欲知皮部以經脉為紀者諸經皆然陽明之陽名曰害蜚十二經上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黒則痺黄赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外隂主内少陽之陽名曰樞杼一作持視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主内在隂者主外以滲於内也諸經皆然太陽之陽名曰闗樞視其部中有浮絡者皆太陽之絡也絡盛則入客於經少隂之隂名曰樞儒視其部中有浮絡者皆少隂之絡也絡盛則入客於經其入於經也從陽部注於經其出者從隂部内注於骨心主之隂名曰害肩視其部中有浮絡者皆心主之絡也絡盛則入客於經太隂之隂名曰闗蟄視其部中有浮絡者皆太隂之絡也絡盛則入客於經凡此十二經絡脉者皮之部也是故百病之始生也必先客於皮毛邪中之則腠理開開則入客於絡脉留而不去傳入於經留而不去傳入於腑禀於腸胃邪之始入於皮也淅然起毫毛開腠理其入於絡也則絡脉盛色變其入客於經也則盛虚乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍骨破毛直而敗也曰十二部其生病何如曰皮者脉之部也邪客於皮則腠理開開則邪入客於絡脉絡脉滿則主于經脉經脉滿則入舍於府藏故皮有分部不愈而生大病也曰夫絡脉之見其五色各異其故何也曰經有常色而絡無常變曰經之常色何如曰心赤肺白肝青脾黄腎黒皆亦應其經脉之色也曰其絡之隂陽亦應其經乎曰隂絡之色應其經陽絡之色變無常隨四時而行寒多則凝泣凝泣則青黑熱多則淖滜音皐淖滜則黄赤此其常色者謂之無病五色俱見謂之寒熱曰余聞人之合於天地也内有五藏以應五音五色五味五時五位外有六府以合六律主持隂陽諸經而合之十二月十二辰十二節十二時十二經水十二經脉此五藏六府所以應天道也夫十二經脉者人之所以生病之所以成人之所以治病之所以起學之所始工之所止粗之所易上之所難也其離合出入奈何曰此粗之所過上之所悉也請悉言之足太陽之正别入於膕中其一道下尻五寸别入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少隂之正至膕中别走太陽而合上至腎當十四椎出屬帯脉直者系舌本復出於項合於太陽此為一合九墟云或以諸隂之别者皆為正也足少陽之正或以諸隂别者為正一本云繞髀入於毛際合於厥隂别者入季脇之間循胸裏屬膽散之上肝貫心以上侠咽出頥頷中散於面繫目系合少陽於外眥足厥隂之正别跗上上至毛際合於少陽與别俱行此為二合足陽明之正上至髀入於腹裏屬於胃散之脾上通於心上循咽出於口上頞䪼還繫目合於陽明足太隂之正則别上至髀合於陽明與别俱行上終於咽貫舌本此為三合手太陽之正指地别入於肩解入腋走心繫小腸手少隂之正别下於淵腋兩筋之間屬心主上走喉嚨出於面合目内眥此為四合手少陽之正指天别於巔入於缺盆下走三焦散於胸中手心主之正别下淵腋三寸入胸中别屬三焦出循喉嚨出耳後合少陽完骨之下此為五合手陽明之正從手循膺乳别於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明手太隂之正别入淵腋少隂之前入走肺散之太陽上出缺盆循喉嚨復合陽明此為六合竒經八脉第二黄帝問曰脉行之逆順奈何岐伯對曰手之三隂從藏走手手之三陽從手走頭足之三陽從項走足足之三隂從足走腹曰少隂之脉獨下行何也曰衝脉者五藏六府之海也五藏六府皆禀焉其上者出於頏顙滲諸陽灌諸隂其下者注少隂之大絡出於氣衝循隂股内亷斜入膕中伏行髀骨内下至内踝之後屬而别其下者至於少隂之經滲三隂其前者伏行出屬跗下循跗入大指間滲諸絡而温肌肉故别絡結則跗上不動不動則厥厥則寒矣曰何以明之曰以言道之切而驗之其非必動然後可以明逆順之行也衝脉任脉者皆起於胞中上循脊裏為經絡之海其浮而外者循腹上一作右行㑹於咽喉别而絡唇口血氣盛則充膚熱肉血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月水下數脱血任衝並傷故也任衝之交脉不營其唇故髭鬚不生焉任脉者起於中極之上以下毛際循腹裏上闗元至咽喉上頥循目入面衝脉者起於氣衝並少隂之經難經作陽明之經侠臍上行至胷中而散其言衝脉與九脉異任脉為病男子内結七疝女子帶下瘕聚衝脉為病逆氣裏急督脉為病脊强反折亦與九卷互相發也曰人有傷於隂隂氣絶而不起隂不為用髭鬚不去宦者獨去何也曰宦者去其宗筋傷其衝脉血瀉不復皮膚内結唇口不營故無髭鬚夫宦者其任衝之脉不盛宗筋不成有氣無血口唇不營故髭鬚不生督脉者經缺不具見於營氣曰上額循巔下項中循脊入骶是督脉也素問曰督脉者起於少腹以下骨中央女子入繫廷孔其孔溺孔之端也其絡循隂器合纂間繞纂後别繞臀至少隂與巨陽中絡者合少隂上股内後亷貫脊屬腎與太陽起於目内眥上額交巔上入絡腦還出别下項循肩髆内侠脊抵腰中入循膂絡腎其男子循莖下至纂與女子等其小腹直上者貫臍中中央上貫心入喉上頥環唇上繫兩目之中此生病從小腹上衝心而痛不得前後為衝疝其女子不孕癃痔遺溺嗌乾督脉生病治督脉難經曰督脉者起於下極之俞並於脊裏上至風府入屬於腦上巔循額至鼻柱陽脉之海也九卷言營氣之行於督脉故從上下難經言其脉之所起故從下上所以互相發也長素問言督脉似謂在衝多聞闕疑故并載以貽後之者云曰蹻脉安起安止何氣營也曰蹻脉者少隂之别起於然骨之後上内踝之上直上循隂股入隂上循胸裏入缺盆上循人迎之前上入鼽靈樞作頄字屬目内眥合於太陽陽蹻而上行氣相并相還則為濡一作深目氣不營則目不合也曰氣獨行五藏不營六府何也曰氣之不得無行也如水之流如日月之行不休故隂脉營其藏陽脉營其府如環之無端莫知其紀終而復始其流溢之氣内溉藏府外濡腠理曰蹻脉有隂陽何者當其數曰男子數其陽女子數其隂其隂一本無此二字當數者為經不當數者為絡也難經曰陽蹻脉者起於跟中循外踝上行入風池隂蹻脉者亦起於跟中循内踝上行入喉嚨交貫衝脉此所以互相發明也又曰陽維隂維者維絡於身溢畜不能環流溉灌也故陽維起於諸陽㑹隂維起於諸隂交也又曰帶脉起於季脇㢠廻身一周自衝脉已下是謂竒經八脉又曰隂蹻為病陽緩而隂急陽蹻為病隂緩而陽急陽維維於陽隂維維於隂隂陽不能相維為病腰腹縱容如囊水之状一云腹滿腰溶溶如坐水中状此八脉之診也維脉帶脉皆見如此詳素問病論及見於九卷脉度第三黄帝問曰願聞脉度岐伯對曰手之六陽從手至頭長五尺五六合三丈手之六隂從手至胸中長三尺五寸三六一丈八尺五六合三尺凡二丈一尺足之六陽從頭至足長八尺六八合四丈八尺足之六隂從足至胸中長六尺五寸六六合三丈六尺五六三尺凡三丈九尺蹻脉從足至目長七尺五寸二七一丈四尺二五合一尺凡一丈五尺督脉任脉各長四尺五寸二四合八尺二五合一尺凡九尺凡都合一十六丈二尺此氣之大經隧也經脉為裏支而横者為絡絡之别者為孫絡孫絡之盛而有血者疾誅之盛者㵼之虚者飲藥以補之十二經標本第四黄帝問曰五藏者所以藏精神魂魄也六府者所以受水榖而化物者也其氣内循於五藏而外絡支節其浮氣之不循於經者為衛氣其精氣之行於經者為營氣隂陽相随外内相貫如環無端亭亭淳淳乎孰能窮之然其分别隂陽皆有標本虚實所離之處能别隂陽十二經者知病之所生候虚實之所在者能得病之髙下知六經之氣街者能知解結紹於門户能知虚實之堅濡者知補㵼之所在能知六經標本者可以無惑於天下也岐伯對曰博哉聖帝之論臣請悉言之足太陽之本在跟上五寸中標在兩絡命門命門者目也足少隂之本在内踝下上三寸中標在背腧與舌下兩脉足少陽之本在竅隂之間標在窓籠之前窓籠者耳也千金云窓籠者耳前上下脉以手按之動者是也足陽明之本在厲兑標在人迎上頬頏顙九卷云標在人迎類上侠頏顙足厥陽之本在行間上五寸所標在背腧足太隂之本在中封前四寸之中標在背腧與舌本手太陽之本在外踝之後標在命門之上一寸千金云命門在心上一寸手少陽之本在小指次指之間上三寸一作二寸標在耳後上角下外眥手陽明之本在肘骨中上至别陽標在頦下合鉗上手太隂之本在寸口之中標在腋下内動脉是也手少陽之本在兑骨之端標在背腧手心主之本在掌後兩筋之間標在腋下三寸凡候此者主下虚則厥下盛則熱上虚則眩上盛則熱痛故實者絶而止之虚者引而起之請言氣街胸氣有街腹氣有街頭氣有街䯒氣有街故氣在頭者上一作止下同之於腦在胷中者上之膺與背腧氣在腹者上之於背腧與衝脉於臍左右之動脉者氣在䯒者上之氣街與承山踝上以下取此者用毫鍼必先按而久存之應於手乃刺而予之所刺者頭痛眩仆腹痛中滿暴脹及有新積可移者易己也積不痛者難已也經脉根結第五黄帝曰天地相感寒熱相移隂陽之數孰少孰多隂道偶而陽道竒發於春夏隂氣少而陽氣多隂陽不調何補何瀉發於秋冬陽氣少而隂氣多隂氣盛陽氣衰故莖葉枯槁濕雨下歸隂陽相離何補何㵼竒邪離經不可勝數不知根結五藏六府折闗敗樞開闔而走隂陽大失不可復取九鍼之要在於終始能知終始一言而畢不知終始鍼道絶矣太陽根於至隂結於命門命門者目也陽明根於厲兑結於頏顙頏顙者鉗大鉗大者耳也少陽根於竅隂結於窓籠窓籠者耳也太陽為開陽明為闔少陽為樞故開折則内節潰緩而暴病起矣故候暴病者取之太陽視有餘不足潰緩者皮肉緩膲而弱也闔折則氣無所止息而痿病起矣故痿病者皆取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折則骨摇而不能安於地故骨摇者取之少陽視有餘不足節緩而不収者當覈其本太隂根於隠白結於太倉厥隂根於大敦結於玉英絡於膻中少隂根於湧泉結於亷泉太隂為開厥隂為闔少隂為樞故開折則倉廪無所輸膈洞膈洞者取之太隂視有餘不足故開折者則氣不足而生病闔則氣弛而善悲善悲者取之厥隂視有餘不足樞折則脉有所結而不通不通者取之少隂視有餘不足有結者皆取之足太陽根於至隂流於京骨注於崑崙入於天柱飛揚足少陽根於竅陽流於丘墟注於陽輔入於天容疑誤光明足陽明根於厲兌流於衝陽注於下陵入於人迎豐隆手太陽根於少澤流於陽谷注於少海入於天窓疑誤支正手少陽根於闗衝流於陽池注於支溝入於天牖外闗手陽明根於商陽流於合谷注於陽谿入於扶突偏歴此所謂十二經絡也絡盛者當取之經筋第六足太陽之筋起於足小指上結於踝斜上結於膝其下者從足外側結於踵上循跟結於膕其别者結於腨外上膕中内亷與膕中並上結於臀上侠脊上項其支者别入結於舌本其直者結於枕骨上頭下額一作顔結於鼻其支者為目上綱下結於鼽靈樞作頄字其下支者從腋後外亷結於肩髃其支者入腋下出缺盆上結於完骨其支者出缺盆斜上入於鼽其病小指支踵跟痛一作小指支踵痛膕攣急脊反折項筋急肩不舉腋支缺盆中紐痛不可左右摇治在燔鍼刼刺以知為數以痛為輸名曰仲春痺足少陽之筋起於小指次指之上結於外踝上循胻外亷結于膝外亷其支者别起於外輔骨上走髀前者結于伏莵後者結於尻其直者上乗䏚季脇上走腋前亷繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於鼽其支者結於目外眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻上乗䏚季脇痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角并蹻脉而行左絡於右故傷左角右足不用命曰維筋相交治在燔鍼刼刺以知為數以痛為輸名曰孟春痺足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外亷直上結於髀樞上循脇屬脊其直者上循骭結於膝其支者結於外輔骨合少陽其直者上循伏莵上結於髀聚於隂器上腹而布至缺盆而結上頸上侠口合於鼽下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頬結於耳前其病足中指支脛轉筋脚跳堅伏莵轉筋髀前腫㿗疝腹筋乃急引缺盆及頬卒口僻急者目不合熱則經弛縱不勝目不開頬筋有寒則急引頬移口有熱則筋弛縱不勝収故僻治之以馬膏膏其急者以白酒和桂塗其緩者以桑鈎鈎之即以生桑灰置之坎中髙下與坐等以膏熨急頬且飲美酒啖炙肉不飲酒者自强也為之三拊而已治在燔鍼刼刺以知為數以痛為輸名曰季春痺足太隂之筋起於大指之端内側上結於内踝其直者上絡於膝内輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結於脇散於胸中其内者著於脊其病足大指支内踝痛轉筋内輔骨痛隂股引髀而痛隂器紐痛上臍兩脇痛膺中脊内痛治在燔鍼刼刺以知為數以痛為輸名曰孟秋痺足少隂之筋起於小指之下入足心並足太隂而斜走内踝之下結於踵則與太陽之筋合而上結於内輔之下並太隂之經而上循隂股結於隂器循膂内侠脊上至項結於枕骨與足太隂之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘈及痓病在外者不能俛在内者不能仰故陽病者腰反折不能俛隂病者不能仰治在燔鍼刼刺以知為數以痛為輸在内者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺足厥隂之筋起於大指之上結於内踝之前上衝胻上結内輔之下上循隂股結於隂器絡諸經一作筋其病足大指支内踝之前痛内輔痛隂股痛轉筋隂器不用傷於内則不起傷於寒則隂縮入傷於熱則縱挺不収治在行水清隂器其病轉筋者治在燔鍼刼刺以知為數以痛為輸名曰季秋痺手太陽之筋起於小指之上結於腕上循臂内亷結於肘内兑骨之後彈之應小指之上入結於腋下其支者從腋走後亷上繞臑外亷上肩胛循頸出足太陽之筋前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指及肘内兑骨後亷痛循臂隂入腋下腋下痛腋後亷痛繞肩胛引頸而痛應耳中鳴痛引頷目暝良久乃能視頸筋急則為筋痿頸腫寒熱在頸者治在燔鍼刼刺以知為數以痛為輸其為腫者復而兑之名曰仲夏痺原本復而兑之下有本支者上曲牙循耳前屬目外㫮上頷結于角其痛當所過者支轉筋治在燔鍼刼刺以知為數以痛為輸一段手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外亷上肩走頸合手太陽其支者上當曲頬入繫於舌本其支者上曲牙循耳前屬目外眥上乗頷結於角其病當所過者即支轉筋舌卷治在燔鍼刼刺以知為數以痛為輸名曰季夏痺手陽明之經起於大指次指之端結於腕上循臂上結於肘上繞臑結於髃其支者繞肩胛侠脊其直者從肩髃上頸其支者上頬結於鼽其直者上出手太陽之前上左角絡頭下右頷其病當所過者支一本下冇痛字及字轉筋痛肩不舉頸不可左右視治在燔鍼刼刺以知為數以痛為輸名曰孟夏痺手太隂之筋起於大指之上循指上行結於魚際後行寸口外側上循臂結肘中上臑内亷入腋下上出缺盆結肩前髃上結缺盆下結於胸裏散貫賁合脇下抵季肋其病當所過者支轉筋痛甚成息賁脇急吐血治在燔鍼刼刺以知為數以痛為輸名曰仲冬痺手心主之筋起於中指與太隂之經並行結於肘内亷上臂隂結腋下下散前後侠脇其支者入腋散胸中結於臂其病當所過者支轉筋痛手心主前及胸痛息賁治在燔鍼刼刺以知為數以痛為輸名曰孟冬痺手少隂之筋起於小指之内側結於兑骨上結肘内亷上入腋交太隂挟乳裏結於胸中循臂下繫於臍其病内急心承伏梁下為肘綱其病當所過者支轉筋痛治在燔鍼刼刺以知為數以痛為輸其成伏梁吐膿血者死不治凢經筋之病寒則反折筋急熱則筋縱緩不収隂痿不用陽急則反折隂急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔鍼刼刺名曰季冬痺足之陽明手之太陽筋急則口目為之僻目眥急不能卒視治此皆如右方也骨度腸度腸胃所受第七黄帝問曰脉度言經脉之長短何以立之伯髙對曰先度其骨節之大小廣狹長短而脉度定矣曰人長七尺五寸者其骨節之大小長短知各幾何曰頭一作頸之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸髪所覆者顱至項一尺二寸髪以下至頥長一尺君子參一作三又作終折結喉以下至缺盆中長四寸至缺盆下至􅐳骭長九寸過則肺大不滿則肺小􅐳骭已下至天樞長八寸過則胃大不及則胃小天樞已下至横骨長六寸半過則廻腸廣長不滿則狹短横骨長六寸半横骨上亷以下至内輔之上亷長一尺八寸内輔之上亷以下至下亷長三寸半内輔下亷至内踝長一尺三寸内踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺一作寸行腋中不見者長四寸腋以下至季脇長一尺二寸季脇以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺二寸一作三寸兩顴之間廣九寸半九墟作七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項髪以下至脊骨長三寸半一作二寸脊骨以下至尾骶二十一節長三尺上節長一寸四分分之七竒分之一竒分在下故上七節下至膂骨九寸七分分之七此衆人骨之度也所以立經脉之長短也是故視其經脉之在於身也其見浮而堅其見明而大者多血細而沉者多氣乃經之長短也曰願聞六府𫝊榖者腸胃之大小長短受榖之多少奈何曰榖之所從出入淺深逺近長短之度唇至齒長九分廣二寸半齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三一作二斗五升小腸後附脊左環廻周葉一作疉下同積其注於廻腸者外附於臍上廻運環及十六曲大二寸半徑八分分之少半長三丈二尺一作三廻腸當臍左環廻周葉積而下廻運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸胻一作傳脊以受廻腸左環葉積一作脊上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分廻曲環反三十二曲曰人不食七日而死者何也曰胃大一尺五寸徑五寸長二尺六寸横屈受水榖三斗五升其中之榖常留者二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉泄諸小腸小腸大二寸半徑八分分之少半長三丈二尺受榖二斗四升水六升三合合之大半廻腸大四寸徑一寸寸之少半長二丈二尺受榖一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受榖九升三合八分合之一腸胃之長凡五丈八尺四寸受水榖九斗二升一合合之大半此腸胃所受水榖之數也平人則不然胃滿則腸虚腸滿則胃虚更滿更虚故氣得上下五藏安定血脉和利精神乃居故神者水榖之精氣也故腸胃之中常留榖二斗四升水一斗五升故人一日再至後後二升半一日中五升五七三斗五升而留水榖盡矣故平人不飲不食七日而死者水榖精氣津液皆盡故七日死矣鍼灸甲乙經卷二
