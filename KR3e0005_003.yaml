body:
  text: 鍼灸甲乙經卷三晉皇甫謐撰緫計六百五十四穴單四十八穴雙三百零八穴頭直鼻中髮際傍行至頭維凡七穴第一神庭曲差本神頭維頭直鼻中入髮際一寸循督脈却行至風府凡八穴第上星𩕄㑹前頂百㑹後頂强間腦户風户頭直俠督脈各一寸五分却行至玉枕凡一十穴第三五處承光通天絡却玉枕頭直目上入髮際五分却行至腦空凡十穴第四臨泣正營承靈目窓腦空頭縁耳上却行至完骨凡十二穴第五天衡率谷竅隂曲鬢浮白完骨頭自髮際中央傍行凡五穴第六瘖門風池天柱背自第一椎循督脈下行至脊觝凡十一穴第七大椎陶道身柱神道至陽筋縮脊中懸樞命門腰俞長强背自第一椎兩傍俠脊各一寸五分下至節凡四十一穴第八大杼風門肺俞心俞膈俞肝俞膽俞脾俞胃俞腎俞三焦俞大腸俞小腸俞膀胱俞上􅐎中膂俞白環俞中􅐎次􅐎下􅐎㑹陽背自第二椎兩傍俠脊各三寸行至二十一椎下兩傍俠脊凡二十六穴第九附分魄户神堂譩譆膈闗魂門陽綱意舍胃倉志室胞盲盲門秩邊面凡二十九穴第十懸顱頷厭懸釐陽白攅竹絲竹空睛明禾􅐎瞳子􅐎承泣四白顴􅐎素􅐎迎香巨􅐎地倉水溝兑骨齗交承漿頰車大迎耳前後凡二十穴第十一上闗聴㑹下闗耳門禾􅐎顱息角孫瘈脈聴宫翳風頸凡十七穴第十二亷泉水突扶突天窓天牗天容人迎氣舍天鼎肩凡二十六穴第十三肩井肩貞巨骨天􅐎肩顒肩􅐎臑俞秉風天宗肩外俞肩中俞曲垣臑㑹缺盆胸自天突循任脈下行至中庭凡七穴第十四天突璇璣華蓋玉堂膻中中庭紫宫胸自輸府俠任脈兩傍各二寸下行至步廊凡十二穴第十五輸府彧中神藏靈墟神封步廊胸自氣户俠輸府兩傍各二寸下行至乳根凡十二穴第十六氣户庫房屋翳膺窓乳中乳根胸自雲門俠氣户兩傍各二寸下行至食竇凡十二穴第十七雲門中府周榮天谿食竇胸鄉腋脇下凡八穴第十八淵腋轍筋大包天池腹自鳩尾循任脈下行至㑹隂凡十五穴第十九鳩尾巨闕上脘中脘建里下脘水分臍中隂交氣海石門闗元中極曲骨㑹隂腹自幽門俠巨闕兩傍各半寸循衝脈下行至横骨凡二十一穴第二十幽門通谷四滿氣穴石闗商曲隂都中注盲俞大赫横骨腹自不容俠幽門兩傍各一寸五分至氣衝凡二十三穴第二十一不容梁門闗門太乙承滿水道歸來滑肉門天樞外陵大巨氣衝腹自期門上直兩乳俠不容兩傍各一寸五分下行至衝門凡十四穴第二十二期門日月腹哀大横腹屈府舍衝門腹自章門下行至居􅐎凡十二穴第二十三章門京門維道帶脈五樞居􅐎手太隂及臂凡一十八穴第二十四少商魚際太淵經渠列缺孔最尺澤俠白天府手厥隂心主及臂凡一十六穴第二十五中衝勞宫大陵内闗間使郄門曲澤天泉手少隂及臂凡一十六穴第二十六少衝少府神門隂郄通里靈道極泉少海手陽明及臂凡二十八穴第二十七商陽二間三間合谷陽谿偏歴温溜下亷上亷三里曲池肘􅐎五里臂臑手少陽及臂凡二十四穴第二十八闗衝腋門中渚陽池四瀆天井外闗支溝㑹宗三陽絡清泠淵消濼手太陽凡一十六穴第二十九少澤前谷後谿脘骨陽谷養老支正少海足太隂及股凡二十二穴第三十隠白大都太白公孫漏谷隂陵泉地機商丘三隂交血海箕門足厥隂及股凡二十二穴第三十一大敦行間太衝中封蠡溝中都膝闗曲泉隂包五里隂亷足少隂及股并隂蹻隂維凡二十穴第三十二涌泉然谷大谿水泉復溜交信大鍾照海築賓隂谷足陽明及股凡三十穴第三十三厲兑内庭陷谷衝陽解谿豐隂隂市伏兎巨虚下亷條口上亷三里犢鼻梁丘髀闗足少陽及股并陽維四穴凡二十八穴第三十四竅隂俠谿地五㑹臨泣陽輔陽交陽陵泉丘墟懸鍾光明外丘陽闗中瀆環跳足太陽及股并陽蹻六穴凡三十四穴第三十五至隂通谷束骨京骨申脈金門僕參飛揚承山承筋合陽委中浮郄崑崙跗陽殷門承扶頭直鼻中髮際傍行至頭維凡七穴第一黄帝問曰氣穴三百六十五以應一嵗願聞孫絡谿谷亦各有應乎岐伯對曰孫絡谿谷三百六十五穴㑹以應一嵗以洒素問作溢奇邪以通榮衛肉之大㑹為谷肉之小㑹為谿肉分之間谿谷之㑹以行榮衛以舍素問作㑹大氣也神庭在髮際直鼻督脈足太陽陽明之㑹禁不可刺令人癲疾目失精灸三壯曲差一名鼻衝俠神庭兩傍各一寸五分在髮際足太陽脈氣所發正頭取之刺入三分灸五壯本神在曲差兩傍各一寸五分在髮際入曰直耳上髪際四分足少陽陽維之㑹刺入三分灸三壯頭維在額角髮際俠本神兩傍各一寸五分足少陽陽維之㑹刺入五分禁不可灸頭直鼻中入髮際一寸循督脈却行至風府凡八穴第二上星一穴在顱上直鼻中央入髮際一寸陷者中可容豆督脈氣所發刺入三分留六呼灸三壯𩕄㑹在上星後一寸骨間陷者中督脈氣所發刺入四分灸五壯前頂在𩕄㑹後一寸五分骨間陷者中督脈氣所發刺入四分灸五壯百㑹一名三陽五㑹在前頂後一寸五分頂中央旋毛中陷可容指督脈足太陽之㑹刺入三分灸三壯後頂一名交衝在百㑹後一寸五分枕骨上督脈氣所發刺入四分灸五壯强間一名大羽在後頂後一寸五分督脈氣所發刺入三分灸五壯腦户一名匝風一名㑹額在跳骨上强間後一寸五分督脈足太陽之㑹此别腦之㑹不可灸令人瘖素問禁刺論云刺頭中腦户入腦立死經王冰註云灸五壯令又骨空論云不可妄灸銅人云禁不可灸灸之人瘂風府一名舌本在頂上入髮際一寸大筋内穴穴中疾言其肉立起言休其肉立下督脈陽維之㑹禁不可灸灸之令人瘖刺入四分留三呼頭直俠督脈各一寸五分却行至玉枕凡十穴第三五處在督脈傍去上星一寸五分足太陽脈氣所發刺入三分不可灸素問水熱穴註云灸三壯承光在五處後二寸足太陽脈氣所發刺入三分禁不可灸通天一名天臼在承光後一寸五分足太陽脈氣所發刺入三分留七呼灸三壯絡却一名强陽一名腦葢在通天後一寸三分足太陽脈氣所發刺入三分留五呼灸三壯玉枕在絡却後七分俠腦户傍一寸三分起肉枕骨入髮際三寸足太陽脈氣所發刺入三分留三呼灸三壯頭直目上入髮際五分却行至腦空凡十穴第四臨泣當目上眥直入髮際五分陷者中足太陽少陽陽維之㑹刺入三分留七呼灸五壯目窓一名至榮在臨泣後一寸足少陽陽維之㑹刺入三分灸五壯正營在目窓後一寸足少陽陽維之㑹刺入三分灸五壯承靈在正營後一寸五分足少陽陽維之㑹刺入三分灸五壯腦空一名顳音熱顬音儒在承靈後一寸五分俠玉枕骨下陷者中足少陽陽維之㑹刺入四分灸五壯素問氣府論註云使枕骨後枕骨上頭縁耳上却行至完骨凡十二穴第五天衝在耳上如前三分刺入三分灸三壯氣府論註云足太陽少陽之㑹率谷在耳上入髮際一寸五分足太陽少陽之㑹嚼而取之刺入四分灸三壯曲鬢在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽之㑹刺入三分灸三壯浮白在耳後入髮際一寸足太陽少陽之㑹刺入三分灸二壯氣穴註云灸三壯刺入三分竅隂在完骨上枕骨下搖動應手足太陽少陽之㑹刺入四分灸五壯氣穴註云灸三壯刺入三分完骨在耳後入髮際四分足太陽少陽之㑹刺入二分留七呼灸七壯氣穴註云刺入三分灸三壯頭自髮際中央傍行凡五穴第六瘖門一名舌横一名舌厭在後髮際宛宛中入繫舌本督脈陽維之㑹仰頭取之刺入四分不可灸灸之令人瘖氣府論註云去風府一寸天柱在俠項後髮際大筋外亷陷者中足太陽脈氣所發刺入二分留六呼灸三壯風池在顳顬後髪際陷者中足少陽陽維之㑹刺入三分留三呼灸三壯氣府論註云在後陷者中按之引耳手足少陽脈之㑹刺入四分背自第一椎循督脈行至脊骶凡十一穴第七氣府論註云第六椎下有靈臺十椎下有中樞十六椎下有陽闗大椎在第一椎陷者中三陽督脈之㑹刺入五分灸九壯陶道在大椎節下間督脈足太陽之㑹俛而取之刺入五分留五呼灸五壯身柱在第三椎節下間督脈氣所發俛而取之刺入五分留五呼灸三壯氣府論註云灸五壯神道在第五椎節下間督脈氣所發俛而取之刺入五分留五呼灸三壯氣府論註云灸五壯至陽在第七椎節下間督脈氣所發俛而取之刺入五分灸三壯筋縮在第九椎節下間督脈氣所發俛而取之刺入五分灸三壯氣府論註云灸五壯脊中在第十一椎節下間督脈氣所發俛而取之刺入五分不可灸灸則令人痿懸樞在第十三椎節下間督脈氣所發伏而取之刺入三分灸三壯命門一名屬累在十四椎節下間督脈氣所發伏而取之刺入五分灸三壯腰俞一名背解一名髓空一名腰户在第二十一椎節下間督脈氣所發刺入二分留七呼灸五壯氣府論註云刺入三分熱註水穴註同熱穴註作二寸繆刺論同長强一名氣之隂郄督脈别絡在脊骶端少隂所結刺入三分留七呼灸三壯氣府論註及水穴註云刺入二分背自第一椎兩傍俠脊各一寸五分下至節凡四十一穴第八凡五藏之腧出於背者按其處應在中而痛解乃其腧也灸之則可刺之則不可盛則瀉之虚則補之以火補之者無吹其火須自滅也以火瀉之者疾吹其火拊其艾須其火滅也大杼在項第一椎下兩傍各一寸五分陷者中足太陽手太陽之㑹刺入三分留七呼灸七壯氣穴論註云督脈别絡手足太陽三脈之㑹風門熱府在第二椎下兩傍各一寸五分督脈足太陽之㑹刺入五分留五呼灸三壯肺俞在第三椎下兩傍各一寸五分刺入三分留七呼灸三壯氣府論註云五藏腧並足太陽脈之㑹心俞在第五椎下兩傍各一寸五分針入三分留七呼禁灸膈俞在第七椎下兩傍各一寸五分針入三分留七呼灸三壯肝俞在第九椎下兩傍各一寸五分針入三分留六呼灸三壯膽俞在第十椎下兩傍各一寸五分足太陽脈所發正坐取之刺入五分灸三壯氣府論註云留七呼痺論云膽胃三焦大小腸膀胱俞並足太陽脈氣所發脾俞在第十一椎下兩傍各一寸五分刺入三分留七呼灸三壯胃俞在第十二椎下兩傍各一寸五分刺入三分留七呼灸三壯三焦俞在第十三椎下兩傍各一寸五分足太陽脈氣所發刺入五分灸三壯腎俞在第十四椎下兩傍各一寸五分刺入三分留七呼灸三壯大腸俞在第十六椎下兩傍各一寸五分刺入三分留六呼灸三壯小腸俞在第十八椎下兩傍各一寸五分刺入三分留六呼灸三壯膀胱俞在第十九椎下兩傍各一寸五分刺入三分留六呼灸三壯中膂俞在第二十椎下兩傍各一寸五分俠脊胂而起刺入三分留六呼灸三壯白環俞在第二十一椎下兩傍各一寸五分足太陽脈氣所發伏而取之刺入八分得氣則瀉瀉訖多補之不宜灸水穴註云刺入五分灸三壯自大腸腸腧至此五穴並足太陽脈氣所發上􅐎在第一空腰髁下一寸俠脊陷者中足太陽少陽之絡刺入三分留七呼灸三壯次􅐎在第二空俠脊陷者中刺入三分留七呼灸三壯銅人經云刺入三分灸七壯中􅐎在第三空俠脊陷者中刺入二寸留十呼灸三壯銅人經云針入二分下􅐎在第四空俠脊陷者中刺入二寸留十呼灸三壯銅人經云針入三分少素問繆刺論云足太陽厥隂陽所結㑹陽一名利機在隂毛骨兩傍督脈氣所發刺入八分灸五壯氣府註云灸三壯背自第二椎兩傍俠脊各三寸行至二十一椎下兩傍俠脊凡二十六穴第九附分在第二椎下附項内亷兩傍各三寸足太陽之㑹刺入八分灸五壯魄户在第三椎下兩傍各三寸足太陽脈氣所發刺入三分灸五壯神堂在第五椎下兩傍各