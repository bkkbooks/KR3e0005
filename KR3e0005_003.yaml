之㑹㑹宗二穴手少陽郄在腕後三寸空中刺入三分灸三壯手太陽凡一十六穴第二十九小腸上合手太陽出於少澤少澤者金也一名小吉在手小指之端去爪甲一分陷者中手太陽脈之所出也為井刺入一分留二呼灸一壯前谷者水也在手小指外側本節前陷者中手太陽脈之所溜也為滎刺入一分留三呼灸三壯後谿者木也在手小指外側本節後陷者中手太陽脈之所注也為俞刺入二分留二呼灸一壯腕骨在手外側腕前起骨下陷者中手太陽脈之所過也為原刺入二分留三呼灸三壯陽谷者火也在手外側腕中兑骨下陷者中手太陽脈之所行也為經刺入二分留二呼灸三壯氣府論註云留三呼養老手太陽郄在手踝骨上一空腕後一寸陷者中刺入三分灸三壯支正手太陽絡在肘後一本作腕後五寸别走少隂者刺入三分留七呼灸三壯小海者土也在肘内大骨外去肘端五分陷者中屈肘乃得之手太陽脈之所入也為合刺入二分留七呼灸七壯氣穴論註作少海足太隂及股凡二十二穴第三十脾在隠白隠白者木也在足大指端内側去爪甲如韭葉足太隂脈之所出也為井刺入一分留三呼灸三壯大都者火也在足大指本節後陷者中足太隂脈之所溜也為滎刺入三分留七呼灸一壯太白者土也在足内側核骨下陷者中足太隂脈之所注也為俞刺入三分留七呼灸三壯公孫在足大指本節後一寸别走陽明太隂絡也刺入四分留二十呼灸三壯商丘者金也在足内踝下微前陷者中足太隂脈之所行也為經刺入三分留七呼灸三壯氣穴論註云刺入四分三隂交在内踝上三寸骨下陷者中足太隂厥隂少隂之㑹刺入三分留七呼灸三壯漏谷在内踝上六寸骨下陷者中足太隂絡刺入三分留七呼灸三壯地機一名脾舍足太隂郄别走上一寸空在膝下五寸刺入三分灸三壯隂陵泉者水也在膝下内側輔骨下陷者中伸足乃得之足太隂脈之所入也為合刺入五分留七呼灸三壯血海在膝臏上内亷白肉際二寸半足太隂脈氣所發刺入五分灸五壯箕門在魚腹土越兩筋間動脈應手太隂内市足太隂脈氣所發刺入三分留六呼灸三壯素問三部九候論註云直五里下寛鞏足單衣沉取乃得之動脈應於手足厥隂及股凡二十二穴第三十一肝出大敦大敦者木也在足大指端去爪甲如韭葉及三毛中足厥隂脈之所出也為井刺入三分留十呼灸三壯行間者火也在足大指間動脈陷者中足厥隂之所溜也為滎刺入六分留十呼灸三壯太衝者土也在足大指本節後二寸或曰一寸五分陷者中足厥隂脈之所注也為俞刺入三分留十呼灸三壯素問刺腰痛論註云在足大指本節後内間二寸陷者中動脈應手中封者金也在足内踝前一寸仰足取之陷者中伸足乃得之足厥隂脈之所注也為經刺入四分留七呼灸三壯氣穴論註云在内踝前一寸五分蠡溝足厥隂之絡在足内踝上五寸别走少陽刺入二分留三呼灸三壯中都足厥隂郄在内踝上七寸䯒中與少隂相直刺入三分留六呼灸五壯膝闗在犢鼻下二寸陷者中足厥隂脈氣所發刺入四分灸五壯曲泉者水也在膝内輔骨下大筋上小筋下陷者中屈膝得之足厥隂脈之所入也為合刺入六分留十呼灸三壯隂包在膝上四寸股内亷兩筋間足厥隂别走此處有缺刺入六分灸三壯五里在隂亷下去氣衝三寸隂股中動脈刺入六分灸五壯外臺秘要作去氣衝三寸去外亷二寸隂亷在羊矢下去氣衝二寸動脈中刺入八分灸三壯足少隂及股并隂蹻隂維凡二十穴第三十二腎出湧泉湧泉者木也一名地衝在足心陷者中屈足捲指宛宛中足少隂脈之所出也為井刺入三分留三呼灸三壯然谷者火也一名龍淵在足内踝前起大骨下陷者中足少隂脈之所溜也為滎刺入三分留三呼灸三壯刺之多見血使人立饑欲食太谿者土也在足内踝後跟骨上動脈陷者中足少隂脈之所注也為俞刺入三分留七呼灸三壯大鍾在足跟後衝中别走太陽足少隂絡刺入二分留七呼灸三壯素問水熱穴論註云在内踝後應刺腰痛論註云在足跟後衝中動脈手照海隂蹻脈所生在足内踝下一寸刺入四分留六呼灸三壯水泉足少隂郄去太谿下一寸在足内踝下刺入四分灸五壯復溜者金也一名伏白一名昌陽在足内踝上二寸陷者中足少隂脈之所行也為經刺入三分留三呼灸五壯刺腰痛論註云在内踝上二寸動脈交信在足内踝上二寸少隂前太隂後筋骨間隂蹻之郄刺入四分留三呼灸三壯築賔隂維之郄在足内踝上腨分中刺入三分灸五壯刺腰痛論註云在内踝後隂谷者水也在膝下内輔骨後大筋之下小筋之上按之應手屈膝得之足少隂脈之所入也為合刺入四分灸三壯足陽明及股凡三十穴第三十三胃出厲兑厲兑者金也在足大指次指之端去爪甲角如韭葉足陽明脈之所出也為井刺入一分留一呼灸三壯内庭者水也在足大指次指外間陷者中足陽明脈之所溜也為滎刺入三分留二十呼灸三壯氣穴論註云留十呼灸三壯陷谷者木也在足大指次指間本節後陷者中去内庭二寸足陽明脈之所注也為俞刺入五分留七呼灸三壯衝陽一名㑹原在足趺上五寸骨間動脈上去陷谷三寸足陽明脈之所過也為原刺入三分留十呼灸三壯解谿者火也在衝陽後一寸五分腕上陷者中足陽明脈之所行也為經刺入五分留五呼灸三壯氣穴論註云二寸五分三刺瘧論註云寸五分豐隆足陽明絡也在外踝上八寸下亷胻外亷陷者中别走太隂者刺入三分灸三壯巨虚下亷足陽明與小腸合在上亷下三寸刺入三分灸三壯氣穴論註云足陽明脈氣所發條口在下亷上一寸足陽明脈氣所發刺入八分灸三壯巨虚上亷足陽明與大腸合在三里下三寸刺入八分灸三壯氣穴論註云在犢鼻下六寸足陽明脈氣所發三里土也在膝下三寸䟰外亷足陽明脈氣所入也為合刺入一寸五分留七呼灸三壯素問云在膝下三寸胻外亷兩筋間分間犢鼻在膝下胻上俠解大筋中足陽明脈氣所發刺入六分灸三壯梁丘足陽明郄在膝上二寸刺入三分灸三壯隂市一名隂鼎在膝上三寸伏兎下若拜而取之足陽明脈氣所發刺入三分留七呼禁不可灸刺腰痛論註云伏兎下陷者中灸三壯伏兎在膝上六寸起肉間足陽明脈氣所發刺入五分禁不可灸髀闗在膝上伏兎後交分中刺入六分灸三壯足少陽及股并陽維四穴凡二十八穴第三十四膽出於竅隂竅隂者金也在足小指次指之端去爪甲如韭葉足少陽脈之所出也為井刺入三分留三呼灸三壯氣穴論註作一呼俠谿者水也在足小指次指二岐骨間本節前陷者中足少陽脈之所溜也為滎刺入三分留三呼灸三壯地五㑹在足小指次指本節後間陷者中刺入三分不可灸灸之令人瘦不出三年死臨泣者木也在足小指次指本節後間陷者中去俠谿一寸五分足少陽脈之所注也為俞刺入二分灸三壯丘墟在足外亷踝下如前陷者中去臨泣一寸足少陽脈之所過也為原刺入五分留七呼灸三壯懸鍾在足外踝上三寸動者脈中足三陽絡按之陽明脈絶乃取之刺入六分留七呼灸五壯光明足少陽絡在足外踝上五寸别走厥隂者刺入六分留七呼灸五壯骨空論註云刺入七分留十呼外丘足少陽郄少陽所生在内踝上七寸刺入三分灸三壯陽輔者火也在足外踝上四寸氣穴論註無四寸二字輔骨前絶骨端如前三分去丘墟七寸足少陽脈之所行也為經刺入五分留七呼灸三壯陽交一名别陽一名足􅐎陽維之郄在外踝上七寸斜屬三陽分肉間刺入六分留七呼灸三壯陽陵泉者土也在膝下一寸䯒外亷陷者中足少陽脈之所入也為合刺入六分留十呼灸三壯陽闗在陽陵泉上三寸犢鼻外陷者中刺入五分禁不可灸中犢在髀骨外膝上五寸分肉間陷者中足少陽脈氣所發也刺入五分留七呼灸五壯環跳在髀樞中側卧伸下足屈上足取之足少陽脈氣所發刺入一寸留二十呼灸五十壯氣穴論註云髀樞後足少陽太陽二脈之㑹灸三壯足太陽及股并陽蹻六穴凡三十四穴第三十五膀胱出於至隂至隂者金也在足小指外側去爪甲如韭葉足太陽脈之所出也為井刺入三分留五呼灸五壯通谷者水也在足小指外側本節前陷者中足太陽脈之所溜也為滎刺入二分留五呼灸三壯束骨者木也在足小指外側本節後陷者中足太陽脈之所注也為俞刺入三分灸三壯氣穴論註云本節後赤白肉際京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也為原刺入三分留七呼灸三壯申脈陽蹻所生也在足外踝下陷者中容爪甲許刺入三分留六呼灸三壯刺腰痛論註云外踝下五分金門在足太陽郄一空在足外踝下一名闗梁陽維所别屬也刺入三分灸三壯僕叅一名安邪在跟骨下陷者中拱足得之足太陽脈之所行也為經刺入五分留十呼灸三壯刺腰痛論註云陷者中細脈動應手跗陽陽蹻之郄在足外踝上三寸太陽前少陽後筋骨間刺入六分留七呼灸三壯氣穴論註作付陽飛揚一名厥陽在足外踝上七寸足太陽絡别走少隂者刺入三分灸三壯承山一名魚腹一名肉柱在兑腨腸下分肉間陷者中刺入七分灸三壯承筋一名腨腸一名直腸在腨腸中央陷者中足太陽脈氣所發禁不可刺灸三壯刺腰痛論註云在臑中央合陽在膝約文中央下二寸刺入六分灸五壯委中者土也在膕中央約文中動脈足太陽脈之所入也為合刺入五分留七呼灸三壯素問骨空論註云膕謂膝解之後曲脚之中背面取之膝刺腰痛論註云在足後屈處崑崙火也在足外踝後跟骨上陷中細脈動應手足太陽脈之所行也為經刺入五分留十呼灸三壯委陽三焦下輔俞也在足太陽之前少陽之後出於膕中外亷兩筋間承扶下六寸此足太陽之别絡也刺入七分留五呼灸三壯屈身而取之浮郄在委陽上一寸屈膝得之刺入五分灸三壯殷門在肉郄下六寸刺入五分留七呼灸三壯承扶一名肉郄一名隂闗一名皮部在尻臀下股隂腫上約文中刺入二寸留七呼灸三壯欲令灸發者灸履􅀈音偏熨之三日即發鍼灸甲乙經卷三
