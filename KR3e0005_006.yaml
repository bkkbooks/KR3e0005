body:
  text: 鍼灸甲乙經卷六晉皇甫謐撰八正八虚八風大論第一黄帝問曰嵗之所以皆同病者何氣使然少師對曰此八症之候也候此者常以冬至之日風從南方来者名曰虚風賊傷人者也其以夜半至者萬民皆卧而不犯故其嵗民少病其以晝至者萬民懈墯而皆中於邪風故民多病虚邪入客於骨而不發於外至其立春陽氣大發腠理開有因立春之日風從西方来萬民皆中虚風此兩邪相摶經氣結代故諸逢其風而遇其雨者名曰遇嵗露焉因嵗之和而少賊風者民少病而少死嵗多賊風邪氣寒温不和則民多病而死矣曰虚邪之風其所貴賤何如候之奈何曰正月朔日風從西方来而大名曰白骨将國有殃人多死亡正月朔日平旦西北風行民多病十有三也正月朔日日中北風夏民多死者一作多病正月朔日平旦北風春民多死者正月朔日夕時北風秋民多死者正月朔日天時和温不風民無病大寒疾風民多病二月丑不風民多心腹病三月戌不風民多寒熱病四月巳不暑民多癉病十月申不寒民多暴死諸所謂風者發屋拔樹揚沙石起毫毛發腠理者也風從其衝後来者名曰虚風賊傷人者也主殺害必謹候虚風而謹避之避邪之道如避矢石然後邪弗能害也風從南方来名曰大弱風其傷人也内舍於心外在於脈其氣主為熱風從西南方来名曰謀風其傷人也内舍於脾外在於肌肉其氣主為弱風從西方来名曰剛風其傷人也内舍於肺外在於皮膚其氣主為燥風從西北方来名曰折風其傷人也内舍於小腸外在於手太陽之脈脈絶則泄脈閉則結不通善暴死風從北方来名曰大剛風其傷人也内舍於腎外在於骨與肩背之膂筋其氣主為寒風從東北方来名曰凶風其傷人也内舍於大腸外在於兩脅腋骨下及肢節風從東方来名曰嬰兒風其傷人也内舍於肝外在於筋紐其氣主為濕風從東南方来名曰弱風其傷人也内舍於胃外在於肌其氣主為體重凡此八風者皆從其虚之鄉来乃能病人三虚相薄則為暴病卒死兩虚一實則為淋露寒熱犯其雨濕之地則為痿故聖人避邪如避矢石其三虚偏中於邪風則為擊仆偏枯矣曰四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開賊風邪氣因得以入乎将必須八正風邪乃能傷人乎曰賊風邪氣之中人也不得以時然必因其開也其入深其内亟一作極也疾其病人也卒暴因其閉也其入淺以留其病人也徐以遲曰其有寒温和適腠理不開然有卒病者其故何也曰人雖平居其腠理開閉緩急固常有時也夫人與天地相參與日月相應故月滿則海水西盛人血氣積肌肉充皮膚緻毛髪堅腠理郄煙垢著當是之時雖遇賊風其入淺亦不深到其月郭空則海水東盛人血氣虚其衛氣去形獨居肌肉減皮膚緩腠理開毛髪薄㬷垢澤當是之時遇賊風其入深其病人卒暴曰人有卒然暴死者何邪使然曰得三虚者其死疾得三實者邪不能傷也乗年之衰逢月之空失時之和人氣乏少因為賊風邪氣所傷是謂三虚故論不知三虚工反為粗若逢年之盛遇月之滿得時之和雖有賊風邪氣不能傷也逆順病本末方宜形志大論第二黄帝問曰治民治身可得聞乎岐伯對曰治民與自治治彼與治此治小與治大治國與治家未有逆而能治者夫惟順而已矣故入國問其俗臨病人問所便曰便病奈何曰中熱消癉則便寒寒中之屬則便熱胃中熱則消糓令人懸心善饑臍已上皮熱腸中熱則出黄如糜色臍已下皮寒胃中寒則填脹腸中寒則腸鳴飱泄胃中寒腸中熱則脹且泄胃中熱腸中寒則疾饑少腹痛脹曰胃欲寒飲腸欲熱飲兩者相逆治之奈何曰春夏先治其標後治其本秋冬先治其本後治其標曰便其相逆者奈何曰便此者食飲衣服欲適寒温寒無悽愴暑無出汗食飲者熱無灼灼寒無滄滄寒温中適故氣摶持乃不致邪僻先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先病而後生熱者治其本先病而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必先調之乃治其他病先病而後中滿者治其標先中滿而後煩心者治其本人有客氣同氣同一作固小大不利治其標小大便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚而調之間者并行甚者獨行小大不利而後生他病者治其本東方濵海傍水其民食魚嗜鹹魚者使人熱中鹹者勝血其民皆黒色疎理其病多壅腫其治宜砭石西方水土剛强其民華食而脂肥故邪不能傷其形體其病生於内其治宜毒藥北方風寒氷冽其民樂野處而乳食藏寒生滿病其治宜炙􅌊南方其地下水上弱霧露之所聚也其民嗜酸而食臊故緻理而赤色其病攣痺其治宜微鍼中央其地平以濕天地所生物者衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹻故聖人雜合以治各得其宜形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以鍼石形苦志苦病生於咽喝一作困竭治之以甘藥形數驚恐經絡不通病生於不仁治之以按摩醪醴是謂五形故志曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太隂出氣惡血刺少隂出血惡血刺厥隂出血惡氣五藏六府虚實大論第三黄帝問曰刺法言有餘寫之不足補之何謂也岐伯對曰神有有餘有不足氣有有餘有不足血有有餘有不足形有有餘有不足志有有餘有不足心藏神肺藏氣肝藏血脾藏肉腎藏志志意通達内有骨髓而成形五藏之道皆出於經渠以行血氣血氣不和百病乃變化而生故守經渠焉神有餘則笑不休不足則憂素問作悲王氷曰作憂者誤血氣未并五藏安定邪客於形悽厥素問作洒浙起於毫毛未入於經絡故命曰神之微神有餘則寫其小絡之血出血勿之深斥無中其大經神氣乃平神不足者視其虚絡切而致之刺而和之無出其血無泄其氣以通其經神氣乃平曰刺微奈何曰按摩勿釋著鍼勿斥移氣於足素問作不足神氣乃復氣有餘則喘欬上氣不足則息利少氣血氣未并五藏安定皮膚微病命曰白氣微泄有餘則寫其經渠無傷其經無出其血無泄其氣不足則補其經渠無出其氣曰刺微奈何曰按摩勿釋出鍼視之曰故将深之適人必革精氣自伏邪氣亂散無所休息氣泄腠理真氣乃相得血有餘則怒不足則慧素問作恐血氣未并五藏安定孫絡外溢則絡有留血有餘則刺其盛經出其血不足則視其虚内鍼其脈中久留之血至素問作而視脈大疾出其鍼無令血泄曰刺留奈何曰視其血絡刺出其血無令惡血得入於經以成其病形有餘則腹脹涇溲不利不足則四肢不用血氣未并五藏安定肌肉蠕一作溢動名曰微風有餘則寫其陽經不足則補其陽絡曰刺微奈何曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索志有餘則腹脹飱泄不足則厥血氣未并五藏安定骨節有傷有餘則寫然筋血者出其血不足則補其復溜曰刺未并奈何曰即取之無中其經以去其邪乃能立虚曰虚實之形不知其何以生曰血氣已并隂陽相傾氣亂於衛血逆於經血氣離居一實一虚血并於隂氣并於陽故為驚狂血并於陽氣并於隂乃為炅中血并於上氣并於下心煩悶善怒血并於下氣并於上亂而喜忘素作善忘曰血并於隂氣并於陽如是血氣離居何者為實何者為虚曰血氣者喜温而惡寒寒則泣不流温則消而去之是故氣之所并為血虚血之所并為氣虚曰人之所有者血與氣耳乃言血并為虚氣并為虚是無實乎曰有者為實無者為虚故氣并則無血血并則無氣今血與氣相失故為虚焉絡之與孫脈俱注一作輸於經血與氣并則為實焉血之與氣并走於上則為大厥厥則暴死氣復反則生不反則死曰實者何道從来虚者何道從去曰夫隂與陽皆有輸會陽注於隂隂滿之外隂陽紃音巡平素作均平以充其形九候若一名曰平人夫邪之所生或生於陽或生於隂其生於陽者得之風雨寒暑其生於隂者得之飲食起居隂陽喜怒曰風雨之傷人奈何曰風雨之傷人也先客於皮膚𫝊入於孫脈孫脈滿則𫝊入於絡脈絡脈滿乃注於大經脈血氣與邪氣并客於分腠之間其脈堅大故曰實實者外堅充滿不可按按之則痛曰寒濕之傷人奈何曰寒濕之中人也皮膚収素問作不収肌肉堅𦂳營血濇衛氣去故曰虚虚者攝辟氣不足血濇按之則氣足温之故快然而不痛曰隂之生實奈何曰喜怒不節則隂氣上逆上逆則下虚下虚則陽氣走乏故曰實曰隂之生虚奈何曰喜則氣下悲則氣消消則脈空虚因寒飲食寒氣動藏一作重滿則血泣氣去故曰虚曰陽虚則外寒隂虚則内熱陽盛則外熱隂盛則内寒不知所由然曰陽受氣於上焦以温皮膚分肉之間今寒氣在外則上焦不通不通則寒獨留於外故寒慄有所勞倦形氣衰少榖氣不盛上焦不行下焦素問作下脘不通胃氣熱熏胷中故内熱上焦不通利皮膚緻宻腠理閉塞素問下有𤣥府二字不通衛氣不得泄越故外熱厥氣上逆寒氣積於胷中而不寫不寫則温氣去寒獨留則血凝泣凝則腠理不通其脉盛大以濇故中寒曰隂與陽并血氣已并病形已成刺之奈何曰刺此者取之經渠取血於營取氣於衛用形哉因四時多少髙下曰血氣已并病形已成隂陽相傾補瀉奈何曰瀉實者氣盛乃内鍼鍼與氣俱内以開其門如利其户鍼與氣俱出精氣不傷邪氣乃下外門不閉以出其疾摇大其道如利其路是謂大寫必切而出大氣乃屈曰補虚奈何曰持鍼勿置以定其意候呼内鍼氣出鍼入鍼空四塞精無從去方實而疾出鍼氣入鍼出熱不得還閉塞其門邪氣布散精氣乃得存動後時素問作動氣後時近氣不失逺氣乃来是謂追之曰虚實有十生於五藏五脈耳夫十二經脈者皆生百素作其病今獨言五藏夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病者皆有虚實何以合之乎曰五藏與六府為表裏經絡肢節各生虚實視其病所居隨而調之病在脈調之血病在血調之絡病在氣調諸衛病在肉調之分肉病在筋調之筋病在骨調之骨燔鍼刼刺其下及與急者病在骨碎鍼藥熨病不知所痛兩蹻為上身形有痛九候莫病則繆刺之病在於左而右脈病者則巨刺之必謹察其九候鍼道畢矣隂陽清濁順治逆亂大論第四黄帝問曰經脈十二者别為五行分為四時何失而亂何得而治岐伯對曰五行有序四時有分相順而治相逆而亂曰何謂相順而治曰經脈十二以應十二月十二月者分為四時四時者春夏秋冬其氣各異營衛相隨隂陽相和清濁不相干如是則順而治矣曰何謂相逆而亂曰清氣在隂濁氣在陽營氣順脈衛氣逆行清濁相干亂於胷中是謂大脱故氣亂於心則煩心宻黙俛首静伏亂於肺則俛仰喘喝按手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭痛一作頭重眩仆氣在心者取之手少隂心主之俞氣在於肺者取之手太隂滎足少隂俞氣在於腸胃者取之手足太隂陽明不下者取之三里氣在於頭者取之天柱大杼不知取足靈樞作手太陽之榮俞氣在臂足者先去血脈後取其陽明少陽之滎俞徐入徐出是謂之導氣補寫無形是謂之同精是非有餘不足也亂氣之相逆也四時賊風邪氣大論第五黄帝問曰有人於此並行並立其年之長少等也衣之厚薄均也卒然遇烈風疾雨或病或不病或皆死其故何也岐伯對曰春温風夏陽風秋凉風冬寒風凡此四時之風者其所病各不同形黄色薄皮弱肉者不勝春之虚風白色薄皮弱肉者不勝夏之虚風青色薄皮弱肉者不勝秋之虚風赤色薄皮弱肉者不勝冬之虚風曰黒色不病乎曰黒色而皮厚肉堅固不能傷於四時之風其皮薄而肉不堅色不一者長夏至而有虚風者病矣其皮厚而肌肉堅者長夏至而有虚風者不病矣其皮厚而肌肉堅者必重感於寒内外皆然乃病也曰賊風邪氣之傷人也令人病焉今有不離屏蔽不出室穴之中卒然而病者其故何也曰此皆嘗有所傷於濕氣藏於血脈之中外肉之間久留而不去若有所墜墮惡血在内而不去卒然喜怒不節飲食不適寒温不時腠理閉不通素下有其開二字而適遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發矣曰夫子之所言皆病人所自知也其無遇邪風又無怵惕之志卒然而病其故何也唯有因鬼神之事乎曰此亦有故邪留而未發也因而志有所惡及有所慕血氣内亂兩氣相薄其所從来者微視之不見聴之不聞故似鬼神曰其有祝由而已者其故何也曰先巫者因知百病之勝先知百病之所從者可祝由而已也内外形診老壮肥瘦病旦慧夜甚大論第六黄帝問曰人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方岐伯對曰隂中有陽陽中有隂審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合於五藏六府外合於筋骨皮膚是故内有隂陽外有隂陽在内者五藏為隂六府為陽在外者筋骨為隂皮膚為陽故曰病在隂之隂者刺隂之滎俞病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺陽之絡病在陽者名曰風病在隂者名曰痺隂陽俱病名曰風痺病有形而不痛者陽之類無形而痛者隂之類無形而痛者其陽完九墟完作緩下同而隂傷急治其陽無攻其隂九墟作急治其隂無攻其陽有形而不痛者其隂完而陽傷急治其隂無攻其陽九墟作急治其陽無攻其隂隂陽俱動乍有乍無加以煩心名曰隂勝其陽此謂不表不裏其形不久也曰形氣病之先後内外之應奈何曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脈筋脈乃應此形氣内外之相應也曰刺之奈何曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之久痺不去身者視其血絡盡去其血曰外内之病難易之治奈何曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此外内難易之應也曰何以知其皮肉血氣筋骨之病也曰色起兩眉間薄澤者病在皮唇色青黄赤白黒者病在肌肉營氣濡然者病在血氣千金方作脈目色青黄赤白黒者病在筋耳焦枯受塵垢者病在骨曰形病何如取之奈何曰皮有部肉有柱氣血有俞千金翼下有筋有結骨有屬皮之部俞在於四末肉之柱在臂胻諸陽肉分間與足少隂分間氣血之俞在於諸絡脈氣血留居則盛而起筋部無隂無陽無左無右候病所在骨之屬者骨空之所以受液而溢腦髓者也曰取之奈何曰夫病之變化浮沉淺深不可勝窮各在其處病間者淺之甚者深之間者少之甚者衆之隨變而調氣故曰上工也曰人之肥瘦小大寒温有老壮少小之别奈何曰人年五十已上為老三十已上為壮十八已上為少六嵗已上為小曰何以度其肥瘦曰人有脂有膏有肉曰别此奈何曰㬷肉堅皮滿者脂㬷肉不堅皮緩者膏皮肉不相離者肉曰身之寒温何如曰膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者和靈作熱粗理者寒少肉者寒温之症未詳曰其肥瘦大小奈何曰膏者多氣而皮縱緩故能縱腹垂膄肉者身體容大脂者其身収小曰三者之氣血多少何如曰膏者多氣多氣者熱熱者耐寒也肉者多血多血者則形充形充者則平也脂者其血清氣滑少故不能大此别於衆人者也曰衆人如何曰衆人之皮肉脂膏不能相加也血與氣不能相多也故其形不小不大各自稱其身名曰衆人曰治之奈何曰必先别其五形血之多少氣之清濁而後調之治無失常經是故膏人者縱腹垂膄肉人者上下容大脂人者雖脂不能大曰病者多以旦慧晝安夕加夜甚者何也曰春生夏長秋収冬藏是氣之常也人亦應之以一日一夜分為四時之氣朝為春日中為夏日入為秋夜為冬朝則人氣始生病氣衰故旦慧日中則人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居於身故甚曰其時有反者何也曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也曰治之奈何曰順天之時而病可與期順者為工逆者為粗也隂陽大論第七隂静陽躁陽生隂長陽殺隂藏陽化氣隂成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飱泄濁氣在上則生䐜脹此隂陽反作病之逆順也故清陽為天濁隂為地地氣上為雲天氣下為雨雨出地氣雲出天氣故清陽出上竅濁隂出下竅清陽發腠理濁隂走五藏清陽實四肢濁隂歸六府水為隂火為陽陽為氣隂為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味隂味出下竅陽氣出上竅味厚者為隂薄為隂之陽氣厚者為陽薄為陽之隂味厚則泄薄則通氣薄則發泄厚則發熱壮火之氣衰少火之氣壮壮火食氣氣食少火壮火散氣少火生氣氣味辛甘發散為陽酸苦涌泄為隂隂勝則陽病陽勝則隂病隂病則熱陽病則寒素問作陽勝則熱隂勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉天有四時五行以生長収藏以生寒暑燥濕風人有五藏化為五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷隂暴喜傷陽厥氣上行滿脈去形故曰喜怒不節寒暑過度生乃不固重隂必陽重陽必隂此隂陽之變也夫隂在内陽之守也陽在外隂之使也陽勝則身熱腠理閉喘息麄為之後悶素問作俛仰汗不出而熱齒乾以煩悶腹脹死耐冬不耐夏隂勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死耐夏不耐冬此隂陽更勝之變病之形能也曰調此二者奈何曰能知七損八益則二者可調也不知用此則早衰矣清陽上天濁隂歸地天氣通於肺地氣通於咽風氣通於肝雷氣通於心榖氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣暴風象雷逆氣象陽故治不法天之紀不用地之理則灾害至矣邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脉其次治六府其次治五藏治五藏者半生半死矣故天之邪氣感則害五藏水榖之寒熱感則害六府地之濕氣感則害皮肉筋脈故善用鍼者從隂引陽從陽引隂以右治左以左治右以我知彼以表知裏以觀過與不及之理見微則過用之不殆善診者察色按脈先别隂陽審清濁而知部分視喘息聴聲音而知病所苦觀權衡視規矩而知病所生按尺寸觀浮沉滑濇而知病所生以治則無過以診則無失矣故曰病之始起可刺而已其盛也可待衰而已故因其輕而揚之因其重而減之因其衰而彰之形不足者温之以氣精不足者補之以味其髙者因而越之其下者引而竭之中滿者寫之於内其有形者漬形以為汗其在皮者汗而發之其慓悍者按而収之其實者散而寫之審其陽隂以别柔剛陽病治隂隂病治陽定其血氣各守其鄉血實宜决之氣實宜掣之引之陽從右隂從左素問作陽從左隂從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣之多少逆順皆為厥有餘者厥也一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛癲疾求陽不得求之於隂素問作求隂不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿目春三月之病在理已盡草與栁葉皆殺春隂陽皆絶期在孟春冬三月之病病合陽者至春正月脈有死徵皆歸於春素問作始春春三月之病曰陽殺隂陽皆絶期在草乾夏三月之病至隂不過十日隂陽交期在溓水秋三月之病三陽俱起不治自己隂陽交合者立不能坐坐不能起三陽獨至期在石水二隂獨至期在盛水正邪襲内生夢大論第八黄帝問曰淫邪泮衍奈何岐伯對曰正邪從外襲内未有定舍反淫於藏不得定處與榮衛俱行而與魂魄飛揚使人卧不得安而喜夢凡氣淫於府則夢有餘於外不足於内氣淫於藏則夢有餘於内不足於外曰有餘不足有形乎曰隂盛則夢涉大水而恐懼陽盛則夢大火而燔􅌊隂陽俱盛則夢相殺毁傷上盛則夢飛下盛則夢墮甚飽則夢予甚饑則夢取肝氣盛則夢怒肺氣盛則夢哭泣恐懼飛揚心氣盛則夢喜笑及恐怖脾氣盛則夢歌樂體重手足不舉腎氣盛則夢腰脊兩解而不屬凡此十二盛者至而寫之立已厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之器及竒物客於肝則夢見山林樹木客於脾則夢見丘陵大澤壊屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢逰行客於胃則夢飲食客於大腸則夢見田野客於小腸則夢見聚邑行街一作衝衢客於膽則夢見鬬訟自刳客於隂器則夢接内客於項則夢斬首客於胻則夢行走不能前及居深地窌苑中客於股肱則夢禮節拜跪客於胞䐈則夢溲便利凡此十五不足者至而補之立已五味所宜五藏生病大論第九黄帝問曰榖氣有五味其入藏分别奈何岐伯對曰胃者五藏六府之海皆入於胃五藏六府皆禀於胃五味各走其所喜故榖味酸先走肝九卷乂曰酸入胃其氣濇一作濇以収不能出入不出則留於胃中胃中和温則下注於膀胱之胞膀胱之胞薄以耎得酸則縮綣約而不通水道不行故癃隂者積筋之所終聚也故酸入胃而走於筋素問曰酸走筋筋病無多食酸其義相順又曰肝欲辛多食酸則肉胝䐢而唇掲謂木勝土也木辛與九卷義錯作素問肝欲辛欲酸苦先走心九卷又曰苦入胃五榖之氣皆不能勝苦苦入下脘下脘者三焦之路皆閉而不通故氣變嘔也齒者骨之所絡也故苦入胃而走骨入而復出必黧疏是知其走骨也水火既濟骨氣通於心素問曰苦走骨骨病無多食苦其義相順又曰心欲酸食苦則皮稿而毛拔謂火勝金也火酸與九卷義錯甘先走脾九卷又曰甘入脾其氣弱少不能上至上焦而與榖俱留於胃中甘者令人柔潤也胃柔則緩緩則蟲動蟲動則令人心悶其氣通於皮故曰甘走皮皮者肉之餘葢皮雖屬肺與肉連體故甘潤肌肉并皮也素問曰甘走肉肉病無多食甘其義相順又曰多食甘則骨痛而髪落謂土勝水也與九卷不錯辛先走肺九卷又曰辛入胃其氣走於上焦上焦者受諸氣而營諸陽者也薑韮之氣熏至營衛營衛不時受之久留於心下故洞一作煴心辛者與氣俱行故辛入胃則與汗俱出矣千金云辛入胃而走氣與氣俱出故氣盛素問曰辛走氣氣病無多食辛其義相順又曰肺欲苦多食辛則筋急而爪枯謂金勝木也肺欲苦與九卷義錯鹹先走腎九卷又曰鹹入胃其氣上走中焦注於諸脈脈者血之所走也血與鹹相得則血涘一作凝下同血涘則胃中竭竭則咽路焦故舌乾而善渇血脈者中焦之道故鹹入而走血矣腎合三焦血脈雖屬肝心而為中焦之道故鹹入而走血矣素問曰鹹走血血病無多食鹹其義相順又曰多食鹹則脈涘泣而變色謂水勝火也雖俱言血脈其義不冋榖氣營衛俱行津液已行營衛大通乃糟粕以次𫝊下曰營衛俱行奈何曰榖始入於胃其精微者先出於胃之兩焦以溉五藏别出兩焦行於營衛之道其大氣之摶而不行者積於胷中名曰氣海出於肺循於喉嚨故呼則出吸則入天地之精氣其大數常出三而入一故榖不入半日則氣衰一日則氣少矣曰榖之五味可得聞乎曰五榖粳米甘麻素問作小豆酸大豆鹹小麥苦黄黍辛五果棗甘李酸栗鹹杏苦桃辛五畜牛肉甘犬肉酸豕肉鹹羊肉苦雞肉辛五菜葵甘韮酸藿鹹薤苦葱辛五色黄宜甘青宜酸黒宜鹹赤宜苦白宜辛脾病者宜食粳米牛肉棗葵甘者入脾用之心病者宜食麥羊肉杏薤苦者入心用之腎病者宜食大豆豕肉栗藿鹹者入腎用之肺病者宜食黍雞肉桃葱辛者入肺用之肝病者宜食麻犬肉李韮酸者入肝用之肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘肝足厥隂少陽主治肝苦急食甘以緩之心手少隂太陽主治心苦緩食鹹以収之脾足太隂陽明主治脾苦濕急食苦以燥之肺手太隂陽明主治肺苦氣上逆急食苦以泄之腎足少隂太陽主治腎苦燥急食辛以潤之開腠理致津液通氣墜也毒藥攻邪五榖為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五味者各有所利辛散酸収廿緩苦堅鹹耎肝病者兩脇下痛引少腹令人善怒虚則目􅉩􅉩無所見耳無所聞善恐如人将捕之取其經厥隂與少陽血者氣逆則頭痛耳聾不聰頰腫取血者又曰徇蒙招尤目瞑耳聾下實上虚過在足少陽厥隂甚則入肝心病者胷中痛脇支滿兩胠下痛膺背肩甲間痛兩擘内痛虚則胸腹大脇下與腰相引而痛取其經少隂太陽血者素問云舌下血者其變病刺郄中血者又曰胸中痛支滿腰脊相引而痛過在手少隂太陽素問云心煩頭痛病在鬲中過在手巨陽少隂脾病者身重善饑肌肉萎足不収行善瘈瘲脚下痛虚則腹脹腸鳴飱泄食不化取其經太隂陽明少隂血者又曰腹滿䐜脹支滿胠脇下厥上胃過在足太隂陽明肺病者喘逆咳氣肩背痛汗出尻隂股膝攣髀腨胻足皆痛虚則少氣不能報息耳聾喉嚨乾取其經手太隂足太陽外厥隂内少隂血者又曰欬嗽上氣病素問作厥在胸中過在手陽明太隂腎病者腹大脛腫痛欬喘身重寝汗出憎風虚則胸中痛大腸小腸素作大腹小腹痛清厥意不樂取其經少隂太陽血者又曰頭痛癲疾下實上虚過在足少隂太陽甚則入腎五藏𫝊病大論第十病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春大病在肝愈於丙丁丙丁不愈加於庚辛庚辛不加素問作不死下同持於壬癸起於甲乙禁當風病在肝平旦慧下晡甚夜半静病在心愈於長夏長夏不愈甚於冬冬不死持於春起於夏病在心愈於戊已戊巳不愈加於壬癸壬癸不加持於甲乙起於丙丁禁衣温食熱病在心日中慧夜半甚平旦静病在脾愈於秋秋不愈甚於春春不死持於夏起於長夏病在脾愈於庚辛庚辛不愈加於甲乙甲乙不加持於丙丁起於戊己禁温衣濕地素問云禁温衣飽食濕地濡衣病在脾日昳慧平旦甚素作日出下晡静病在肺愈於冬冬不愈甚於夏夏不死持於長夏起於秋病在肺愈於壬癸壬癸不愈加於丙丁丙丁不加持於戊己起於庚辛禁寒衣冷飲食病在肺下晡慧日中甚夜半静病在腎愈於春春不愈甚於長夏長夏不死持於秋起於冬病在腎愈於甲乙甲乙不愈加於戊己戊己不死持於庚辛起於壬癸禁犯焠㶼無食熱無温衣素問作犯焠㶼熱食温灸衣病在腎夜半慧日乘四季甚下晡静邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至其所生而持自得其位而起腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂鬲中心移寒於肺為肺消肺消者飲一溲二死不治肺移寒於腎為涌水涌水者按其腹不堅水氣客於大腸疾行腸鳴濯濯如囊裹漿治主肺者素問作水之病也脾移熱於肝則為驚䘐肝移熱於心則死心移熱於肺𫝊為膈消肺移熱於腎𫝊為柔痓腎移熱於脾𫝊為虚腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸膈腸不便上為口糜小腸移熱於大腸為虙瘕為沉大腸移熱於胃善食而瘦名曰食㑊又胃移熱於膽亦名食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也𫝊為䘐䁾瞑目故得之厥也五藏受氣於其所生𫝊之於其所勝氣舍於其所生死於其所不勝病之且死必先𫝊其所行至不勝乃死此言氣之逆行也故死肝受氣於心𫝊之於脾氣舍於腎至肺而死心受氣於脾𫝊之於肺氣舍於肝至腎而死脾受氣於肺𫝊之於腎氣舍於心至肝而死肺受氣於腎𫝊之於肝氣舍於脾至心而死腎受氣於肝𫝊之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死者之早暮也黄帝問曰余受九鍼於夫子而私覽於諸方或有導引行氣按摩灸熨刺爇飲藥一者可獨守耶将盡行之乎岐伯對曰諸人者衆人之方也非一人之所盡行也曰此乃所謂守一勿失萬物畢具也余已聞隂陽之要虚實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎曰要乎哉問道昭乎其如旦醒窘乎其如夜暝能被而服之神與俱成畢将服之神自得之生神之理可著於竹帛不可傳之于子孫也曰何謂旦醒曰明於隂陽如惑之解如醉之醒曰何謂夜暝曰瘖乎其無聲漠乎其無形折毛發理正氣横傾淫邪泮衍血脈傳留大氣入藏腹痛下淫可以致死不可以致生曰大氣入藏奈何曰病先發於心心痛一日之肺而欬三日之肝肋支滿五日之脾閉塞不通身體重三日不已死冬夜半夏日中病先發於肺喘咳三日之肝脇支滿一日之脾而身體痛五日之胃而脹十日不已死冬日入夏日出病先發於肝頭痛目眩肋多滿一日之脾而身體痛五日之胃而腹脹三日之腎腰脊少腹痛胻痠三日不已死冬日中素問作日入夏早食病先發於脾身痛體重一日之胃而脹二日之腎少腹腰脊痛胻痠三日之膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病先發於胃脹滿五日之腎少腹腰脊痛胻痠三日之膀胱背膂筋痛小便閉五日而上之心身重六日不已死冬夜半夏日昳病先發於腎少腹腰脊痛胻痠三日之膀胱背膂筋痛小便閉三日而上之心心脹三日之小腸兩脇支痛三日不已死冬大晨夏晏晡按靈樞素問云三日而上之小腸此云三日而上之心乃皇甫士安合二書為此篇文也病先發於膀胱小便閉五日之腎少腹脹腰脊痛胻痠一日之小腸而腸脹二日之脾而身體痛二日不已死冬雞鳴夏下晡諸病以次相𫝊如是者皆有死期不可刺也夀夭形診病候耐痛不耐痛大論第十一黄帝問曰形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯髙對曰形與氣相任則夀不相任則夭皮與肉相裹則夀不相裹則夭血氣經絡勝形則夀不勝形則夭曰何謂形緩急曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰也衰則危矣形充而顴不起者腎小也小則夭矣形充而大肉㬷堅而有分者肉堅堅則夀矣形充而大皮肉無分理不堅者肉脆脆則夭矣此夭之生命所以立形定氣而視夀夭者也必明於此以立形定氣而後可以臨病人決死生也曰形氣之相勝以立夀夭奈何曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危也凡五藏者中之府中盛藏滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不歛言語善惡不避親疎者此神明之亂也倉廪不藏者是門户不要也水泉不止者是膀胱不藏也得守者生失守者死夫五藏者身之强也頭者精明之府頭傾視深神将奪矣背者胸中之府背曲肩隨府将壊矣腰者腎之府轉摇不能腎将憊矣膝者筋之府屈伸不能行則僂附筋将憊矣骨者髓之府不能久立行則掉慓骨将憊矣得强則生失强則死岐伯曰反四時者有餘為精不足為消應太過不足為精應不足有餘為消隂陽不相應病名曰闗格人之骨强筋勁肉緩皮膚厚者耐痛其於鍼石之痛火爇亦然加以黒色而善一本作美骨者耐火爇堅肉薄皮者不耐鍼石之痛於火爇亦然同時而傷其身多熱者易已多寒者難已胃厚色黒大骨肉肥者皆勝毒其瘦而薄者皆不勝毒也形氣盛衰大論第十二黄帝問曰氣之盛衰可得聞乎岐伯對曰人年十嵗一作十六五藏始定血氣已通其氣在下故好走二十嵗血氣始盛肌肉方長故好趨三十嵗五藏大定肌肉堅固血脈盛滿故好步四十嵗五藏六府十二經脈皆大盛平定腠理始開榮華剥落鬢髪頒白平盛不摇故好坐五十嵗肝氣始衰肝葉始薄膽汁始減目始不明六十嵗心氣始衰乃善憂悲血氣懈墯故好卧七十嵗脾氣虚皮膚始枯故四肢不舉八十嵗肺氣衰魂魄離散故言善悞九十嵗腎氣焦藏乃萎枯經脈空虚百嵗五藏皆虚神氣皆去形骸獨居而終盡矣女子七嵗腎氣盛齒更髪長二七天水至素問作天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髪長極身體盛壮五七陽明脈衰面皆焦髪始白七七任脈盛太衝一作伏衝脈衰少天水竭地道不通故形壊而無子耳丈夫八嵗腎氣實髪長齒更二八腎氣盛天水至而精氣溢寫隂陽和故能有子三八腎氣平均筋骨勁强故真牙生而長極四八筋骨隆盛肌肉滿壮五八腎氣衰髪墮齒稿六八陽氣衰於上面焦鬢髪頒白七八肝氣衰筋不能動天水竭精少腎氣衰形體皆極八八則齒髪去腎者主水受五藏六府之精而藏之故五藏盛乃能寫今五藏皆衰筋骨懈墯天水盡矣故髪鬢白體重行步不正而無子耳鍼灸甲乙經卷六
