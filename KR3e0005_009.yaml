body:
  text: 鍼灸甲乙經巻九晉皇甫謐撰大寒内薄骨髓陽逆發頭痛第一頷項痛附黃帝問曰病頭痛數嵗不已此何病也岐伯對曰當有所犯大寒内至骨髓骨髓者以腦為主腦逆故令頭痛齒亦痛陽逆頭痛胷滿不得息取人迎厥頭痛面若腫起而煩心取足陽明太陽一作隂厥頭痛脉痛心悲喜泣視頭動脉反盛者乃刺之盡去血後調足厥隂厥頭痛噫九墟作意善忘按之不得取頭面左右動脉後取足太陽一作隂厥頭痛員員而痛靈樞作貞貞頭重寫頭上五行行五先取手少隂後取足少隂頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛痛甚耳前後脉骨一本作湧熱先寫其血後取足太陽少隂一本亦作陽厥頭痛痛甚耳前後脉涌有血寫其血後取足少陽真頭痛痛甚腦盡痛手足寒至節死不治頭痛不可取於俞有所擊墜惡血在内若内傷痛痛未巳可即刺之不可逺取頭痛不可刺者大痺為惡風日作者可令少愈不可已頭寒痛先取手少陽陽明後取足少陽陽明頷痛刺手陽明與頷之盛脉出血頭項不可俛仰刺足太陽不可顧刺手太陽一云手陽明頷痛刺足陽明曲周動脉見血𤣥巳不已按經刺人迎立已頭痛目忩及天衝風池主之厥頭痛孔最主之厥頭痛面腫起商丘主之寒氣客於五藏六府發卒心痛胷痺心疝三䖝第二厥心痛與背相引善瘈如從後觸其心身傴僂者腎心痛也先取京骨崑崙發鍼立已不已取然谷厥心痛暴泄腹脹滿心痛尤甚者胃心痛也取太都太白厥心痛如錐刺其心心痛甚者脾心痛也取後谷太谿厥心痛色蒼蒼如死状終日不得太息者肝心痛也取行間太衝厥心痛卧若徒居心痛乃間動行痛益甚色不變者肺心痛也取魚際太淵真心痛手足青至節心痛甚旦發夕死夕發旦死心下一本作痛不可刺者中有盛聚不可取于俞腸中有䖝瘕有蛕蛟不可取以小鍼心腹痛發作腫聚往來上下行痛有休止腹中熱渇㵪音涎者是蛕蛟也以手聚按而堅持之無令得移以大鍼刺之久持之䖝不動乃出鍼心痛引腰脊欲嘔刺足少隂心痛腹脹濇濇然大便不利取足太隂心痛引背不得息刺足少隂不已取手少隂心痛引少腹滿上下無常處溲便難刺足厥隂心痛但短氣不足以息刺手太隂心腹中卒痛而汗出石門主之心痛有三䖝多㵪不得反側上脘主之心痛有寒難以俛仰心疝氣衝胃死不知人中脘主之心痛上搶心不欲食支痛引鬲建里主之胷脇背相引痛心下溷溷嘔吐多唾飲食不下幽門主之脾逆氣寒厥急煩心善唾噦噫胷滿激呼胃氣上逆心痛太淵主之千金作肺脹胃逆心膨膨痛千金云煩悶亂少氣不足以息尺澤主之心痛俠白主之卒心中痛瘈瘲互相引肘内廉痛心敖敖然間使主之心痛衂噦嘔血驚恐畏人神氣不足㕁門主之心痛卒欬逆尺澤主之出血則已卒心痛汗出大敦主之出血立已胷痺引背時寒間使主之胷痺心痛肩肉麻木天井主之胷痺心痛不得息痛無常處臨泣主之千金云不得反側心疝暴痛取足太隂厥隂盡刺之血絡喉痺舌卷口乾煩心心痛臂表痛靈樞及太素俱作背内亷痛不可及頭取闗衝在手小指次指爪甲去端如韭葉許一云左取右右取左邪在肺五藏六府受病發欬逆上氣第三邪在肺則病皮膚痛發寒熱上氣喘汗出欬動肩背取之膺中外俞背三椎之傍以手疾按之快然乃刺之取缺盆中以越之黃帝問曰肺之令人欬何也岐伯對曰五藏六府皆令人欬非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合其寒飲食入胃從肺脉上至於肺氣則肺寒肺寒則内外合邪因而客之則為肺欬五藏各以其時受病非其時各𫝊以與之人與天地參故五藏各以治時感於寒則受病也微則為欬甚則為泄為痛乗秋則肺先受邪乗春則肝先受之乗夏則心先受之乗至隂則脾先受之乗冬則腎先受之肺欬之狀欬而喘息有音甚則唾血心欬之狀欬則心痛喉中喝喝素問則吤吤如梗狀甚則咽腫喉痺肝欬之狀欬則胠素問作兩脇下痛甚不可以轉轉作兩脇素問作胠下滿脾欬之狀欬則右胠素問作脇下痛隂隂引肩背甚則欬涎不可以動動則欬劇腎欬之狀欬則腰背相引而痛甚則欬涎五藏久欬乃移於六府脾欬不已則胃受之胃欬之狀欬而嘔嘔甚則長䖝出肝欬不已則膽受之膽欬之狀欬嘔膽汁肺欬不已則大腸受之大腸欬之狀欬而遺矢心欬不已則小腸受之小腸欬之狀欬而失氣氣與欬俱失腎欬不已則膀胱受之膀胱欬之狀欬而遺尿素問作溺久欬不已則三焦受之三焦欬之狀欬而腹滿不欲飲食此皆聚於胃闗於肺使人多涕唾而面浮腫氣逆治藏者治其俞治府者治其合浮腫者治其經秋傷於濕冬生欬咳曰九卷言振埃刺外經而去陽病願卒聞之曰陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏病咽噎不得息取之天容其欬上氣窮詘胷痛者取之亷泉取之天容者深無一里里字疑誤取亷泉者血變乃止欬逆上氣魄戸及氣舍主之欬逆上氣噫嘻主之欬逆上氣咽喉鳴喝喘息扶突主之欬逆上氣唾沫天容及行間主之欬逆上氣咽喉癰腫呼吸短氣喘息不通水突主之一本作天突欬逆上氣喘不能言華葢主之欬逆上氣唾喘短氣不得息口不能言亶中主之欬逆上氣喘不得息嘔吐胷滿不得飲食俞府主之欬逆上氣㵪出多唾呼吸哮坐卧不安彧中主之胷滿欬逆喘不得嘔吐煩滿不得飲食神藏主之胷脇榰滿欬逆上氣呼吸多唾濁沫膿血庫房主之咳喘不得坐不得卧呼吸氣素咽不得胷中熱雲門主之胷脇榰滿不得俛仰㿉癰欬逆上氣咽喉喝有聲太谿主之欬逆不止三焦有水氣不能食維道主之欬逆煩悶不得卧胷中滿喘不能息背痛太淵主之欬逆上氣舌乾脇痛心煩肩寒少氣不足以息腹脹喘尺澤主之欬乾嘔滿俠白主之欬上氣喘不得息暴痺内逆肝肺相𫝊鼻口出血身脹逆息不得卧天府主之凄凄寒𠻳吐血逆氣驚心痛手隂郄主之欬而胷滿前谷主之欬面赤熱支溝主之欬喉中鳴欬唾血大鍾主之肝受病及衛氣留積發胷脇滿痛第四邪在肝則病兩脇中痛寒中惡血在内胻節時腫善瘈取行間以引脇下補三里以温胃中取血脉以散惡血取耳間青脉以去其瘈黃帝問曰衛氣留於脉太素作腹中槒積不行苑藴不得常所靈樞下有使人二字榰脇中滿喘呼逆息者何以去之岐伯對曰其氣積於胷中者上取之積於腹中者下取之上下皆滿者傍取之積於上者寫人迎天突喉中積於下者寫三里與氣衝上下皆滿者上下皆取之與季脇之下深一寸重者雞足取之診視其脉大而強急及絶不至者腹皮絞甚者不可刺也氣逆上刺膺中陷者與脇下動脉胷滿嘔無所出口苦舌乾飲食不下膽俞主之胷滿呼吸喝窮詘窘不得息刺入人迎入四分不幸殺人胷滿痛璇璣主之胷脇榰滿痛引胷中華葢主之胷脇榰滿痺痛骨疼飲食不下嘔千金作咳逆氣上煩心紫宫主之胷中滿不得息脇痛骨疼喘逆上氣嘔吐煩心玉堂主之胷脇榰滿鬲塞飲食不下嘔吐食復出中庭主之胷中榰滿痛引膺不得息悶亂煩滿不得飲食靈墟主之胷脇榰滿不得息欬逆乳癰洒浙惡寒神封主之胷脇榰滿鬲逆不通呼吸少氣喘息不得舉臂步郎主之胷脇榰滿喘滿上氣呼吸肩息不知食味氣戸主之喉痺胷中暴逆先取衝脉後取三里雲門皆寫之胷脇榰滿却引背痛卧不得轉側胷鄉主之傷憂悁思氣積中脘主之胷滿馬刀臂不得舉淵腋主之大氣不得息息即胷脇中痛實則其身盡寒虚則百節盡縱大包主之胷中暴滿不得眠一云不得喘息輒筋主之胷脇榰滿瘈瘲引臍腹痛短氣煩滿巨闕主之腹中積氣結痛梁門主之傷食脇下滿不能轉展反側目青而嘔期門主之胷脇榰滿勞宫主之多卧善唾胷滿腸鳴三間主之胷滿不得息頭頷腫陽谷主之胷脇脹腸鳴切痛一云胷脅支滿腹中切痛太白主之暴脹胷脇榰滿足寒大便難面唇白時嘔血太衝主之胷脇榰滿惡聞人聲與木音巨虚上亷主之胷脇榰滿寒如風吹狀俠谿主之胷滿善太息胷中膨膨然千金作胷膂急丘墟主之胷脇榰滿頭痛項内寒外丘主之脇下榰滿嘔吐逆陽陵泉主之邪在心膽及諸藏府發悲恐太息口苦不樂及驚第五黄帝問曰有口苦取陽陵泉口苦者病名為何何以得之岐伯對曰病名曰膽痺夫膽者中精之府素問無此句肝者中之將也取决於膽咽為之使此人者數謀慮不决膽氣上溢素問下有虚字而口為之苦治之以膽募俞在隂陽十二官相使中善怒而欲食言益少刺足太隂怒而多言刺足少隂太素作少陽短氣心痺悲怒逆氣怒狂易魚際主之心痛善悲厥逆懸心如飢之狀心譫譫而驚大陵及間使主之心澹澹而善驚恐心悲内關主之千金作曲澤善驚悲不樂厥脛足下熱面盡熱渇行間主之脾虚令人病寒不樂好太息商丘主之色蒼蒼然太息如將死狀振寒溲白便難中封主之心如懸哀而亂善恐嗌内腫心惕惕恐如人將捕之多㵪出喘少氣吸吸不足以息然谷主之驚善悲不樂如墮墜汗不出面塵黒病飲不欲食照海主之膽眩寒厥手臂痛善驚忘言面赤泣出腋門主之大驚乳痛梁丘主之邪在心則病心痛善悲時眩仆視有餘不足而調其俞膽病者善太息口苦嘔宿水靈樞作宿汁心下澹澹善恐如人將捕之嗌中吤吤然數欬唾候在足少陽之本末亦視其脉之陷下者灸之其寒熱者取陽陵泉邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦汁故曰嘔膽取三里以下胃逆則刺足少陽血絡以閉膽逆調其虚實以去其邪脾受病發四肢不用第六黃帝問曰脾病而四肢不用何也岐伯對曰四肢者皆禀氣於胃而不得至經必因脾乃得禀今脾病不能為胃行其津液四肢不得禀水穀氣氣日以衰脉道不通筋骨肌肉皆無氣以生故不用焉曰脾不主時何也曰脾者土也土者中央常以四時長四藏各十八日寄治不獨主時脾者土藏常著胃土之精也土者生萬物而法天地故上下至頭足不得主時曰脾與胃以募相連耳而能為之行津液何也曰足太隂者三隂也其脉貫胃属脾絡嗌故太隂為之行氣於三隂陽明者表也五藏六府之海也亦為之行氣於三陽藏府各因其經而受氣於陽明故為胃行津液四肢不得禀水穀氣氣日以衰隂道不利筋骨肌肉皆無氣以生故不用焉身重骨痠不相知太白主之脾胃大腸受病發腹脹滿腸中鳴短氣第七邪在脾胃則病肌肉痛陽氣有餘隂氣不足則熱中善饑陽氣不足隂氣有餘則寒中腸鳴腹痛隂陽俱有餘若俱不足則有寒有熱皆調其三里飲食不下鬲塞不通邪在胃脘在上脘則抑而下之在下脘則散而去之胃病者腹䐜脹胃脘當心而痛上榰兩脇鬲咽不通飲食不下取三里腹中雷一本作常鳴氣常衝胷喘不能久立邪在大腸也刺肓之原巨虚上亷三里腹中不便取三里盛則瀉之虚則補之大腸病者腸中切痛而鳴濯濯冬日重感於寒當臍而痛不能久立與胃同候取巨虚上亷腹滿大便不利腹大上走胷嗌靈摳下有喘息二字喝喝然取足少陽腹滿食不化嚮嚮然不得大便取足太陽腹痛刺臍左右動脉已刺按之立已不已刺氣衝按之立已腹暴痛滿按之不下取太陽經絡血者則已又刺少隂一本作少陽愈去脊椎三寸傍五用員利鍼刺已如食頃久立已必視其經之過於陽者數刺之腹滿不能食刺脊中腹中氣脹引脊痛食飲而身羸瘦名曰食㑊先取脾俞後取季脇大腸轉氣按之如覆杯熱引胃痛脾氣寒四肢不嗜食脾俞主之胃中寒脹食多身體羸瘦腹中滿而鳴腹䐜風厥胷脇榰滿嘔吐脊急痛筋攣食不下胃俞主之頭痛食不下腸鳴臚脹欲嘔時泄三焦俞主之腹滿臚脹大便泄意舍主之臚脹水腫食飲不下多寒千金作惡寒胃倉主之寒中傷飽食飲不化五藏䐜滿脹心腹胷脇榰滿脹則生百病上脘主之腹脹不通寒中傷飽食飲不化中脘主之食飲不化入腹還出下脘主之腸中常鳴時上衝心灸臍中心滿氣逆隂都主之大腸寒中千金作疝大便乾腹中切痛盲輸主之腹中盡痛外陵主之腸鳴相逐不可傾倒承滿主之腹脹善滿積氣闗門主之食飲不下腹中雷鳴大腸不節小便赤黃陽綱主之腹脹腸鳴氣上衝胷不能久立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫一本作重俠臍急天樞主之腹中有大熱不安腹有大氣如相俠暴腹脹滿癃淫濼氣衝主之腹滿痛不得息正卧屈一膝伸一股並刺氣衝鍼上入三寸氣至寫之寒氣腹滿癃淫濼身熱腹中積聚疼痛衝門主之腹中腸鳴盈盈然食不化脇痛不得卧煩熱中不嗜食胷脇榰滿喘息而衝鬲嘔心痛及傷飽身黄疾骨羸瘦章門主之腸鳴而痛温留主之腸腹時寒腰痛不得卧手三里主之腹中有寒氣隱白主之腹滿嚮嚮然不便心下有寒痛商丘主之腹中熱若寒腹善鳴强欠時内痛心悲氣逆腹滿漏谷主之已刺外踝上氣不止腹脹而氣快然引肘脇下皆主之腹中氣脹嗑嗑不嗜食脇下滿隂陵泉主之喘少氣不足以息腹滿大便難時上走胷中鳴脹滿口舌中吸吸善驚咽中痛不可内食善怒恐不樂太鍾主之嗌乾腹瘈痛坐卧目􅉩􅉩善怒多言復溜主之寒腹脹滿厲兑主之腹大不嗜食衝陽主之厥氣上榰太谿主之大腸有熱腸鳴腹滿俠臍痛食不化喘不能久立巨虚上亷主之腸中寒脹滿善噫聞食臭胃氣不足腸鳴腹痛泄食不化心下脹三里主之腹滿胃中有熱不嗜食懸鍾主之大腸實則腰背痛痺寒轉筋頭眩痛虚則鼻衂癲疾腰痛濈濈然汗出令人欲食而走承筋主之取脚下三折横視盛者出血腎小腸受病發腹脹腰痛引背少腹控睪第八邪在腎則病骨痛隂痺隂痺者按之而不得腹脹腰痛大便難肩背頸項强痛時眩取之湧泉崑崙視有血者盡取之少腹控睪引腰脊上衝心肺邪在小腸也小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃燻肝肺散於胷結於臍故取盲原以散之刺太隂以予之取厥隂以下之取巨虚下亷以去之按其所過之經以調之小腸病者少腹痛腰脊控睪而痛時窘之後耳前熱若寒甚若獨肩上熱甚及手小指次指間熱若脉陷者此其候也黃帝問曰有病厥者診右脉沉堅左手浮遲不知病生安在岐伯對曰冬診之右脉固當沉堅此應四時左脉浮遲此逆四時左當主病診左在腎頗在肺當腰痛曰何以言之曰少隂脉貫腎絡肺今得肺脉腎為之病故為腰痛足太陽脉令人腰痛引項脊尻背如腫狀刺其郄中太陽正經去血春無見血少陽令人腰痛如以鍼刺其皮中循循然不可俛仰不可以左右顧刺少陽盛骨之端出血盛骨在膝下亷之骨獨起者夏無見血陽明令人腰痛不可以顧顧如有見者善悲刺陽明於胻前三痏上下和之出血秋無見血足少隂令人腰痛痛引脊内亷刺足少隂於内踝上二痏春無見血若出血太多虚不可復厥隂之脉令人腰痛腰中如張弓弩弦刺厥隂之脉在腨踵魚腹之外循循累累然乃刺之其病令人善言黙黙然不慧刺之三痏解脉令人腰痛痛引肩目􅉩􅉩然時遺溲刺解脉在膝筋分肉間在㕁外亷之橫脉出血血變而止同隂之脉令人腰痛腰如小錘居其中怫然腫刺同陰之脉在外踝上絶骨之端為三痏解脉令人腰痛如裂素問作引𢃄常如折腰之狀善怒刺解脉在㕁中結絡如黍米刺之血射以黒見赤血乃已全元起云有兩解脉病原各異疑誤未詳陽維之脉令人腰痛痛上怫然腫刺陽維之脉脉與太陽合腨下間去地一尺所衝絡之脉令人腰痛得俛不得仰仰則恐仆相之舉重傷腰衡絡絶傷惡血歸之刺之在㕁陽之筋間上㕁數寸衝居為二痏出血㑹隂之脉令人腰痛痛上濈然汗出汗乾令人欲飲飲已欲走刺直陽之脉上三痏在蹻上㕁下三所横居視其盛者出血素問濈濈然作漯漯然三所作五寸飛陽之脉令人腰痛痛上怫然甚則悲以恐刺飛揚之脉在内踝上二寸素問作五寸少陰之前與隂維之㑹昌陽之脉令人腰痛痛引膺目􅉩􅉩然甚則反折口卷不能言刺内筋為二痏在内踝上大筋後上踝一寸所素問大筋作太隂散脉令人腰痛而熱熱甚而煩腰下如有横木居其中甚則遺溲刺散脉在膝前骨肉分間絡外亷束脉為三痏肉里之脉令人腰痛不可以欬欬則筋攣刺肉里之脉為二宥在太陽之外少陽絶骨之端腰痛俠脊而痛至頭几几然目􅉩􅉩欲僵仆刺足太陽㕁中出血腰痛引少腹控䏚不可以仰刺尻交者兩踝胂上以月死生為宥數發鍼立已素問云左取右右取左腰痛上寒取足太陽陽明痛上熱取足厥隂不可以俛仰取足少陽中熱而喘取足少隂㕁中血絡腰痛上寒實則脊急强長强主之小腹痛控睪引腰脊疝痛上衝心腰脊强溺黃赤口乾小腸俞主之腰脊痛强引背少腹俛仰難不得仰息脚痿重尻不舉溺赤腰以下至足清不仁不可以坐起膀胱俞主之腰痛不可以俛仰中膂内俞主之腰足痛而清善偃睪跳拳上窌主之腰痛怏怏不可以俛仰腰以下至足不仁入脊腰背寒次窌主之先取缺盆後取尾骶與八窌腰痛大便難飱泄腰尻中寒中窌主之腰痛脊急脇中滿小腹堅急志室主之腰脊痛惡風少腹滿堅癃閉下重不得小便胞肓主之腰痛骶寒俛仰急難隂痛下重不得小便秩邊主之腰痛控睾小便及股卒俛不得仰刺氣衝腰痛不得轉側章門主之腰痛不可以久立俛仰京門及行間主之腰痛少腹痛下窌主之腎腰痛不可俛仰隂陵泉主之腰痛少腹滿小便不利如癃狀羸瘦意恐懼氣不足腰中怏怏太衝主之腰痛少腹痛隂包主之腰痛大便難湧泉主之腰脊相引如解實則閉癃凄凄腰脊痛宛轉目循循嗜卧口中熱虚則腰痛寒厥煩心悶大鍾主之腰痛引脊内亷復溜主之春無見血若太多虚不可復是前足少隂痛也腰痛不能舉足少坐若下車躓地脛中矯矯然申脉主之腰痛如小錘居其中怫然腫痛不可以欬欬則筋縮急諸節痛上下無常寒熱陽輔主之腰痛不可舉足跟中踝後痛脚痿僕參主之腰痛俠脊至頭几几然目􅉩􅉩委中主之是前刺足太陽郄中出血者腰痛得俛不得仰仰則恐仆得之舉重惡血歸之殷門主之是前衝絡之脉腰痛者腰脊痛尻脊股臋隂寒大痛虚則血動實則并熱痛痔痛尻脽中腫大便直出扶承主之三焦膀胱受病發少腹腫不得小便第九小腹腫痛不得小便邪在三焦約取之足太陽大絡視其結絡脉與厥隂小結絡而血者腫上及胃脘取三里三焦病者腹脹氣滿少腹尤甚堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡絡在太陽少陽之間亦見於脉取委中膀胱病在少腹偏腫而痛以手按之則欲小便而不得眉一本作肩上熱若脉陷及足小指外側及脛踝後皆熱者取委中病在少腹痛不得大小便病名曰疝得寒則少腹脹兩股間冷刺腰髁間刺而多之盡炅病已少腹滿大上走胷至心索索然身時寒熱小便不利取足厥隂胞轉不得溺少腹滿闗元主之小便難水脹滿出少胞轉不得溺曲骨主之少腹脹急小便不利厥氣上頭巔漏谷主之溺難痛白濁卒疝少腹腫欬逆嘔吐卒隂跳腰痛不可以俛仰面黒熱腹中䐜滿身熱厥痛行間主之少腹中滿熱閉不得溺足五里主之少腹中滿一本作痛小便不利湧泉主之筋急身熱少腹堅腫時滿小便難尻股寒髀樞痛引季脇内控八窌委中主之隂胞有寒小便不利扶承主之三焦約内閉發不得大小便第十内閉不得溲刺足少隂太陽與骶上以長鍼氣迎取其太隂陽明厥甚取太隂陽明動者之經三焦約大小便不通水道主之大便難中渚及太白主之大便難大鍾主之足厥隂脉動喜怒不時發㿗疝遺溺癃第十一黄帝問曰刺節言去衣者刺闗節之支絡者願聞其詳岐伯對曰腰脊者人之闗節股胻者人之趨翔莖睾者身中之機隂津之候津液之道路也故飲食不節喜怒不時津液内流而下溢於睾水道不通炅不休息俛仰不便趨翔不能滎然有水不上不下䤵石所取形不可匿裳不可蔽名曰去衣曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也素問下有陽氣大盛於外一句隂氣不足則太隂脉細如髪者此不足者也其病安在曰病在太隂其盛在胃頗在肺病名曰厥死不治此得五有餘二不足曰何謂五有餘二不足曰所謂五有餘者病之氣有餘也二不足者亦病氣之不足也今外得五有餘内得二不足此其不表不裏亦死証明矣狐疝驚悸少氣巨缺主之隂疝引睾隂交主之少腹痛溺難隂下縱横骨主之少腹疝卧善驚氣海主之暴疝少腹大熱闗元主之隂疝氣疝天樞主之㿗疝大巨及地機中郄主之隂疝痿莖中痛兩丸騫卧不可仰卧刺氣衝主之隂疝衝門主之男子隂疝兩丸上下小腹痛五樞主之隂股内痛氣癰狐疝走上下引少腹痛不可俛仰上下商丘主之狐疝太衝主之隂跳遺溺小便難而痛隂上下入腹中寒疝隂挺出偏大腫腹臍痛腹中悒悒不樂大敦主之腹痛上槍心心下滿癃莖中痛怒䐜不欲視泣出長太息行間主之㿗疝隂暴痛中封主之千金云㿗疝隂暴痛痿厥身體不仁疝癃臍少腹引痛腰中痛中封主之氣痛癃小便黄氣滿塞虚則遺溺身時寒熱吐逆溺難腹滿石門主之氣癃㿗疝隂急股樞腨内亷痛交信主之隂跳腰痛實則挺長寒熱攣隂暴痛遺溺偏大虚則暴癢氣逆腫睾卒疝小便不利如癃狀數噫恐悸氣不足腹中悒悒少腹痛嗌中有熱如有瘜肉狀如著欲出背攣不可俛仰蠡溝主之丈夫㿗疝隂跳痛引簒中不得溺腹中支脇下榰滿閉癃隂痿後時泄四肢不收實則身疼痛汗不出目􅉩􅉩然無所見怒欲殺人暴痛引髕下節時有熱氣筋攣膝痛不可屈伸狂如新發衂不食喘呼少腹痛引噫足厥痛湧泉主之癃疝然谷主之卒疝少腹痛照海主之病在左取右右取左立已疝四肢淫濼身悶至隂主之遺溺闗門及神門委中主之胷滿膨膨然實則癃閉腋下腫虚則遺溺脚急兢兢然筋急痛不得大小便腰痛引腹不得俛仰委陽主之癃中窌主之氣癃溺黄闗元及隂陵泉主之千金云寒熱不節腎病不可以俛仰氣癃小便黄氣滿虚則遺溺石門主之癃遺溺鼠鼷痛小便難而白期門主之小便難竅中熱實則腹皮痛虚則癢搔㑹隂主之小腸有熱溺赤黄中脘主之溺黄下亷主之小便黃赤完骨主之小便黃腸鳴相逐上亷主之勞癉小便赤難前谷主之足太陽脉動發下部痔脱肛第十二痔痛攅竹主之痔㑹隂主之凡痔與隂相通者死隂中諸病前後相引痛不得大小便皆主之痔骨蝕商丘主之痔簒痛飛揚委中及扶承主之痔簒痛承筋主之脱肛下刺氣衝主之鍼灸甲乙經卷九
