body:
  text: 鍼灸甲乙經卷八晉皇甫謐撰五藏傳病發寒熱第一上黄帝問曰五藏相通移皆有次五藏有病則各𫝊其所勝不治法三月若六月若三日若六日𫝊五藏而當死素問下有順傳所勝之次故曰别於陽者知病從来别於隂者知死生之期言至其所困而死者也是故風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發或痺不仁腫痛當是之時可湯熨及一本作足字火灸刺而去弗治病入舍於肺名曰肺痺發欬上氣弗治肺即𫝊而行之肝病名曰肝痺一名曰厥脇痛出食當是之時可按可刺弗治肝𫝊之脾病名曰脾風發癉腹中熱煩心汗出黄癉素問無汗癉二字當此之時可汗可藥可烙一本作浴弗治脾𫝊之腎病名曰疝瘕少腹煩寃而痛汗出素問作出白一名曰蠱當此之時可按可藥弗治腎𫝊之心病筋脈相引而急名之曰瘈當此之時可灸可藥弗治十日法當死腎𫝊之心心即復反𫝊而之肺發寒熱法當三嵗死此病之次也然其卒發者不必治其𫝊化有不以次者憂恐悲喜怒令不得以其次故令人大病矣因而喜大虚則腎氣乗矣怒則肝氣乗矣悲則肺氣乗矣恐則脾氣乗矣憂則心氣乗矣此其道也故病有五五五二十五變及其𫝊化𫝊乗之名也大骨枯藁大肉陷下胷中氣滿喘息不便其氣動形期六月死真藏脈見乃予之期日大骨枯藁大肉陷下胷中氣滿喘息不便内痛引肩項期一月死真藏脈見乃予之期日大骨枯藁大肉陷下胷中氣滿喘息不便内痛引肩項痛熱脱肉破㬷真藏脈見十月之内死大骨枯藁大肉陷下胷中氣滿腹内痛心中不便肩項身熱㬷破脱肉目眶陷真藏脈見目不見人立死其見人者至其所不勝之時而死急虚中身卒至五藏閉絶脈道不通氣不往来譬之墮溺不可為期其脈絶不来若一息五六至其形肉不脱真藏雖不見猶死真肝脈至中外急如循刀刅責責然如按琴瑟絃色青白不澤毛折乃死真心脈至𦂳一本作堅而摶如循薏苡子累累然色赤黑不澤毛折乃死真肺脈至大而虚如以毛羽中人膚色赤白不澤毛折乃死真脾脈至弱而乍疎乍數色青黄不澤毛折乃死真腎脈至摶而絶如指彈石辟辟然色黒黄不澤毛折乃死諸真藏脈見者皆死不治曰寒熱瘰癧在於頸腋者何氣所生曰此皆䑕瘻寒熱之毒氣稽於脈而不去者也靈樞稽作隄字䑕瘻之本皆在於藏其末上出頸腋之間其浮於胸中采著於肌肉而外為膿血者易去也曰去之奈何曰請從其本引其末可使衰去而絶其寒熱審按其道以予之徐往徐来以去之其小如麥者一刺知三刺已决其死生反其目視之其中有赤脈從上卞貫瞳子者見一脈一嵗死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗死赤脈不下貫瞳子者可治曰人有善病寒熱者何以候之曰小骨弱肉者善病寒熱顴骨者骨之本也顴大則骨大顴小則骨小皮薄而肉弱無膕其臂懦懦然其地色炲然不與天地同色汚然獨異此其候也然臂薄者其髓不滿故善病寒熱風感則為寒熱皮寒熱皮不可附席毛髪焦鼻藳腊不得汗取三陽之絡補手太陽肌寒熱病肌痛毛髪焦唇槁腊不得汗取三陽於下以去其血者補太隂以去其汗骨寒骨熱痛無所安汗注不休齒本藁痛取其少隂於隂股之絡齒色藁死不治骨厥亦然男子如蠱女子如阻身體腰脊如解不欲食先取湧泉見血視跗上盛者盡出血灸寒熱之法先取項大椎以年為壮數次灸撅骨以年為壮數視背俞陷者灸之舉臂肩上陷者灸之兩季脇之間灸之外踝上絶骨之端灸之足小指次指之間灸之腨上陷脈灸之外踝後灸之缺盆骨上切之堅動如筋者灸之膺中陷骨間灸之掌束骨下灸之臍下闗元三寸灸之毛際動脈灸之臍下二寸分間灸之足陽明跗上動脈灸之巔上一灸之取犬所嚙處灸之即以犬傷病法三炷灸之凡當灸二十九處寒熱頭痛喘喝目不能視神庭主之其目泣出頭不痛者聽㑹主之寒熱頭痛如破目痛如脱喘逆煩滿嘔吐流汗難言頭維主之寒熱刺腦户五藏傳病發寒熱第一下寒熱取五處及天池風池腰俞長强大杼中膂内俞上􅐎齗交上闗闗元天牖天容合谷陽谿闗衝中渚陽池消濼少澤前谷腕骨陽谷少海然谷至隂崑崙主之寒熱骨痛玉枕主之寒熱懈爤一本作懶淫濼脛痠四肢重痛少氣難言至陽主之肺寒熱呼吸不得卧上氣嘔沫喘氣相追逐胷滿脇膺急息難振慄脈鼓氣膈胷中有熱支滿不嗜食汗不出腰脊痛肺俞主之寒熱心痛循循然與背相引而痛胷中悒悒不得息咳唾血多涎煩中善饐食不下欬逆汗不出如瘧状目􅉩􅉩淚出悲傷心俞主之欬而嘔鬲寒食不下寒熱皮肉膚痛少氣不得卧胷滿支兩脇鬲上兢兢脇痛腹䐜胷脘暴痛上氣肩背寒痛汗不出喉痺腹中痛積聚黙然嗜卧怠惰不欲動身常濕濕心痛無可摇者脾俞主之欬而脇滿急不得息不得反側腋脇下與臍相引筋急而痛反折目上視眩目中循循然肩項痛驚狂䘐少腹滿目􅉩􅉩生白翳欬引胷痛筋寒熱唾血短氣鼻酸肝俞主之寒熱食多身羸瘦兩脇引痛心下賁痛心如懸下引臍少腹急痛熱面急一本作黑目􅉩􅉩久喘欬少氣溺濁赤腎俞主之骨寒熱溲難腎俞主之寒熱頭痛水溝主之寒熱頸瘰癧大迎主之肩痛引項寒熱缺盆主之身熱汗不出胸中熱滿天窌主之寒熱肩腫引胛中痛肩臂酸臑俞主之寒熱項癧適耳無聞引缺盆肩中熱痛麻痺不舉一本作手臂不舉肩貞主之寒熱癧目不明欬上氣唾血肩中俞主之寒熱癧適胸中滿有大氣缺盆中滿痛者死外潰不死肩引項不舉缺盆中痛汗不出喉痺欬嗽血缺盆主之欬上氣喘暴瘖不能言及舌下挾縫青脈頸有大氣喉痺咽中乾急不得息喉中鳴翕翕寒熱項腫肩痛胷滿腹皮熱䘐氣短哽心痛隠疹頭痛面皮赤熱身肉盡不仁天突主之肺系急胸中痛惡寒胸滿悒悒然善嘔膽胷中熱喘逆氣氣相追逐多濁唾不得息肩背風汗出面腹腫鬲中食饐不下食喉痺肩息肺脹皮膚骨痛寒熱煩滿中府主之寒熱胸滿頭痛四肢不舉掖下腫上氣胷中有聲喉中鳴天池主之欬脇下積聚喘逆卧不安席時寒熱期門主之寒熱腹脹䐜怏怏然不得息京門主之寒濯濯舌煩手臂不仁唾沬唇乾引飲手腕攣指肢痛肺脹上氣耳中生風欬喘逆痺臂痛嘔吐飲食不下膨膨然少商主之唾血時寒時熱寫魚際補尺澤臂厥肩膺胷滿痛目中白翳眼青轉筋掌中熱乍寒乍熱缺盆中相引痛數欬喘不得息臂内亷痛上鬲飲已煩滿太淵主之寒熱胷背急喉痺欬上氣喘掌中熱數欠伸汗出善忘四逆厥善笑溺白列缺主之胷中彭彭然甚則交兩手而瞀暴痺喘逆刺經渠及天府此謂之大俞寒熱欬嘔沬掌中熱虚則肩背寒慄少氣不足以息寒厥交兩手而瞀口沫出實則肩背熱痛汗出四肢暴腫身濕一本作温摇時寒熱饑則煩飽則善面色變口噤不開惡風泣出列缺主之煩心欬寒熱善噦勞宫主之寒熱唇口乾喘息目急痛善驚三間主之胷中滿耳前痛齒痛目赤痛頸腫寒熱渇飲輒汗出不飲則皮乾熱曲池主之寒熱頸癧適欬呼吸難灸五里左取右右取左寒熱頸癧適肩臂不可舉臂臑俞主之風寒熱腋門主之寒熱頸頷腫後谿主之寒熱善嘔商丘主之嘔厥寒時有微熱脇下支滿喉痛嗌乾膝外亷痛淫濼脛痠腋下腫馬刀瘻肩腫吻傷痛太衝主之心如懸千金作心痛隂厥脚腨後亷急不可前却血癰腸澼便膿血足跗上痛舌卷不能言善笑足痿不収履溺青赤白黄黒青取井赤取滎黄取輸白取經黒取合血痔泄千金下有利字後重腹痛如癃状狂仆必有所扶持及大氣涎出鼻孔中痛腹中常鳴骨寒熱無所安汗出不休復溜主之男子如蠱女子如阻寒熱少腹偏腫隂谷主之少腹痛泄出糜次指間熱若脈陷寒熱身痛唇渇不乾汗出毛髪焦脱肉少氣内有熱不欲動摇泄膿血腰引少腹痛暴驚狂言非常巨虚下亷主之胷中滿腋下腫馬刀瘻善自齧舌頬天牖中腫淫濼脛痠頭眩枕骨頷腮腫目澁身痺洒浙振寒季脇支滿寒熱脇腰腹膝外亷痛臨泣主之寒熱頸腫丘墟主之寒熱頸腋下腫申脈主之寒熱酸㾓四肢不舉腋下腫馬刀瘻喉痺髀膝脛骨摇酸痺不仁陽輔主之寒熱痺頸不収陽交主之寒熱腰痛如折束骨主之寒熱目􅉩􅉩善欬喘逆通谷主之寒熱善唏頭重足寒不欲食脚攣京骨主之寒熱簒反出承山主之寒熱簒後出瘈瘲脚腨痠重戰慄不能久立脚急腫跗痛筋足攣少腹引喉嗌大便難承筋主之跟厥膝急腰脊痛引腹簒隂股熱隂暴痛寒熱膝痠重合陽主之經絡受病入腸胃五藏積發伏梁息賁肥氣痞氣奔肫第二黄帝問曰百病始生三部之氣所傷各異願聞其㑹岐伯對曰喜怒不節則傷於藏藏傷則病起於隂清濕襲虚則病起於下風雨襲虚則病起於上是謂三部至其淫佚不可勝數風雨寒熱不得虚邪不能獨傷人卒然逢疾風暴雨而不病者葢無虚邪不能獨傷此必因虚邪之風與其身形兩虚相搏乃客其形兩實相逢中人肉間其中於虚邪也因其天時與其躬身參以虚實大病乃成氣有定舍因處為名上下内外分為三真是故虚邪之中人也始於皮膚皮膚緩則腠理開腠理開則邪從毛髮入毛髪入則稍深稍深則毛髪立洒然皮膚痛留而不去則𫝊舍於絡在絡之時通於肌肉其病時痛時息大經乃代留而不去𫝊舍於經在經之時洒浙善驚留而不去𫝊舍於俞在俞之時六經不通四節即痛腰脊乃强留而不去伏舍於伏衝之脈在伏衝之脈時身體重痛留而不去𫝊舍於腸胃在腸胃之時賁嚮腹脹多寒則腸鳴飱泄不化多熱則溏出糜留而不去𫝊舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫絡或著脈絡或著經脈或著俞脈或著於伏衝之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫佚不可勝論其著孫絡之脈而成積往来上下擘音拍破盡也乎素作手孫絡之居也浮而緩不能拘積而止之故往来移行腸胃之外湊滲注灌濯濯有音有寒則腹䐜滿雷引故時切痛其著於陽明之經則侠臍而居飽則益大饑則益小其著於緩筋也似陽明之積飽則痛饑則安其著於腸胃之募原也痛而外連於緩筋也飽則安饑則痛其著於伏衝之脈者揣之應手而動發手則熱氣下於兩股如湯沃之状其著於膂筋在腸後者饑則積見飽則積不見按之弗得其著於俞脈者閉塞不通津液不下而空竅乾此邪氣之從入内從上下者也曰積之始生至其已成奈何曰積之始也得寒乃生厥止乃成積曰其成奈何曰厥氣生足溢靈樞作足俛足溢生脛寒脛寒則脈血凝泣寒熱上下入於腸胃入於腸胃則䐜脹外之汁沫迫聚不得散日以成積卒然盛食多飲則脈滿起居不節用力過度則絡脈傷陽絡傷則血外溢溢則䘐血隂絡傷則血内溢溢則便血腸外之絡傷則血溢於腸外有寒汁沫與血相摶則并合凝聚不得散而成積矣卒然中於寒若内傷於憂恐則氣上逆氣上逆則穴俞不通温氣不行凝血緼裹而不散津液凝濇著而不去而積皆成矣曰其生於隂者奈何曰憂思傷心重寒傷肺忿怒傷肝醉飽入房汗出當風則傷脾用力過度入房汗出浴水則傷腎此内外三部之所生病也察其所痛以知其應有餘不足當補則補當寫則寫無逆天時是謂至治曰人之善病腸中積者何以候之曰皮薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃作腸胃之積寒温不次邪氣乃一本作稍止其畜積止大聚乃起曰病有身體腰股胻背皆腫環臍而痛是謂何病曰名曰伏梁此風根也不可動動之為水溺濇之病病有少腹盛左右上下皆有根者名曰伏梁也裹大膿血居腸胃之外不可治之每切按之致死此下則因隂必下膿血上則迫胃脘生鬲俠一本作依胃脘内癰此久病也難治居臍上為逆居臍下為順勿動亟奪其氣溢素問作泄於大腸而著於盲盲之原在臍下故環臍而痛也難經曰心之積名曰伏梁起於臍上上至心下大如臂久久不愈病煩心心痛以秋庚辛日得之腎病𫝊心心當𫝊肺肺以秋王不受邪因留結為積難經曰肺之積名曰息賁左右脇下覆大如杯久久不愈病洒洒惡寒氣逆喘欬發肺癰以春甲乙日得之心病𫝊肺肺當𫝊肝肝以春王不受邪因留結為積曰病脇下滿氣逆行三二嵗不已是為何病曰病名息賁此不妨於食不可灸刺積為導引服藥藥不能獨治也難經曰肝之積名曰肥氣在左脇下如覆杯有頭足如龜鼈状久久不愈發欬逆㾬瘧連嵗月不已以季夏戊已日得之肺病傳肝肝當𫝊脾脾以季夏王不受邪因留結為積此與息賁略同難經曰脾之積名曰痞氣在胃脘覆大如盤久久不愈病四肢不収發黄疸飲食不為肌膚以冬壬癸日得之肝病𫝊脾脾當𫝊腎腎以冬王不受邪因留結為積難經曰腎之積名曰賁肫發於腹上至心下若豚状或上或下無時久不已令人喘逆骨痿少氣以夏丙丁日得之脾病𫝊腎腎當𫝊心心以夏旺不受邪因留結為積也息賁時唾血巨闕主之腹中積上下行懸樞主之疝積胷中痛不得窮屈天容主之暴心腹痛疝横發上衝心雲門主之心下大堅盲俞期門及中脘主之臍下疝繞臍痛衝胷不得息中極主之賁肫上腹䐜堅痛引隂中不得小便兩丸騫隂交主之臍下疝繞臍痛石門主之奔肫氣上腹䐜痛强不能言莖腫先引腰後引小腹腰臗堅痛下引隂中不得小便兩丸騫石門主之奔肫寒氣入小腹時欲嘔傷中溺血小便數背臍痛引隂腹中窘急欲湊後泄不止闗元主之奔肫上搶心甚則不得息忽忽少氣尸厥心煩痛饑不能食善寒中腹脹引䐈而痛小腹與脊相控暴痛時窘之後中極主之腹中積聚時切痛商曲主之臍下積疝瘕胞中有血四滿主之臍疝繞臍而痛時上衝心天樞主之氣疝噦嘔面腫奔肫天樞主之奔肫卵上入痛引莖歸来主之奔肫上下期門主之疝瘕髀中急痛循脇上下搶心腹痛積聚府舍主之奔肫腹脹腫章門主之少腹積聚勞宫主之環臍痛隂騫兩丸縮堅痛不得卧太衝主之寒疝下至腹腠膝腰痛如清水大腹一作小腹諸疝按之至膝上伏莵主之寒疝痛腹脹滿痿厥少氣隂市主之大疝腹堅丘墟主之五藏六府脹第三黄帝問曰脈之應於寸口如何而脹岐伯對曰其至大堅直以濇者脹也曰何以知其藏府之脹也曰隂為藏而陽為府也曰夫氣之令人脹也在於血脈之中耶抑藏府之内乎曰二者皆在焉然非脹之舍也曰願聞脹舍曰夫脹者皆在於府藏之外排藏府而廓胷脇脹皮膚故命曰脹曰藏府之在内也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故曰夫胷腹者藏府之城廓膻中者心主之中宫也胃者太倉也咽喉少腹者傳道也胃之五竅者閭里之門户也亷泉玉英者津液之道路也故五藏六府各有畔界其病各有形状營氣循脈衛氣逆為脈脹衛氣並血脈循分肉為膚脹靈樞作營氣循脈為脈脹衛氣並脈循分肉為膚脹取三里寫之近者一下一本作分下同逺者三下無問虚實工在疾寫也曰願聞脹形曰心脹者煩心短氣卧不得安肺脹者虚滿而喘欬肝脹者脇下滿而痛引少腹脾脹者苦噦四肢悶體重不能衣腎脹者腹滿引背怏怏然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則泄飱不化小腸脹者小腹脹䐜引腰而痛膀胱脹者小腹滿而氣癃三焦脹者氣滿於皮膚中殻殻然而不堅膽脹者脇下痛脹口苦好太息凡此諸脹其道在一明知逆順鍼數不失寫虚補實神去其室致邪失正真不可定粗工所敗謂之天命補虚寫實神歸其室久塞其空謂之良工曰脹者焉生何因而有名曰衛氣之在身也常並脈循分肉行有逆順隂陽相随乃得天和五藏皆治四時皆叙五榖乃化然而厥氣在下營衛留止寒氣逆上真邪相攻兩氣相薄乃舍為脹曰何以解惑曰合之於真三合而得曰無問虚實工在疾寫近者一下逺者三下今有三而不下其過焉在曰此言陷於肉盲而中氣穴者也不中氣穴則氣内閉藏不陷盲則氣不行上越中肉則衛氣相亂隂陽相逆其於脹也當寫而不寫故氣不下必更其道氣下乃止不下復起可以萬全惡有殆者乎其於脹也必審其診當寫則寫當補則補如鼔之應桴惡有不下者乎心脹者心俞主之亦取列缺肺脹者肺俞主之亦取太淵肝脹者肝俞主之亦取太衝脾脹者脾俞主之亦取太白腎脹者腎俞主之亦取太谿胃脹者中脘主之亦取章門大腸脹者天樞主之小腸脹者中􅐎主之膀胱脹者曲骨主之三焦脹者石門主之膽脹者陽陵泉主之五藏六府之脹皆取三里三里者脹之要穴也水膚脹鼔脹腸覃石瘕第四黄帝問曰水與膚脹鼔脹腸覃石瘕何以别之岐伯對曰水之始起也目窠上微腫如新卧起之状頸脈動時欬隂股間寒足脛腫腹乃大其水已成也以手按其腹隨手而起如裹水之状此其候也膚脹者寒氣客於皮膚之間殻殻然不堅腹大身盡腫皮膚厚按其腹腹陷而不起腹色不變此其候也鼔脹者腹身皆腫大如膚脹等其色蒼黄腹筋一本作脈起此其候也腸覃者寒氣客於腸外與衛氣相摶正氣不得營因有所繫瘕而内著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成也如懐子状久者離嵗月按之則堅推之則移月事時下此其候也石瘕者生於胞中寒氣客於子門子門閉塞氣不通惡血當寫不寫血衃乃留止日以益大状如懐子月事不以時下皆生於女子可導而下之曰膚脹鼔脹可刺耶曰先刺其腹之血絡後調其經亦刺去其血脈曰有病心腹滿旦食則不能暮食此為何病曰此名為鼔脹治之以雞矢醴一劑知二劑已曰其時有復發者何也曰此食飲不節故時有病也雖然其病且已因當風氣聚於腹也風水膚脹為五十九刺靈樞作五十七刺取皮膚之血者盡取之徒水先取環谷下三寸以排鍼刺之而藏之引而内之入而復出以盡具水必堅束之束緩則煩悶束急則安静間日一刺之水盡乃止飲則閉藥方刺之時􅑫飲之方飲無食方食無飲無食他食百三十五日水腫人中盡滿唇反者死水溝主之水腫大臍平灸臍中無理不治水腫水氣行皮中隂交主之水腫腹大水脹水氣行皮中石門主之石水痛引脇下脹頭眩痛身盡熱闗元主之振寒大腹石水四滿主之石水刺氣衝石水章門及然谷主之石水天泉主之腹中氣盛腹脹逆千金作水脹逆不得卧隂陵泉主之水中留飲胷脇支滿刺陷谷出血立已水腫脹皮腫三里主之胞中有大疝瘕積聚與隂相引而痛苦涌泄上下出補尺澤太谿手陽明寸口皆補之腎風發風水面胕腫第五黄帝問曰少隂何以主腎腎何以主水岐伯對曰腎者至隂也至隂者盛水也肺者太隂也少隂者冬脈也其本在腎其末在肺皆積水也曰腎何以聚水而生病曰腎者胃之闗也闗門不利故聚水而從其類上下溢於皮膚故為胕腫胕腫者聚水而生病也曰諸水皆主於腎乎曰腎者牝藏也地氣上者屬於腎而生水液故曰至隂勇而勞甚則腎汗出腎汗出逢於風内不得入於府藏外不得越於皮膚客於𤣥府行於皮裏𫝊為胕腫本之於腎名曰風水曰有病腎風者面胕痝然腫素問無腫字壅害於言可刺否曰虚不當刺不當刺而刺後五日其氣必至曰其至何如曰至必少氣時從胷背上至頭汗出手熱口乾苦渇小便黄目下腫腹中鳴身重難行月事不来煩而不能食食不能正偃正偃則欬甚病名曰風水曰願聞其説曰邪之所湊其氣必虚隂虚者陽必湊之故少氣時熱而汗出小便黄小便黄者少腹氣熱也不能正偃者胃中不和也正偃則欬甚上迫肺也諸有水氣者微腫見於目下曰何以言之曰水者隂也目下亦隂也腹者至隂之所居故水在腹者必使目下腫真氣上逆故口苦舌乾卧不得正偃則欬出清水也諸水病者皆不得卧卧則驚驚則欬甚也腹中鳴者脾本於胃也𫝊脾則煩不能食食不下者胃脘膈也身重難以行者胃脈在足也月事不来者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不来也曰有病痝然如水氣状切其脈太𦂳身無痛者形不瘦不能食食少名為何曰病主素問作生在腎名曰腎風腎風而不能食善驚不已素無不字心氣痿者死風水膝腫巨虚上亷主之面胕腫上星主之先取譩譆後取天牖風池主之風水面胕腫衝陽主之腫一作浮風水面胕腫顔黒解谿主之鍼灸甲乙經卷八
