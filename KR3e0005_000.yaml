body:
  text: 鍼灸甲乙經醫家類提要臣等謹案鍼灸甲乙經十二卷晉皇甫謐撰謐有髙士傳已著録是編皆論鍼灸之道隋書經籍志稱黄帝甲乙經十卷註曰音一卷梁十二卷不著撰人姓名考此書首有謐自序稱七略藝文志黄帝内經十八卷今有鍼經九卷素問九卷二九十八卷即内經也又有明堂孔穴鍼灸治要皆黄帝岐伯選事也三部同歸文多重複錯互非一甘露中吾病風加苦聾百日方治案此四字文義未明疑有舛誤今仍舊本録之謹附識於此要皆淺近乃撰集三部使事類相從刪其浮詞除其重複至為十二卷案至字文義未明亦疑有誤云云是此書乃裒合舊文而成故隋志冠以黄帝然刪除謐名似乎黄帝所自作則於文為謬舊唐書經籍志稱黄帝三部針經十三卷始著謐名然較梁本多一卷其併音一卷計之歟新唐書藝文志既有黄帝甲乙經十二卷又有皇甫謐黄帝三部針經十三卷兼襲二志之文則更舛誤矣書凡一百一十八篇内十二經脉絡脉支别篇疾形脉診篇鍼灸禁忌篇五藏傳病發寒熱篇隂受病發痺篇陽受病發痺篇各分上下經脉篇六經受病發傷寒熱病篇各分上中下實一百二十八篇句中夾注多引楊上逹太素經孫思邈千金方王冰素問注王惟徳銅人圖參考異同其書皆在謐後盖宋髙保衡孫竒林億等校正所加非謐之舊也考隋志有明堂孔穴五卷明堂孔穴圖三卷又明堂孔穴圖三卷唐志有黄帝内經明堂十三卷黄帝十二經脉明堂五臟圖一卷黄帝十二經明堂偃側人圖十二卷黄帝明堂三卷又楊上善黄帝内經明堂類成十三卷楊元孫黄帝明堂三卷今併亡佚惟賴是書存其精要且節解章分具有條理亦較端緒易尋至今與内經並行不可偏廢盖有由矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鍼灸甲乙經序夫醫道所興其來久矣上古神農始嘗草木而知百藥黄帝咨訪岐伯伯髙少俞之徒内考五藏六府外綜經絡血氣色候㕘之天地驗之人物本性命窮神極變而鍼道生焉其論至妙雷公受業傳之於後伊尹以亞聖之才撰用神農本草以為湯液中古名醫有俞跗醫緩扁鵲秦有醫和漢有倉公其論皆經理識本非徒胗病而已漢有華陀張仲景其他竒方異治施世者多亦不能盡記其本末若知直祭酒劉季琰病發於畏惡治之而瘥云後九年季琰病應發發當有感仍本於畏惡病動必死終如其言仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲宣謂曰服湯否仲宣曰已服仲景曰色候固非服湯之胗君何輕命也仲宣猶不信後二十年果眉落後一百八十七日而死終如其言此二事雖扁鵲倉公無以加也華陀性惡矜技終以戮死仲景論廣伊尹湯液為數十卷用之多驗近代太醫令王叔和撰次仲景選論甚精指事施用按七略藝文志黄帝内經十八卷今有鍼經九卷素問九卷二九十八卷即内經也亦有所忘失其論遐逺然稱述多而切事少有不編次比按倉公傳其學皆出於素問論病精㣲九卷是原本經脉其義深奥不易覺也又有明堂孔穴鍼灸治要皆黄帝岐伯選事也三部同歸文多重複錯互非一甘露中吾病風加苦聾百日方治要皆淺近乃撰集三部使事類相從刪其浮辭除其重複論其精要至為十二卷易曰觀其所聚而天地之情事見矣況物理乎事類相從聚之義也夫受先人之體有八尺之軀而不知醫事此所謂遊魂耳若不精通於醫道雖有忠孝之心仁慈之性君父危困赤子塗地無以濟之此固聖賢所以精思極論盡其理也由此言之焉可忽乎其本論其文有理雖不切於近事不甚刪也若必精要後其閒暇當撰覈以為教經云爾
